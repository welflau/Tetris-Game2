<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius-large);
            padding: 2rem;
            box-shadow: var(--shadow-heavy);
            max-width: 800px;
            width: 100%;
        }

        /* 游戏区域 */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Canvas样式 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: var(--shadow-light);
        }

        /* 控制面板 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 200px;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            color: var(--text-light);
        }

        .info-panel h3 {
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        /* 按钮样式 */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        /* 游戏状态显示 */
        .game-status {
            text-align: center;
            margin: 1rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .game-status.playing {
            color: var(--accent-color);
        }

        .game-status.paused {
            color: var(--warning-color);
        }

        .game-status.game-over {
            color: var(--danger-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
            }

            .control-panel {
                min-width: auto;
                width: 100%;
            }

            #gameCanvas {
                max-width: 100%;
                height: auto;
            }
        }

        /* 动画效果 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-area">
                <div class="game-status" id="gameStatus">准备开始</div>
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>

            <div class="control-panel">
                <div class="info-panel">
                    <h3>游戏信息</h3>
                    <div class="info-item">
                        <span>分数:</span>
                        <span id="score">0</span>
                    </div>
                    <div class="info-item">
                        <span>等级:</span>
                        <span id="level">1</span>
                    </div>
                    <div class="info-item">
                        <span>消除行数:</span>
                        <span id="lines">0</span>
                    </div>
                </div>

                <div class="info-panel">
                    <h3>控制说明</h3>
                    <div class="info-item">
                        <span>←/→:</span>
                        <span>移动</span>
                    </div>
                    <div class="info-item">
                        <span>↓:</span>
                        <span>加速下落</span>
                    </div>
                    <div class="info-item">
                        <span>↑:</span>
                        <span>旋转</span>
                    </div>
                    <div class="info-item">
                        <span>空格:</span>
                        <span>暂停/继续</span>
                    </div>
                </div>

                <button class="btn btn-primary" id="startBtn">开始游戏</button>
                <button class="btn btn-secondary" id="pauseBtn">暂停</button>
                <button class="btn btn-danger" id="resetBtn">重新开始</button>
            </div>
        </div>
    </main>

    <script>
        // 事件系统类
        class EventSystem {
            constructor() {
                this.listeners = new Map();
            }

            on(event, callback) {
                if (!this.listeners.has(event)) {
                    this.listeners.set(event, []);
                }
                this.listeners.get(event).push(callback);
            }

            off(event, callback) {
                if (!this.listeners.has(event)) return;
                const callbacks = this.listeners.get(event);
                const index = callbacks.indexOf(callback);
                if (index > -1) {
                    callbacks.splice(index, 1);
                }
            }

            emit(event, data) {
                if (!this.listeners.has(event)) return;
                this.listeners.get(event).forEach(callback => {
                    try {
                        callback(data);
                    } catch (error) {
                        console.error(`Error in event listener for ${event}:`, error);
                    }
                });
            }

            once(event, callback) {
                const onceCallback = (data) => {
                    callback(data);
                    this.off(event, onceCallback);
                };
                this.on(event, onceCallback);
            }

            removeAllListeners(event) {
                if (event) {
                    this.listeners.delete(event);
                } else {
                    this.listeners.clear();
                }
            }
        }

        // 状态管理器类
        class StateManager {
            constructor() {
                this.currentState = 'menu';
                this.previousState = null;
                this.eventSystem = new EventSystem();
            }

            setState(newState) {
                if (this.currentState === newState) return;
                
                this.previousState = this.currentState;
                this.currentState = newState;
                
                this.eventSystem.emit('stateChange', {
                    from: this.previousState,
                    to: this.currentState
                });
            }

            getState() {
                return this.currentState;
            }

            isState(state) {
                return this.currentState === state;
            }

            onStateChange(callback) {
                this.eventSystem.on('stateChange', callback);
            }
        }

        // 游戏循环类
        class GameLoop {
            constructor() {
                this.isRunning = false;
                this.isPaused = false;
                this.fps = 60;
                this.frameTime = 1000 / this.fps;
                this.lastTime = 0;
                this.updateCallbacks = [];
                this.animationId = null;
            }

            addUpdateCallback(callback) {
                this.updateCallbacks.push(callback);
            }

            removeUpdateCallback(callback) {
                const index = this.updateCallbacks.indexOf(callback);
                if (index > -1) {
                    this.updateCallbacks.splice(index, 1);
                }
            }

            setFPS(fps) {
                this.fps = fps;
                this.frameTime = 1000 / fps;
            }

            run() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.lastTime = performance.now();
                this.loop();
            }

            pause() {
                this.isPaused = true;
            }

            resume() {
                if (!this.isRunning) return;
                
                this.isPaused = false;
                this.lastTime = performance.now();
                this.loop();
            }

            stop() {
                this.isRunning = false;
                this.isPaused = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            loop(currentTime = performance.now()) {
                if (!this.isRunning || this.isPaused) return;

                const deltaTime = currentTime - this.lastTime;
                
                if (deltaTime >= this.frameTime) {
                    // 执行所有更新回调
                    this.updateCallbacks.forEach(callback => {
                        try {
                            callback(deltaTime);
                        } catch (error) {
                            console.error('Error in update callback:', error);
                        }
                    });
                    
                    this.lastTime = currentTime - (deltaTime % this.frameTime);
                }

                this.animationId = requestAnimationFrame((time) => this.loop(time));
            }
        }

        // Canvas渲染器类
        class CanvasRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.width = canvas.width;
                this.height = canvas.height;
                this.cellSize = 30;
                this.init();
            }

            init() {
                this.ctx.imageSmoothingEnabled = false;
                this.resize();
            }

            resize() {
                const rect = this.canvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                
                this.canvas.width = this.width * dpr;
                this.canvas.height = this.height * dpr;
                this.canvas.style.width = this.width + 'px';
                this.canvas.style.height = this.height + 'px';
                
                this.ctx.scale(dpr, dpr);
            }

            clear() {
                this.ctx.clearRect(0, 0, this.width, this.height);
            }

            drawGrid(rows, cols) {
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                
                // 绘制垂直线
                for (let x = 0; x <= cols; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.cellSize, 0);
                    this.ctx.lineTo(x * this.cellSize, rows * this.cellSize);
                    this.ctx.stroke();
                }
                
                // 绘制水平线
                for (let y = 0; y <= rows; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.cellSize);
                    this.ctx.lineTo(cols * this.cellSize, y * this.cellSize);
                    this.ctx.stroke();
                }
            }

            drawBlock(x, y, color = '#4CAF50') {
                const pixelX = x * this.cellSize;
                const pixelY = y * this.cellSize;
                
                // 绘制方块主体
                this.ctx.fillStyle = color;
                this.ctx.fillRect(pixelX, pixelY, this.cellSize, this.cellSize);
                
                // 绘制边框
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(pixelX, pixelY, this.cellSize, this.cellSize);
                
                // 绘制高光效果
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(pixelX + 2, pixelY + 2, this.cellSize - 4, 4);
            }

            drawText(text, x, y, options = {}) {
                const {
                    font = '16px Arial',
                    color = '#ffffff',
                    align = 'center',
                    baseline = 'middle'
                } = options;
                
                this.ctx.font = font;
                this.ctx.fillStyle = color;
                this.ctx.textAlign = align;
                this.ctx.textBaseline = baseline;
                this.ctx.fillText(text, x, y);
            }
        }

        // 游戏板类
        class GameBoard {
            constructor(rows = 20, cols = 10) {
                this.rows = rows;
                this.cols = cols;
                this.grid = [];
                this.init();
            }

            init() {
                this.grid = Array(this.rows).fill(null).map(() => Array(this.cols).fill(0));
            }

            getCell(row, col) {
                if (row < 0 || row >= this.rows || col < 0 || col >= this.cols) {
                    return -1; // 边界外
                }
                return this.grid[row][col];
            }

            setCell(row, col, value) {
                if (row >= 0 && row < this.rows && col >= 0 && col < this.cols) {
                    this.grid[row][col] = value;
                }
            }

            isLineFull(row) {
                if (row < 0 || row >= this.rows) return false;
                return this.grid[row].every(cell => cell !== 0);
            }

            clearLine(row) {
                if (row < 0 || row >= this.rows) return;
                
                // 删除指定行
                this.grid.splice(row, 1);
                // 在顶部添加新的空行
                this.grid.unshift(Array(this.cols).fill(0));
            }

            clearFullLines() {
                let linesCleared = 0;
                
                for (let row = this.rows - 1; row >= 0; row--) {
                    if (this.isLineFull(row)) {
                        this.clearLine(row);
                        linesCleared++;
                        row++; // 重新检查当前行
                    }
                }
                
                return linesCleared;
            }

            render(renderer) {
                // 渲染网格
                renderer.drawGrid(this.rows, this.cols);
                
                // 渲染已放置的方块
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.grid[row][col] !== 0) {
                            renderer.drawBlock(col, row, this.getCellColor(this.grid[row][col]));
                        }
                    }
                }
            }

            getCellColor(value) {
                const colors = {
                    1: '#FF6B6B', // 红色
                    2: '#4ECDC4', // 青色
                    3: '#45B7D1', // 蓝色
                    4: '#96CEB4', // 绿色
                    5: '#FFEAA7', // 黄色
                    6: '#DDA0DD', // 紫色
                    7: '#98D8C8'  // 薄荷绿
                };
                return colors[value] || '#4CAF50';
            }
        }

        // 游戏引擎核心类
        class GameEngine {
            constructor() {
                this.stateManager = new StateManager();
                this.gameLoop = new GameLoop();
                this.eventSystem = new EventSystem();
                this.canvas = document.getElementById('gameCanvas');
                this.renderer = new CanvasRenderer(this.canvas);
                this.gameBoard = new GameBoard(20, 10);
                
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.setupStateHandlers();
                this.setupGameLoop();
                this.updateUI();
            }

            setupEventListeners() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    this.eventSystem.emit('keydown', e);
                });

                // 按钮事件
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.start();
                });

                document.getElementById('pauseBtn').addEventListener('click', () => {
                    if (this.stateManager.isState('playing')) {
                        this.pause();
                    } else if (this.stateManager.isState('paused')) {
                        this.resume();
                    }
                });

                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.reset();
                });

                // 窗口大小变化
                window.addEventListener('resize', () => {
                    this.renderer.resize();
                });
            }

            setupStateHandlers() {
                this.stateManager.onStateChange((data) => {
                    this.updateUI();
                    this.eventSystem.emit('stateChange', data);
                });
            }

            setupGameLoop() {
                this.gameLoop.addUpdateCallback((deltaTime) => {
                    this.update(deltaTime);
                    this.render();
                });
            }

            start() {
                this.stateManager.setState('playing');
                this.gameLoop.run();
            }

            pause() {
                if (this.stateManager.isState('playing')) {
                    this.stateManager.setState('paused');
                    this.gameLoop.pause();
                }
            }

            resume() {
                if (this.stateManager.isState('paused')) {
                    this.stateManager.setState('playing');
                    this.gameLoop.resume();
                }
            }

            stop() {
                this.stateManager.setState('game-over');
                this.gameLoop.stop();
            }

            reset() {
                this.gameLoop.stop();
                this.gameBoard.init();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.stateManager.setState('menu');
                this.updateUI();
                this.render();
            }

            update(deltaTime) {
                if (!this.stateManager.isState('playing')) return;
                
                // 游戏逻辑更新将在后续实现
                // 这里只是框架
            }

            render() {
                this.renderer.clear();
                this.gameBoard.render(this.renderer);
                
                // 根据状态显示不同信息
                if (this.stateManager.isState('menu')) {
                    this.renderer.drawText('按开始游戏按钮开始', this.canvas.width / 2, this.canvas.height / 2, {
                        font: '20px Arial',
                        color: '#ffffff'
                    });
                } else if (this.stateManager.isState('paused')) {
                    this.renderer.drawText('游戏已暂停', this.canvas.width / 2, this.canvas.height / 2, {
                        font: '24px Arial',
                        color: '#ff9800'
                    });
                } else if (this.stateManager.isState('game-over')) {
                    this.renderer.drawText('游戏结束', this.canvas.width / 2, this.canvas.height / 2 - 20, {
                        font: '24px Arial',
                        color: '#f44336'
                    });
                    this.renderer.drawText(`最终分数: ${this.score}`, this.canvas.width / 2, this.canvas.height / 2 + 20, {
                        font: '16px Arial',
                        color: '#ffffff'
                    });
                }
            }

            updateUI() {
                // 更新分数显示
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
                
                // 更新游戏状态显示
                const statusElement = document.getElementById('gameStatus');
                const state = this.stateManager.getState();
                
                statusElement.className = 'game-status ' + state;
                
                switch (state) {
                    case 'menu':
                        statusElement.textContent = '准备开始';
                        break;
                    case 'playing':
                        statusElement.textContent = '游戏进行中';
                        break;
                    case 'paused':
                        statusElement.textContent = '游戏暂停';
                        break;
                    case 'game-over':
                        statusElement.textContent = '游戏结束';
                        break;
                }
                
                // 更新按钮状态
                const startBtn = document.getElementById('startBtn');
                const pauseBtn = document.getElementById('pauseBtn');
                
                if (state === 'menu' || state === 'game-over') {
                    startBtn.textContent = '开始游戏';
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                } else if (state === 'playing') {
                    startBtn.disabled = true;
                    pauseBtn.textContent = '暂停';
                    pauseBtn.disabled = false;
                } else if (state === 'paused') {
                    startBtn.disabled = true;
                    pauseBtn.textContent = '继续';
                    pauseBtn.disabled = false;
                }
            }

            setState(state) {
                this.stateManager.setState(state);
            }

            getState() {
                return this.stateManager.getState();
            }
        }

        // 初始化游戏
        let game;
        
        document.addEventListener('DOMContentLoaded', () => {
            game = new GameEngine();
            
            // 键盘控制
            game.eventSystem.on('keydown', (e) => {
                switch (e.code) {
                    case 'Space':
                        e.preventDefault();
                        if (game.getState() === 'playing') {
                            game.pause();
                        } else if (game.getState() === 'paused') {
                            game.resume();
                        }
                        break;
                    case 'KeyR':
                        if (e.ctrlKey) {
                            e.preventDefault();
                            game.reset();
                        }
                        break;
                }
            });
            
            // 初始渲染
            game.render();
        });
    </script>
</body>
</html>

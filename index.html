<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-large);
            padding: 2rem;
            box-shadow: var(--shadow-heavy);
            border: 1px solid var(--border-glass);
        }

        /* 游戏区域 */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: var(--shadow-light);
        }

        /* 控制面板 */
        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 按钮样式 */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-light);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.danger {
            background: var(--danger-color);
        }

        .btn.warning {
            background: var(--warning-color);
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 200px;
        }

        .info-card {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-light);
        }

        .info-card h3 {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            text-align: center;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-value {
            font-weight: 600;
            color: var(--accent-color);
        }

        /* 设置面板 */
        .settings-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-light);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-control {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 24px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .toggle.active {
            background: var(--accent-color);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle.active::after {
            transform: translateX(26px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
            }

            .info-panel {
                min-width: auto;
            }

            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 1rem;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: var(--text-light);
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-heavy);
            transform: translateX(100%);
            transition: var(--transition);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--danger-color);
        }

        .notification.warning {
            background: var(--warning-color);
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-area">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
                <div class="controls">
                    <button class="btn" id="startBtn">开始游戏</button>
                    <button class="btn" id="pauseBtn">暂停</button>
                    <button class="btn danger" id="resetBtn">重置</button>
                    <button class="btn warning" id="saveBtn">保存游戏</button>
                    <button class="btn" id="loadBtn">加载游戏</button>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-card">
                    <h3>游戏信息</h3>
                    <div class="info-item">
                        <span>分数:</span>
                        <span class="info-value" id="score">0</span>
                    </div>
                    <div class="info-item">
                        <span>等级:</span>
                        <span class="info-value" id="level">1</span>
                    </div>
                    <div class="info-item">
                        <span>行数:</span>
                        <span class="info-value" id="lines">0</span>
                    </div>
                    <div class="info-item">
                        <span>最高分:</span>
                        <span class="info-value" id="highScore">0</span>
                    </div>
                </div>

                <div class="info-card">
                    <h3>游戏统计</h3>
                    <div class="info-item">
                        <span>游戏次数:</span>
                        <span class="info-value" id="gamesPlayed">0</span>
                    </div>
                    <div class="info-item">
                        <span>总游戏时间:</span>
                        <span class="info-value" id="totalTime">0分钟</span>
                    </div>
                    <div class="info-item">
                        <span>平均分数:</span>
                        <span class="info-value" id="avgScore">0</span>
                    </div>
                </div>

                <div class="settings-panel">
                    <h3 style="color: var(--text-light); margin-bottom: 1rem; text-align: center;">游戏设置</h3>
                    <div class="setting-item">
                        <span>音效:</span>
                        <div class="setting-control">
                            <div class="toggle active" id="soundToggle"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <span>显示网格:</span>
                        <div class="setting-control">
                            <div class="toggle active" id="gridToggle"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <span>显示阴影:</span>
                        <div class="setting-control">
                            <div class="toggle active" id="shadowToggle"></div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <span>自动保存:</span>
                        <div class="setting-control">
                            <div class="toggle active" id="autoSaveToggle"></div>
                        </div>
                    </div>
                    <div class="setting-item" style="margin-top: 1rem;">
                        <button class="btn danger" id="resetSettingsBtn" style="width: 100%;">重置设置</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 数据持久化系统
        class StorageManager {
            constructor() {
                this.prefix = 'tetris_';
            }

            // 保存数据
            save(key, data) {
                try {
                    const serializedData = JSON.stringify(data);
                    localStorage.setItem(this.prefix + key, serializedData);
                    return true;
                } catch (error) {
                    console.error('保存数据失败:', error);
                    return false;
                }
            }

            // 加载数据
            load(key, defaultValue = null) {
                try {
                    const data = localStorage.getItem(this.prefix + key);
                    return data ? JSON.parse(data) : defaultValue;
                } catch (error) {
                    console.error('加载数据失败:', error);
                    return defaultValue;
                }
            }

            // 删除数据
            remove(key) {
                try {
                    localStorage.removeItem(this.prefix + key);
                    return true;
                } catch (error) {
                    console.error('删除数据失败:', error);
                    return false;
                }
            }

            // 清空所有数据
            clear() {
                try {
                    const keys = Object.keys(localStorage).filter(key => key.startsWith(this.prefix));
                    keys.forEach(key => localStorage.removeItem(key));
                    return true;
                } catch (error) {
                    console.error('清空数据失败:', error);
                    return false;
                }
            }

            // 检查数据是否存在
            exists(key) {
                return localStorage.getItem(this.prefix + key) !== null;
            }
        }

        // 游戏数据存储管理
        class GameDataStorage {
            constructor() {
                this.storage = new StorageManager();
                this.gameDataKey = 'game_data';
                this.highScoresKey = 'high_scores';
                this.statsKey = 'game_stats';
            }

            // 保存游戏数据
            saveGameData(gameData) {
                const data = {
                    score: gameData.score || 0,
                    level: gameData.level || 1,
                    lines: gameData.lines || 0,
                    timestamp: Date.now()
                };
                return this.storage.save(this.gameDataKey, data);
            }

            // 加载游戏数据
            loadGameData() {
                return this.storage.load(this.gameDataKey, {
                    score: 0,
                    level: 1,
                    lines: 0,
                    timestamp: Date.now()
                });
            }

            // 保存最高分
            saveHighScore(score) {
                const highScores = this.getHighScores();
                highScores.push({
                    score: score,
                    date: new Date().toISOString(),
                    timestamp: Date.now()
                });
                
                // 排序并保留前10名
                highScores.sort((a, b) => b.score - a.score);
                const topScores = highScores.slice(0, 10);
                
                return this.storage.save(this.highScoresKey, topScores);
            }

            // 获取最高分列表
            getHighScores() {
                return this.storage.load(this.highScoresKey, []);
            }

            // 获取最高分
            getHighScore() {
                const highScores = this.getHighScores();
                return highScores.length > 0 ? highScores[0].score : 0;
            }

            // 保存游戏统计
            saveGameStats(stats) {
                const currentStats = this.loadGameStats();
                const updatedStats = {
                    gamesPlayed: (currentStats.gamesPlayed || 0) + (stats.gamesPlayed || 0),
                    totalTime: (currentStats.totalTime || 0) + (stats.totalTime || 0),
                    totalScore: (currentStats.totalScore || 0) + (stats.totalScore || 0),
                    lastPlayed: Date.now()
                };
                
                // 计算平均分
                updatedStats.avgScore = updatedStats.gamesPlayed > 0 ? 
                    Math.round(updatedStats.totalScore / updatedStats.gamesPlayed) : 0;
                
                return this.storage.save(this.statsKey, updatedStats);
            }

            // 加载游戏统计
            loadGameStats() {
                return this.storage.load(this.statsKey, {
                    gamesPlayed: 0,
                    totalTime: 0,
                    totalScore: 0,
                    avgScore: 0,
                    lastPlayed: Date.now()
                });
            }
        }

        // 设置存储管理
        class SettingsStorage {
            constructor() {
                this.storage = new StorageManager();
                this.settingsKey = 'settings';
                this.defaultSettings = {
                    sound: true,
                    showGrid: true,
                    showShadow: true,
                    autoSave: true,
                    theme: 'default',
                    controls: {
                        left: 'ArrowLeft',
                        right: 'ArrowRight',
                        down: 'ArrowDown',
                        rotate: 'ArrowUp',
                        drop: 'Space',
                        pause: 'KeyP'
                    }
                };
            }

            // 保存设置
            saveSettings(settings) {
                const mergedSettings = { ...this.defaultSettings, ...settings };
                return this.storage.save(this.settingsKey, mergedSettings);
            }

            // 加载设置
            loadSettings() {
                return this.storage.load(this.settingsKey, this.defaultSettings);
            }

            // 更新单个设置
            updateSetting(key, value) {
                const settings = this.loadSettings();
                if (key.includes('.')) {
                    // 处理嵌套属性，如 'controls.left'
                    const keys = key.split('.');
                    let current = settings;
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!current[keys[i]]) current[keys[i]] = {};
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                } else {
                    settings[key] = value;
                }
                return this.saveSettings(settings);
            }

            // 重置设置
            resetSettings() {
                return this.saveSettings(this.defaultSettings);
            }
        }

        // 游戏存档管理
        class SaveGameStorage {
            constructor() {
                this.storage = new StorageManager();
                this.saveGameKey = 'saved_game';
            }

            // 保存游戏状态
            saveGameState(gameState) {
                const saveData = {
                    ...gameState,
                    timestamp: Date.now(),
                    version: '1.0'
                };
                return this.storage.save(this.saveGameKey, saveData);
            }

            // 加载游戏状态
            loadGameState() {
                return this.storage.load(this.saveGameKey, null);
            }

            // 清除存档
            clearSavedGame() {
                return this.storage.remove(this.saveGameKey);
            }

            // 检查是否有存档
            hasSavedGame() {
                return this.storage.exists(this.saveGameKey);
            }
        }

        // 通知系统
        class NotificationManager {
            constructor() {
                this.container = this.createContainer();
            }

            createContainer() {
                const container = document.createElement('div');
                container.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    z-index: 1000;
                    pointer-events: none;
                `;
                document.body.appendChild(container);
                return container;
            }

            show(message, type = 'success', duration = 3000) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                notification.style.pointerEvents = 'auto';
                
                this.container.appendChild(notification);
                
                // 显示动画
                setTimeout(() => notification.classList.add('show'), 100);
                
                // 自动隐藏
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                }, duration);
            }
        }

        // 游戏主类
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // 初始化存储管理器
                this.gameDataStorage = new GameDataStorage();
                this.settingsStorage = new SettingsStorage();
                this.saveGameStorage = new SaveGameStorage();
                this.notificationManager = new NotificationManager();
                
                // 游戏状态
                this.gameState = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    isPlaying: false,
                    isPaused: false
                };
                
                // 游戏统计
                this.gameStats = {
                    startTime: null,
                    playTime: 0
                };
                
                this.init();
            }

            init() {
                this.loadSettings();
                this.loadGameData();
                this.loadGameStats();
                this.setupEventListeners();
                this.updateDisplay();
                
                // 检查是否有存档
                if (this.saveGameStorage.hasSavedGame()) {
                    document.getElementById('loadBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('loadBtn').style.display = 'none';
                }
            }

            loadSettings() {
                this.settings = this.settingsStorage.loadSettings();
                this.updateSettingsDisplay();
            }

            loadGameData() {
                const gameData = this.gameDataStorage.loadGameData();
                // 不自动加载游戏数据到当前游戏状态，只用于显示历史记录
            }

            loadGameStats() {
                this.stats = this.gameDataStorage.loadGameStats();
                this.updateStatsDisplay();
            }

            setupEventListeners() {
                // 游戏控制按钮
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                document.getElementById('saveBtn').addEventListener('click', () => this.saveGame());
                document.getElementById('loadBtn').addEventListener('click', () => this.loadGame());
                
                // 设置控制
                document.getElementById('soundToggle').addEventListener('click', (e) => {
                    this.toggleSetting('sound', e.target);
                });
                document.getElementById('gridToggle').addEventListener('click', (e) => {
                    this.toggleSetting('showGrid', e.target);
                });
                document.getElementById('shadowToggle').addEventListener('click', (e) => {
                    this.toggleSetting('showShadow', e.target);
                });
                document.getElementById('autoSaveToggle').addEventListener('click', (e) => {
                    this.toggleSetting('autoSave', e.target);
                });
                document.getElementById('resetSettingsBtn').addEventListener('click', () => {
                    this.resetSettings();
                });
                
                // 键盘控制
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
                
                // 页面关闭前自动保存
                window.addEventListener('beforeunload', () => {
                    if (this.settings.autoSave && this.gameState.isPlaying) {
                        this.saveGame();
                    }
                });
            }

            startGame() {
                this.gameState.isPlaying = true;
                this.gameState.isPaused = false;
                this.gameStats.startTime = Date.now();
                
                document.getElementById('startBtn').textContent = '游戏中...';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                
                this.notificationManager.show('游戏开始！', 'success');
                
                // 模拟游戏循环
                this.gameLoop();
            }

            gameLoop() {
                if (!this.gameState.isPlaying || this.gameState.isPaused) return;
                
                // 模拟游戏逻辑
                this.gameState.score += Math.floor(Math.random() * 10) + 1;
                if (this.gameState.score > 0 && this.gameState.score % 1000 === 0) {
                    this.gameState.level++;
                    this.gameState.lines += 10;
                }
                
                this.updateDisplay();
                
                // 自动保存
                if (this.settings.autoSave && this.gameState.score % 500 === 0) {
                    this.saveGameData();
                }
                
                setTimeout(() => this.gameLoop(), 1000);
            }

            togglePause() {
                if (!this.gameState.isPlaying) return;
                
                this.gameState.isPaused = !this.gameState.isPaused;
                document.getElementById('pauseBtn').textContent = this.gameState.isPaused ? '继续' : '暂停';
                
                if (this.gameState.isPaused) {
                    this.notificationManager.show('游戏已暂停', 'warning');
                } else {
                    this.notificationManager.show('游戏继续', 'success');
                    this.gameLoop();
                }
            }

            resetGame() {
                this.gameState = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    isPlaying: false,
                    isPaused: false
                };
                
                // 保存游戏统计
                if (this.gameStats.startTime) {
                    const playTime = Math.floor((Date.now() - this.gameStats.startTime) / 1000 / 60); // 分钟
                    this.gameDataStorage.saveGameStats({
                        gamesPlayed: 1,
                        totalTime: playTime,
                        totalScore: this.gameState.score
                    });
                    this.loadGameStats();
                }
                
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('pauseBtn').textContent = '暂停';
                
                this.updateDisplay();
                this.notificationManager.show('游戏已重置', 'warning');
            }

            saveGame() {
                if (!this.gameState.isPlaying) {
                    this.notificationManager.show('没有正在进行的游戏', 'error');
                    return;
                }
                
                const gameState = {
                    ...this.gameState,
                    playTime: this.gameStats.startTime ? Date.now() - this.gameStats.startTime : 0
                };
                
                if (this.saveGameStorage.saveGameState(gameState)) {
                    document.getElementById('loadBtn').style.display = 'inline-block';
                    this.notificationManager.show('游戏已保存', 'success');
                } else {
                    this.notificationManager.show('保存失败', 'error');
                }
            }

            loadGame() {
                const savedGame = this.saveGameStorage.loadGameState();
                if (!savedGame) {
                    this.notificationManager.show('没有找到存档', 'error');
                    return;
                }
                
                this.gameState = {
                    score: savedGame.score || 0,
                    level: savedGame.level || 1,
                    lines: savedGame.lines || 0,
                    isPlaying: true,
                    isPaused: false
                };
                
                this.gameStats.startTime = Date.now() - (savedGame.playTime || 0);
                
                document.getElementById('startBtn').textContent = '游戏中...';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                
                this.updateDisplay();
                this.gameLoop();
                this.notificationManager.show('游戏已加载', 'success');
            }

            saveGameData() {
                // 保存当前游戏数据
                this.gameDataStorage.saveGameData(this.gameState);
                
                // 检查并保存最高分
                const currentHighScore = this.gameDataStorage.getHighScore();
                if (this.gameState.score > currentHighScore) {
                    this.gameDataStorage.saveHighScore(this.gameState.score);
                    this.notificationManager.show('新的最高分！', 'success');
                }
            }

            toggleSetting(key, element) {
                const newValue = !this.settings[key];
                this.settings[key] = newValue;
                this.settingsStorage.updateSetting(key, newValue);
                
                element.classList.toggle('active', newValue);
                this.notificationManager.show(`${this.getSettingName(key)}已${newValue ? '开启' : '关闭'}`, 'success');
            }

            getSettingName(key) {
                const names = {
                    sound: '音效',
                    showGrid: '网格显示',
                    showShadow: '阴影显示',
                    autoSave: '自动保存'
                };
                return names[key] || key;
            }

            resetSettings() {
                if (confirm('确定要重置所有设置吗？')) {
                    this.settingsStorage.resetSettings();
                    this.loadSettings();
                    this.notificationManager.show('设置已重置', 'success');
                }
            }

            updateSettingsDisplay() {
                document.getElementById('soundToggle').classList.toggle('active', this.settings.sound);
                document.getElementById('gridToggle').classList.toggle('active', this.settings.showGrid);
                document.getElementById('shadowToggle').classList.toggle('active', this.settings.showShadow);
                document.getElementById('autoSaveToggle').classList.toggle('active', this.settings.autoSave);
            }

            updateDisplay() {
                // 更新游戏信息
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('level').textContent = this.gameState.level;
                document.getElementById('lines').textContent = this.gameState.lines;
                document.getElementById('highScore').textContent = this.gameDataStorage.getHighScore();
            }

            updateStatsDisplay() {
                document.getElementById('gamesPlayed').textContent = this.stats.gamesPlayed;
                document.getElementById('totalTime').textContent = this.stats.totalTime + '分钟';
                document.getElementById('avgScore').textContent = this.stats.avgScore;
            }

            handleKeyPress(e) {
                if (!this.gameState.isPlaying) return;
                
                const controls = this.settings.controls;
                switch (e.code) {
                    case controls.pause:
                        e.preventDefault();
                        this.togglePause();
                        break;
                    case controls.left:
                    case controls.right:
                    case controls.down:
                    case controls.rotate:
                    case controls.drop:
                        e.preventDefault();
                        // 这里可以添加具体的游戏控制逻辑
                        break;
                }
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            window.tetrisGame = new TetrisGame();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
        }

        /* 游戏面板 */
        .game-board {
            width: 300px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            position: relative;
            overflow: hidden;
        }

        /* 控制面板 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 200px;
        }

        /* 分数显示 */
        .score-display {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            text-align: center;
        }

        .score-display h3 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .score-value {
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 控制按钮 */
        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-light);
        }

        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.danger {
            background: var(--danger-color);
        }

        .btn.danger:hover {
            background: #da190b;
        }

        /* 键盘控制提示 */
        .keyboard-hints {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
        }

        .keyboard-hints h4 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .hint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        /* 输入状态指示器 */
        .input-status {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            text-align: center;
        }

        .input-status h4 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger-color);
            margin-right: 0.5rem;
            transition: var(--transition);
        }

        .status-indicator.active {
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .active-keys {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                padding: 1rem;
            }

            .game-board {
                width: 250px;
                height: 500px;
            }

            .control-panel {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-board" id="gameBoard">
                <!-- 游戏画布将在这里渲染 -->
            </div>

            <div class="control-panel">
                <div class="score-display">
                    <h3>分数</h3>
                    <div class="score-value" id="scoreValue">0</div>
                </div>

                <div class="score-display">
                    <h3>等级</h3>
                    <div class="score-value" id="levelValue">1</div>
                </div>

                <div class="control-buttons">
                    <button class="btn" id="startBtn">开始游戏</button>
                    <button class="btn" id="pauseBtn">暂停</button>
                    <button class="btn danger" id="resetBtn">重置</button>
                </div>

                <div class="input-status">
                    <h4>输入状态</h4>
                    <div>
                        <span class="status-indicator" id="inputIndicator"></span>
                        <span>键盘控制</span>
                    </div>
                    <div class="active-keys" id="activeKeys">无按键</div>
                </div>

                <div class="keyboard-hints">
                    <h4>键盘控制</h4>
                    <div class="hint-item">
                        <span>移动</span>
                        <span><span class="key">A/D</span> 或 <span class="key">←/→</span></span>
                    </div>
                    <div class="hint-item">
                        <span>下降</span>
                        <span><span class="key">S</span> 或 <span class="key">↓</span></span>
                    </div>
                    <div class="hint-item">
                        <span>旋转</span>
                        <span><span class="key">W</span> 或 <span class="key">↑</span></span>
                    </div>
                    <div class="hint-item">
                        <span>快速下降</span>
                        <span><span class="key">Space</span></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 防抖管理器
        class DebounceManager {
            constructor() {
                this.timers = new Map();
            }

            // 防抖函数
            debounce(key, func, delay = 300) {
                if (this.timers.has(key)) {
                    clearTimeout(this.timers.get(key));
                }

                const timer = setTimeout(() => {
                    func();
                    this.timers.delete(key);
                }, delay);

                this.timers.set(key, timer);
            }

            // 节流函数
            throttle(key, func, delay = 100) {
                if (this.timers.has(key)) {
                    return false;
                }

                func();
                const timer = setTimeout(() => {
                    this.timers.delete(key);
                }, delay);

                this.timers.set(key, timer);
                return true;
            }

            // 清除防抖
            clearDebounce(key) {
                if (this.timers.has(key)) {
                    clearTimeout(this.timers.get(key));
                    this.timers.delete(key);
                }
            }

            // 清除所有防抖
            clearAll() {
                this.timers.forEach(timer => clearTimeout(timer));
                this.timers.clear();
            }
        }

        // 输入控制器
        class InputController {
            constructor() {
                this.keyMap = {
                    // WASD 控制
                    'KeyW': 'rotate',
                    'KeyA': 'moveLeft',
                    'KeyS': 'moveDown',
                    'KeyD': 'moveRight',
                    // 方向键控制
                    'ArrowUp': 'rotate',
                    'ArrowLeft': 'moveLeft',
                    'ArrowDown': 'moveDown',
                    'ArrowRight': 'moveRight',
                    // 其他控制键
                    'Space': 'hardDrop',
                    'Enter': 'pause',
                    'Escape': 'pause'
                };

                this.activeKeys = new Set();
                this.listeners = new Map();
                this.isEnabled = true;
                this.debounceManager = new DebounceManager();

                this.init();
            }

            // 初始化事件监听
            init() {
                this.addEventListener();
                this.updateUI();
            }

            // 添加事件监听器
            addEventListener() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.addEventListener('keyup', (e) => this.handleKeyUp(e));
                
                // 防止页面滚动
                document.addEventListener('keydown', (e) => {
                    if (this.keyMap[e.code]) {
                        e.preventDefault();
                    }
                });

                // 窗口失焦时清除所有按键状态
                window.addEventListener('blur', () => {
                    this.activeKeys.clear();
                    this.updateUI();
                });
            }

            // 处理按键按下
            handleKeyDown(event) {
                if (!this.isEnabled) return;

                const action = this.mapKeyToAction(event.code);
                if (!action) return;

                // 防止重复触发
                if (this.activeKeys.has(event.code)) return;

                this.activeKeys.add(event.code);
                this.updateUI();

                // 根据动作类型选择防抖或节流
                if (action === 'moveLeft' || action === 'moveRight' || action === 'moveDown') {
                    // 移动操作使用节流，允许连续移动
                    this.debounceManager.throttle(`move_${action}`, () => {
                        this.executeAction(action, event);
                    }, 150);
                } else if (action === 'rotate') {
                    // 旋转操作使用防抖，防止误操作
                    this.debounceManager.debounce('rotate', () => {
                        this.executeAction(action, event);
                    }, 100);
                } else {
                    // 其他操作直接执行
                    this.executeAction(action, event);
                }
            }

            // 处理按键释放
            handleKeyUp(event) {
                if (!this.isEnabled) return;

                this.activeKeys.delete(event.code);
                this.updateUI();

                // 清除对应的防抖/节流
                const action = this.mapKeyToAction(event.code);
                if (action === 'moveLeft' || action === 'moveRight' || action === 'moveDown') {
                    this.debounceManager.clearDebounce(`move_${action}`);
                }
            }

            // 映射按键到动作
            mapKeyToAction(keyCode) {
                return this.keyMap[keyCode] || null;
            }

            // 执行动作
            executeAction(action, event) {
                console.log(`执行动作: ${action}`, event);
                
                // 触发自定义事件
                const customEvent = new CustomEvent('gameAction', {
                    detail: {
                        action: action,
                        originalEvent: event,
                        timestamp: Date.now()
                    }
                });
                document.dispatchEvent(customEvent);

                // 通知注册的监听器
                if (this.listeners.has(action)) {
                    this.listeners.get(action).forEach(callback => {
                        try {
                            callback(action, event);
                        } catch (error) {
                            console.error(`执行动作回调时出错: ${action}`, error);
                        }
                    });
                }
            }

            // 注册动作监听器
            onAction(action, callback) {
                if (!this.listeners.has(action)) {
                    this.listeners.set(action, []);
                }
                this.listeners.get(action).push(callback);
            }

            // 移除动作监听器
            offAction(action, callback) {
                if (this.listeners.has(action)) {
                    const callbacks = this.listeners.get(action);
                    const index = callbacks.indexOf(callback);
                    if (index > -1) {
                        callbacks.splice(index, 1);
                    }
                }
            }

            // 启用/禁用输入
            setEnabled(enabled) {
                this.isEnabled = enabled;
                if (!enabled) {
                    this.activeKeys.clear();
                    this.debounceManager.clearAll();
                }
                this.updateUI();
            }

            // 获取当前活跃的按键
            getActiveKeys() {
                return Array.from(this.activeKeys);
            }

            // 更新UI显示
            updateUI() {
                const indicator = document.getElementById('inputIndicator');
                const activeKeysElement = document.getElementById('activeKeys');

                if (indicator) {
                    if (this.isEnabled && this.activeKeys.size > 0) {
                        indicator.classList.add('active');
                    } else {
                        indicator.classList.remove('active');
                    }
                }

                if (activeKeysElement) {
                    if (this.activeKeys.size === 0) {
                        activeKeysElement.textContent = '无按键';
                    } else {
                        const keyNames = Array.from(this.activeKeys).map(code => {
                            const action = this.mapKeyToAction(code);
                            return this.getKeyDisplayName(code) + (action ? ` (${this.getActionDisplayName(action)})` : '');
                        });
                        activeKeysElement.textContent = keyNames.join(', ');
                    }
                }
            }

            // 获取按键显示名称
            getKeyDisplayName(keyCode) {
                const displayNames = {
                    'KeyW': 'W',
                    'KeyA': 'A',
                    'KeyS': 'S',
                    'KeyD': 'D',
                    'ArrowUp': '↑',
                    'ArrowLeft': '←',
                    'ArrowDown': '↓',
                    'ArrowRight': '→',
                    'Space': 'Space',
                    'Enter': 'Enter',
                    'Escape': 'Esc'
                };
                return displayNames[keyCode] || keyCode;
            }

            // 获取动作显示名称
            getActionDisplayName(action) {
                const actionNames = {
                    'moveLeft': '左移',
                    'moveRight': '右移',
                    'moveDown': '下移',
                    'rotate': '旋转',
                    'hardDrop': '快速下降',
                    'pause': '暂停'
                };
                return actionNames[action] || action;
            }
        }

        // 游戏控制桥接器
        class GameControlBridge {
            constructor(inputController) {
                this.inputController = inputController;
                this.gameActions = new Map();
                this.actionValidators = new Map();
                this.isGameActive = false;

                this.bindGameActions();
            }

            // 绑定游戏动作
            bindGameActions() {
                // 绑定移动动作
                this.inputController.onAction('moveLeft', (action, event) => {
                    this.executeAction('moveLeft', { direction: 'left' });
                });

                this.inputController.onAction('moveRight', (action, event) => {
                    this.executeAction('moveRight', { direction: 'right' });
                });

                this.inputController.onAction('moveDown', (action, event) => {
                    this.executeAction('moveDown', { direction: 'down' });
                });

                this.inputController.onAction('rotate', (action, event) => {
                    this.executeAction('rotate', { direction: 'clockwise' });
                });

                this.inputController.onAction('hardDrop', (action, event) => {
                    this.executeAction('hardDrop', {});
                });

                this.inputController.onAction('pause', (action, event) => {
                    this.executeAction('pause', {});
                });
            }

            // 执行游戏动作
            executeAction(actionType, params) {
                // 验证动作是否有效
                if (!this.validateAction(actionType, params)) {
                    console.log(`动作验证失败: ${actionType}`);
                    return false;
                }

                console.log(`执行游戏动作: ${actionType}`, params);

                // 执行注册的动作处理器
                if (this.gameActions.has(actionType)) {
                    const handler = this.gameActions.get(actionType);
                    try {
                        return handler(params);
                    } catch (error) {
                        console.error(`执行游戏动作时出错: ${actionType}`, error);
                        return false;
                    }
                } else {
                    console.log(`未找到动作处理器: ${actionType}`);
                    return false;
                }
            }

            // 验证动作
            validateAction(actionType, params) {
                // 检查游戏是否激活
                if (!this.isGameActive && actionType !== 'pause') {
                    return false;
                }

                // 执行自定义验证器
                if (this.actionValidators.has(actionType)) {
                    const validator = this.actionValidators.get(actionType);
                    return validator(params);
                }

                return true;
            }

            // 注册游戏动作处理器
            registerAction(actionType, handler) {
                this.gameActions.set(actionType, handler);
            }

            // 注册动作验证器
            registerValidator(actionType, validator) {
                this.actionValidators.set(actionType, validator);
            }

            // 设置游戏状态
            setGameActive(active) {
                this.isGameActive = active;
                this.inputController.setEnabled(active);
            }

            // 获取输入控制器
            getInputController() {
                return this.inputController;
            }
        }

        // 初始化系统
        class GameSystem {
            constructor() {
                this.inputController = new InputController();
                this.gameControlBridge = new GameControlBridge(this.inputController);
                this.score = 0;
                this.level = 1;
                this.isGameRunning = false;
                this.isPaused = false;

                this.init();
            }

            init() {
                this.setupGameActions();
                this.setupUI();
                console.log('游戏系统初始化完成');
            }

            // 设置游戏动作处理器
            setupGameActions() {
                // 注册移动动作
                this.gameControlBridge.registerAction('moveLeft', (params) => {
                    console.log('方块左移');
                    return true;
                });

                this.gameControlBridge.registerAction('moveRight', (params) => {
                    console.log('方块右移');
                    return true;
                });

                this.gameControlBridge.registerAction('moveDown', (params) => {
                    console.log('方块下移');
                    return true;
                });

                this.gameControlBridge.registerAction('rotate', (params) => {
                    console.log('方块旋转');
                    return true;
                });

                this.gameControlBridge.registerAction('hardDrop', (params) => {
                    console.log('方块快速下降');
                    return true;
                });

                this.gameControlBridge.registerAction('pause', (params) => {
                    this.togglePause();
                    return true;
                });

                // 注册验证器
                this.gameControlBridge.registerValidator('moveLeft', () => {
                    return this.isGameRunning && !this.isPaused;
                });

                this.gameControlBridge.registerValidator('moveRight', () => {
                    return this.isGameRunning && !this.isPaused;
                });

                this.gameControlBridge.registerValidator('moveDown', () => {
                    return this.isGameRunning && !this.isPaused;
                });

                this.gameControlBridge.registerValidator('rotate', () => {
                    return this.isGameRunning && !this.isPaused;
                });

                this.gameControlBridge.registerValidator('hardDrop', () => {
                    return this.isGameRunning && !this.isPaused;
                });
            }

            // 设置UI事件
            setupUI() {
                const startBtn = document.getElementById('startBtn');
                const pauseBtn = document.getElementById('pauseBtn');
                const resetBtn = document.getElementById('resetBtn');

                if (startBtn) {
                    startBtn.addEventListener('click', () => this.startGame());
                }

                if (pauseBtn) {
                    pauseBtn.addEventListener('click', () => this.togglePause());
                }

                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetGame());
                }
            }

            // 开始游戏
            startGame() {
                this.isGameRunning = true;
                this.isPaused = false;
                this.gameControlBridge.setGameActive(true);
                
                const startBtn = document.getElementById('startBtn');
                if (startBtn) {
                    startBtn.textContent = '游戏中';
                    startBtn.disabled = true;
                }

                console.log('游戏开始');
            }

            // 切换暂停
            togglePause() {
                if (!this.isGameRunning) return;

                this.isPaused = !this.isPaused;
                this.gameControlBridge.setGameActive(!this.isPaused);

                const pauseBtn = document.getElementById('pauseBtn');
                if (pauseBtn) {
                    pauseBtn.textContent = this.isPaused ? '继续' : '暂停';
                }

                console.log(this.isPaused ? '游戏暂停' : '游戏继续');
            }

            // 重置游戏
            resetGame() {
                this.isGameRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.level = 1;
                this.gameControlBridge.setGameActive(false);

                // 更新UI
                const startBtn = document.getElementById('startBtn');
                const pauseBtn = document.getElementById('pauseBtn');
                const scoreValue = document.getElementById('scoreValue');
                const levelValue = document.getElementById('levelValue');

                if (startBtn) {
                    startBtn.textContent = '开始游戏';
                    startBtn.disabled = false;
                }

                if (pauseBtn) {
                    pauseBtn.textContent = '暂停';
                }

                if (scoreValue) {
                    scoreValue.textContent = '0';
                }

                if (levelValue) {
                    levelValue.textContent = '1';
                }

                console.log('游戏重置');
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.gameSystem = new GameSystem();
            console.log('用户控制系统加载完成');
        });

        // 全局事件监听器（用于调试）
        document.addEventListener('gameAction', (event) => {
            console.log('游戏动作事件:', event.detail);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
            position: relative;
        }

        /* 游戏画布区域 */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* 画布样式 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: var(--shadow-light);
        }

        /* 控制面板 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 200px;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(5px);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
        }

        .info-panel h3 {
            margin-bottom: 1rem;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        /* 按钮样式 */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover:before {
            left: 100%;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
            box-shadow: var(--shadow-light);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
            box-shadow: var(--shadow-light);
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled:hover {
            transform: none;
            box-shadow: var(--shadow-light);
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* 暂停遮罩 */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-radius: var(--border-radius-large);
        }

        .pause-overlay.active {
            display: flex;
        }

        .pause-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            text-align: center;
            color: var(--text-light);
            box-shadow: var(--shadow-heavy);
            animation: fadeInScale 0.3s ease;
        }

        .pause-content h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
        }

        .pause-content p {
            margin-bottom: 2rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 游戏状态指示器 */
        .game-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .game-status.running {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .game-status.paused {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .game-status.ended {
            background: var(--danger-color);
            color: var(--text-light);
        }

        /* 动画效果 */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
                gap: 1rem;
            }

            .control-panel {
                min-width: auto;
                width: 100%;
            }

            .btn-group {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: 120px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 14px;
            }

            .pause-content {
                padding: 2rem;
            }

            .pause-content h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
        <div class="game-status" id="gameStatus">准备开始</div>
    </header>

    <main>
        <div class="game-container">
            <div class="game-area">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>

            <div class="control-panel">
                <div class="info-panel">
                    <h3>游戏信息</h3>
                    <div class="info-item">
                        <span>得分:</span>
                        <span id="score">0</span>
                    </div>
                    <div class="info-item">
                        <span>等级:</span>
                        <span id="level">1</span>
                    </div>
                    <div class="info-item">
                        <span>行数:</span>
                        <span id="lines">0</span>
                    </div>
                    <div class="info-item">
                        <span>状态:</span>
                        <span id="gameState">准备</span>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="startBtn">开始游戏</button>
                    <button class="btn btn-secondary" id="pauseBtn" disabled>暂停</button>
                    <button class="btn btn-danger" id="restartBtn" disabled>重新开始</button>
                </div>

                <div class="info-panel">
                    <h3>操作说明</h3>
                    <div class="info-item">
                        <span>移动:</span>
                        <span>← →</span>
                    </div>
                    <div class="info-item">
                        <span>旋转:</span>
                        <span>↑</span>
                    </div>
                    <div class="info-item">
                        <span>加速:</span>
                        <span>↓</span>
                    </div>
                    <div class="info-item">
                        <span>暂停:</span>
                        <span>空格</span>
                    </div>
                </div>
            </div>

            <!-- 暂停遮罩 -->
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-content">
                    <h2>游戏暂停</h2>
                    <p>按空格键或点击继续按钮恢复游戏</p>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="resumeBtn">继续游戏</button>
                        <button class="btn btn-danger" id="exitBtn">退出游戏</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 游戏状态枚举
        const GameStates = {
            MENU: 'menu',
            RUNNING: 'running',
            PAUSED: 'paused',
            ENDED: 'ended',
            LOADING: 'loading'
        };

        // 状态事件分发器
        class StateEventDispatcher {
            constructor() {
                this.listeners = new Map();
            }

            subscribe(event, callback) {
                if (!this.listeners.has(event)) {
                    this.listeners.set(event, []);
                }
                this.listeners.get(event).push(callback);
            }

            unsubscribe(event, callback) {
                if (this.listeners.has(event)) {
                    const callbacks = this.listeners.get(event);
                    const index = callbacks.indexOf(callback);
                    if (index > -1) {
                        callbacks.splice(index, 1);
                    }
                }
            }

            dispatch(event, data) {
                if (this.listeners.has(event)) {
                    this.listeners.get(event).forEach(callback => {
                        try {
                            callback(data);
                        } catch (error) {
                            console.error(`Error in event listener for ${event}:`, error);
                        }
                    });
                }
            }
        }

        // 游戏状态管理器
        class GameStateManager {
            constructor() {
                this.currentState = GameStates.MENU;
                this.previousState = null;
                this.stateHistory = [];
                this.eventDispatcher = new StateEventDispatcher();
                
                // 状态转换规则
                this.transitions = new Map([
                    [GameStates.MENU, [GameStates.RUNNING, GameStates.LOADING]],
                    [GameStates.RUNNING, [GameStates.PAUSED, GameStates.ENDED, GameStates.MENU]],
                    [GameStates.PAUSED, [GameStates.RUNNING, GameStates.ENDED, GameStates.MENU]],
                    [GameStates.ENDED, [GameStates.MENU, GameStates.RUNNING]],
                    [GameStates.LOADING, [GameStates.RUNNING, GameStates.MENU]]
                ]);
            }

            setState(newState) {
                if (!this.canTransition(this.currentState, newState)) {
                    console.warn(`Invalid state transition from ${this.currentState} to ${newState}`);
                    return false;
                }

                this.previousState = this.currentState;
                this.stateHistory.push(this.currentState);
                this.currentState = newState;

                // 限制历史记录长度
                if (this.stateHistory.length > 10) {
                    this.stateHistory.shift();
                }

                this.eventDispatcher.dispatch('stateChange', {
                    from: this.previousState,
                    to: this.currentState,
                    timestamp: Date.now()
                });

                return true;
            }

            getState() {
                return this.currentState;
            }

            getPreviousState() {
                return this.previousState;
            }

            canTransition(fromState, toState) {
                const allowedTransitions = this.transitions.get(fromState);
                return allowedTransitions && allowedTransitions.includes(toState);
            }

            onStateChange(callback) {
                this.eventDispatcher.subscribe('stateChange', callback);
            }

            isState(state) {
                return this.currentState === state;
            }

            isAnyState(states) {
                return states.includes(this.currentState);
            }
        }

        // 暂停控制器
        class PauseController {
            constructor(stateManager) {
                this.stateManager = stateManager;
                this.savedGameState = null;
                this.pauseTime = null;
                this.totalPausedTime = 0;
            }

            pause() {
                if (this.stateManager.isState(GameStates.RUNNING)) {
                    this.pauseTime = Date.now();
                    this.saveGameState();
                    return this.stateManager.setState(GameStates.PAUSED);
                }
                return false;
            }

            resume() {
                if (this.stateManager.isState(GameStates.PAUSED)) {
                    if (this.pauseTime) {
                        this.totalPausedTime += Date.now() - this.pauseTime;
                        this.pauseTime = null;
                    }
                    return this.stateManager.setState(GameStates.RUNNING);
                }
                return false;
            }

            toggle() {
                if (this.stateManager.isState(GameStates.RUNNING)) {
                    return this.pause();
                } else if (this.stateManager.isState(GameStates.PAUSED)) {
                    return this.resume();
                }
                return false;
            }

            isPaused() {
                return this.stateManager.isState(GameStates.PAUSED);
            }

            saveGameState() {
                // 保存当前游戏状态到localStorage
                const gameData = {
                    score: parseInt(document.getElementById('score').textContent) || 0,
                    level: parseInt(document.getElementById('level').textContent) || 1,
                    lines: parseInt(document.getElementById('lines').textContent) || 0,
                    timestamp: Date.now(),
                    totalPausedTime: this.totalPausedTime
                };
                
                try {
                    localStorage.setItem('tetris_paused_state', JSON.stringify(gameData));
                    this.savedGameState = gameData;
                } catch (error) {
                    console.error('Failed to save game state:', error);
                }
            }

            loadGameState() {
                try {
                    const saved = localStorage.getItem('tetris_paused_state');
                    if (saved) {
                        this.savedGameState = JSON.parse(saved);
                        return this.savedGameState;
                    }
                } catch (error) {
                    console.error('Failed to load game state:', error);
                }
                return null;
            }

            clearSavedState() {
                try {
                    localStorage.removeItem('tetris_paused_state');
                    this.savedGameState = null;
                    this.totalPausedTime = 0;
                } catch (error) {
                    console.error('Failed to clear saved state:', error);
                }
            }
        }

        // 游戏生命周期管理器
        class GameLifecycleManager {
            constructor(stateManager, pauseController) {
                this.stateManager = stateManager;
                this.pauseController = pauseController;
                this.gameStartTime = null;
                this.gameEndTime = null;
                this.gameStats = {
                    gamesPlayed: 0,
                    totalScore: 0,
                    bestScore: 0,
                    totalTime: 0
                };
                this.loadStats();
            }

            startGame() {
                if (this.stateManager.canTransition(this.stateManager.getState(), GameStates.RUNNING)) {
                    this.gameStartTime = Date.now();
                    this.gameEndTime = null;
                    this.pauseController.clearSavedState();
                    this.resetGameUI();
                    return this.stateManager.setState(GameStates.RUNNING);
                }
                return false;
            }

            restartGame() {
                this.endGame();
                setTimeout(() => {
                    this.startGame();
                }, 100);
            }

            endGame() {
                if (this.stateManager.isAnyState([GameStates.RUNNING, GameStates.PAUSED])) {
                    this.gameEndTime = Date.now();
                    this.updateStats();
                    this.pauseController.clearSavedState();
                    return this.stateManager.setState(GameStates.ENDED);
                }
                return false;
            }

            resetGame() {
                this.gameStartTime = null;
                this.gameEndTime = null;
                this.pauseController.clearSavedState();
                this.resetGameUI();
                return this.stateManager.setState(GameStates.MENU);
            }

            resetGameUI() {
                document.getElementById('score').textContent = '0';
                document.getElementById('level').textContent = '1';
                document.getElementById('lines').textContent = '0';
            }

            updateStats() {
                const currentScore = parseInt(document.getElementById('score').textContent) || 0;
                const gameTime = this.gameEndTime - this.gameStartTime - this.pauseController.totalPausedTime;
                
                this.gameStats.gamesPlayed++;
                this.gameStats.totalScore += currentScore;
                this.gameStats.totalTime += gameTime;
                
                if (currentScore > this.gameStats.bestScore) {
                    this.gameStats.bestScore = currentScore;
                }
                
                this.saveStats();
            }

            saveStats() {
                try {
                    localStorage.setItem('tetris_stats', JSON.stringify(this.gameStats));
                } catch (error) {
                    console.error('Failed to save stats:', error);
                }
            }

            loadStats() {
                try {
                    const saved = localStorage.getItem('tetris_stats');
                    if (saved) {
                        this.gameStats = { ...this.gameStats, ...JSON.parse(saved) };
                    }
                } catch (error) {
                    console.error('Failed to load stats:', error);
                }
            }

            getStats() {
                return { ...this.gameStats };
            }
        }

        // UI状态控制器
        class UIStateController {
            constructor(stateManager) {
                this.stateManager = stateManager;
                this.elements = {
                    gameStatus: document.getElementById('gameStatus'),
                    gameState: document.getElementById('gameState'),
                    startBtn: document.getElementById('startBtn'),
                    pauseBtn: document.getElementById('pauseBtn'),
                    restartBtn: document.getElementById('restartBtn'),
                    resumeBtn: document.getElementById('resumeBtn'),
                    exitBtn: document.getElementById('exitBtn'),
                    pauseOverlay: document.getElementById('pauseOverlay')
                };
                
                this.stateManager.onStateChange((data) => {
                    this.updateUI(data.to);
                });
            }

            updateUI(state) {
                this.updateGameStatus(state);
                this.updateButtons(state);
                this.updatePauseOverlay(state);
                this.updateGameStateDisplay(state);
            }

            updateGameStatus(state) {
                const statusElement = this.elements.gameStatus;
                statusElement.className = 'game-status';
                
                switch (state) {
                    case GameStates.MENU:
                        statusElement.textContent = '准备开始';
                        statusElement.classList.add('menu');
                        break;
                    case GameStates.RUNNING:
                        statusElement.textContent = '游戏中';
                        statusElement.classList.add('running');
                        break;
                    case GameStates.PAUSED:
                        statusElement.textContent = '已暂停';
                        statusElement.classList.add('paused');
                        break;
                    case GameStates.ENDED:
                        statusElement.textContent = '游戏结束';
                        statusElement.classList.add('ended');
                        break;
                    case GameStates.LOADING:
                        statusElement.textContent = '加载中';
                        statusElement.classList.add('loading');
                        break;
                }
            }

            updateButtons(state) {
                const { startBtn, pauseBtn, restartBtn } = this.elements;
                
                switch (state) {
                    case GameStates.MENU:
                        startBtn.disabled = false;
                        startBtn.textContent = '开始游戏';
                        pauseBtn.disabled = true;
                        restartBtn.disabled = true;
                        break;
                    case GameStates.RUNNING:
                        startBtn.disabled = true;
                        pauseBtn.disabled = false;
                        pauseBtn.textContent = '暂停';
                        restartBtn.disabled = false;
                        break;
                    case GameStates.PAUSED:
                        startBtn.disabled = true;
                        pauseBtn.disabled = false;
                        pauseBtn.textContent = '继续';
                        restartBtn.disabled = false;
                        break;
                    case GameStates.ENDED:
                        startBtn.disabled = false;
                        startBtn.textContent = '重新开始';
                        pauseBtn.disabled = true;
                        restartBtn.disabled = false;
                        break;
                }
            }

            updatePauseOverlay(state) {
                const overlay = this.elements.pauseOverlay;
                if (state === GameStates.PAUSED) {
                    this.showPauseOverlay();
                } else {
                    this.hidePauseOverlay();
                }
            }

            updateGameStateDisplay(state) {
                const stateNames = {
                    [GameStates.MENU]: '准备',
                    [GameStates.RUNNING]: '运行中',
                    [GameStates.PAUSED]: '暂停',
                    [GameStates.ENDED]: '结束',
                    [GameStates.LOADING]: '加载中'
                };
                
                this.elements.gameState.textContent = stateNames[state] || '未知';
            }

            showPauseOverlay() {
                this.elements.pauseOverlay.classList.add('active');
            }

            hidePauseOverlay() {
                this.elements.pauseOverlay.classList.remove('active');
            }
        }

        // 输入状态过滤器
        class InputStateFilter {
            constructor(stateManager) {
                this.stateManager = stateManager;
                this.inputEnabled = true;
                this.stateInputHandlers = new Map();
                this.setupDefaultHandlers();
            }

            setupDefaultHandlers() {
                // 为不同状态设置默认输入处理器
                this.registerStateInput(GameStates.RUNNING, (input) => {
                    // 游戏运行时的输入处理
                    return this.inputEnabled;
                });
                
                this.registerStateInput(GameStates.PAUSED, (input) => {
                    // 暂停时只允许特定输入
                    const allowedKeys = ['Space', 'Escape'];
                    return allowedKeys.includes(input.code);
                });
                
                this.registerStateInput(GameStates.MENU, (input) => {
                    // 菜单状态下的输入处理
                    return true;
                });
                
                this.registerStateInput(GameStates.ENDED, (input) => {
                    // 游戏结束时的输入处理
                    return true;
                });
            }

            filterInput(input, state = null) {
                const currentState = state || this.stateManager.getState();
                const handler = this.stateInputHandlers.get(currentState);
                
                if (handler) {
                    return handler(input);
                }
                
                return this.inputEnabled;
            }

            enableInput() {
                this.inputEnabled = true;
            }

            disableInput() {
                this.inputEnabled = false;
            }

            registerStateInput(state, handler) {
                this.stateInputHandlers.set(state, handler);
            }
        }

        // 简单的俄罗斯方块游戏逻辑（示例）
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gameLoop = null;
                this.lastTime = 0;
                this.dropTime = 0;
                this.dropInterval = 1000;
                
                // 游戏数据
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                
                // 游戏网格
                this.grid = this.createGrid(10, 20);
            }

            createGrid(width, height) {
                const grid = [];
                for (let y = 0; y < height; y++) {
                    grid[y] = new Array(width).fill(0);
                }
                return grid;
            }

            start() {
                this.reset();
                this.gameLoop = requestAnimationFrame((time) => this.update(time));
            }

            stop() {
                if (this.gameLoop) {
                    cancelAnimationFrame(this.gameLoop);
                    this.gameLoop = null;
                }
            }

            pause() {
                this.stop();
            }

            resume() {
                this.gameLoop = requestAnimationFrame((time) => this.update(time));
            }

            reset() {
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.grid = this.createGrid(10, 20);
                this.updateUI();
            }

            update(time) {
                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                
                this.dropTime += deltaTime;
                if (this.dropTime > this.dropInterval) {
                    this.dropTime = 0;
                    // 这里应该有方块下落逻辑
                }
                
                this.draw();
                
                if (gameStateManager.isState(GameStates.RUNNING)) {
                    this.gameLoop = requestAnimationFrame((time) => this.update(time));
                }
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.drawGrid();
                
                // 这里应该绘制方块
            }

            drawGrid() {
                const blockSize = 30;
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x <= 10; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * blockSize, 0);
                    this.ctx.lineTo(x * blockSize, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= 20; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * blockSize);
                    this.ctx.lineTo(this.canvas.width, y * blockSize);
                    this.ctx.stroke();
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            addScore(points) {
                this.score += points;
                this.updateUI();
            }

            addLines(count) {
                this.lines += count;
                this.level = Math.floor(this.lines / 10) + 1;
                this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                this.updateUI();
            }
        }

        // 初始化游戏系统
        const gameStateManager = new GameStateManager();
        const pauseController = new PauseController(gameStateManager);
        const lifecycleManager = new GameLifecycleManager(gameStateManager, pauseController);
        const uiController = new UIStateController(gameStateManager);
        const inputFilter = new InputStateFilter(gameStateManager);
        const tetrisGame = new TetrisGame();

        // 事件监听器设置
        function setupEventListeners() {
            // 按钮事件
            document.getElementById('startBtn').addEventListener('click', () => {
                if (gameStateManager.isState(GameStates.MENU)) {
                    lifecycleManager.startGame();
                    tetrisGame.start();
                } else if (gameStateManager.isState(GameStates.ENDED)) {
                    lifecycleManager.restartGame();
                    tetrisGame.start();
                }
            });

            document.getElementById('pauseBtn').addEventListener('click', () => {
                if (gameStateManager.isState(GameStates.RUNNING)) {
                    pauseController.pause();
                    tetrisGame.pause();
                } else if (gameStateManager.isState(GameStates.PAUSED)) {
                    pauseController.resume();
                    tetrisGame.resume();
                }
            });

            document.getElementById('restartBtn').addEventListener('click', () => {
                lifecycleManager.restartGame();
                tetrisGame.start();
            });

            document.getElementById('resumeBtn').addEventListener('click', () => {
                pauseController.resume();
                tetrisGame.resume();
            });

            document.getElementById('exitBtn').addEventListener('click', () => {
                lifecycleManager.resetGame();
                tetrisGame.stop();
            });

            // 键盘事件
            document.addEventListener('keydown', (e) => {
                if (!inputFilter.filterInput(e)) {
                    return;
                }

                switch (e.code) {
                    case 'Space':
                        e.preventDefault();
                        if (gameStateManager.isState(GameStates.RUNNING)) {
                            pauseController.pause();
                            tetrisGame.pause();
                        } else if (gameStateManager.isState(GameStates.PAUSED)) {
                            pauseController.resume();
                            tetrisGame.resume();
                        }
                        break;
                    case 'Escape':
                        e.preventDefault();
                        if (gameStateManager.isAnyState([GameStates.RUNNING, GameStates.PAUSED])) {
                            lifecycleManager.resetGame();
                            tetrisGame.stop();
                        }
                        break;
                    case 'ArrowLeft':
                    case 'ArrowRight':
                    case 'ArrowUp':
                    case 'ArrowDown':
                        if (gameStateManager.isState(GameStates.RUNNING)) {
                            e.preventDefault();
                            // 这里应该处理游戏输入
                        }
                        break;
                }
            });

            // 窗口失焦时自动暂停
            window.addEventListener('blur', () => {
                if (gameStateManager.isState(GameStates.RUNNING)) {
                    pauseController.pause();
                    tetrisGame.pause();
                }
            });

            // 页面可见性变化时的处理
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && gameStateManager.isState(GameStates.RUNNING)) {
                    pauseController.pause();
                    tetrisGame.pause();
                }
            });
        }

        // 状态变化监听
        gameStateManager.onStateChange((data) => {
            console.log(`Game state changed from ${data.from} to ${data.to}`);
            
            // 根据状态变化执行相应操作
            switch (data.to) {
                case GameStates.RUNNING:
                    console.log('Game started/resumed');
                    break;
                case GameStates.PAUSED:
                    console.log('Game paused');
                    break;
                case GameStates.ENDED:
                    console.log('Game ended');
                    break;
                case GameStates.MENU:
                    console.log('Returned to menu');
                    break;
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            
            // 检查是否有保存的游戏状态
            const savedState = pauseController.loadGameState();
            if (savedState) {
                console.log('Found saved game state:', savedState);
                // 可以选择恢复游戏状态
            }
            
            // 初始化UI
            uiController.updateUI(gameStateManager.getState());
            
            console.log('Game system initialized');
        });

        // 导出全局对象供调试使用
        window.GameSystem = {
            stateManager: gameStateManager,
            pauseController,
            lifecycleManager,
            uiController,
            inputFilter,
            tetrisGame,
            GameStates
        };
    </script>
</body>
</html>

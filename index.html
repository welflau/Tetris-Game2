<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
            position: relative;
        }

        /* 游戏面板 */
        .game-board {
            width: 300px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            position: relative;
            overflow: hidden;
        }

        /* 游戏信息面板 */
        .game-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 200px;
        }

        /* 分数显示 */
        .score-panel {
            background: var(--bg-glass);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            text-align: center;
        }

        .score-panel h3 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .score-value {
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* 控制面板 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-light);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #e68900;
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-disabled:hover {
            transform: none;
            box-shadow: var(--shadow-light);
            background: #666;
        }

        /* 暂停覆盖层 */
        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .pause-overlay.show {
            display: flex;
        }

        .pause-menu {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
            text-align: center;
            min-width: 300px;
        }

        .pause-menu h2 {
            color: var(--text-light);
            font-size: 2rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .pause-menu .control-btn {
            width: 100%;
            margin-bottom: 1rem;
        }

        /* 游戏状态指示器 */
        .game-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-running {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .status-paused {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .status-game-over {
            background: var(--danger-color);
            color: var(--text-light);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
            }

            .game-board {
                width: 250px;
                height: 500px;
            }

            .game-info {
                min-width: auto;
            }

            .control-panel {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .control-btn {
                flex: 1;
                min-width: 120px;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .pause-menu {
            animation: fadeIn 0.3s ease-out;
        }

        /* 键盘提示 */
        .keyboard-hints {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .keyboard-hints h4 {
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .keyboard-hints p {
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
        <div class="game-status status-running" id="gameStatus">运行中</div>
    </header>

    <main>
        <div class="game-container">
            <div class="game-board" id="gameBoard">
                <!-- 游戏画布将在这里渲染 -->
            </div>

            <div class="game-info">
                <div class="score-panel">
                    <h3>分数</h3>
                    <div class="score-value" id="score">0</div>
                </div>

                <div class="score-panel">
                    <h3>等级</h3>
                    <div class="score-value" id="level">1</div>
                </div>

                <div class="score-panel">
                    <h3>行数</h3>
                    <div class="score-value" id="lines">0</div>
                </div>

                <div class="control-panel" id="controlPanel">
                    <button class="control-btn btn-primary" id="startBtn">开始游戏</button>
                    <button class="control-btn btn-secondary btn-disabled" id="pauseBtn" disabled>暂停</button>
                    <button class="control-btn btn-danger" id="restartBtn">重新开始</button>
                </div>

                <div class="keyboard-hints">
                    <h4>键盘操作</h4>
                    <p>← → : 左右移动</p>
                    <p>↓ : 快速下降</p>
                    <p>↑ : 旋转方块</p>
                    <p>空格 : 暂停/继续</p>
                    <p>R : 重新开始</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 暂停覆盖层 -->
    <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-menu">
            <h2>游戏暂停</h2>
            <button class="control-btn btn-primary" id="resumeBtn">继续游戏</button>
            <button class="control-btn btn-danger" id="restartFromPauseBtn">重新开始</button>
            <button class="control-btn btn-secondary" id="exitBtn">退出游戏</button>
        </div>
    </div>

    <script>
        // 游戏状态枚举
        const GameStates = {
            IDLE: 'idle',
            RUNNING: 'running',
            PAUSED: 'paused',
            GAME_OVER: 'game_over'
        };

        // 游戏状态管理器
        class GameStateManager {
            constructor() {
                this.currentState = GameStates.IDLE;
                this.previousState = null;
                this.stateChangeCallbacks = [];
                this.gameData = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    board: null,
                    currentPiece: null
                };
            }

            // 获取当前状态
            getCurrentState() {
                return this.currentState;
            }

            // 设置状态
            setState(newState) {
                if (this.currentState === newState) return;
                
                this.previousState = this.currentState;
                this.currentState = newState;
                
                // 触发状态变化回调
                this.stateChangeCallbacks.forEach(callback => {
                    callback(newState, this.previousState);
                });
                
                console.log(`游戏状态变化: ${this.previousState} -> ${newState}`);
            }

            // 注册状态变化回调
            onStateChange(callback) {
                this.stateChangeCallbacks.push(callback);
            }

            // 暂停游戏
            pause() {
                if (this.currentState === GameStates.RUNNING) {
                    this.setState(GameStates.PAUSED);
                    return true;
                }
                return false;
            }

            // 继续游戏
            resume() {
                if (this.currentState === GameStates.PAUSED) {
                    this.setState(GameStates.RUNNING);
                    return true;
                }
                return false;
            }

            // 开始游戏
            start() {
                this.setState(GameStates.RUNNING);
            }

            // 重新开始游戏
            restart() {
                this.gameData = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    board: null,
                    currentPiece: null
                };
                this.setState(GameStates.RUNNING);
            }

            // 游戏结束
            gameOver() {
                this.setState(GameStates.GAME_OVER);
            }

            // 保存游戏状态
            saveGameState(gameData) {
                this.gameData = { ...this.gameData, ...gameData };
            }

            // 获取游戏数据
            getGameData() {
                return { ...this.gameData };
            }
        }

        // 暂停覆盖层管理
        class PauseOverlay {
            constructor(gameStateManager) {
                this.gameStateManager = gameStateManager;
                this.overlay = document.getElementById('pauseOverlay');
                this.resumeBtn = document.getElementById('resumeBtn');
                this.restartFromPauseBtn = document.getElementById('restartFromPauseBtn');
                this.exitBtn = document.getElementById('exitBtn');
                
                this.bindEvents();
            }

            // 显示暂停覆盖层
            show() {
                this.overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            // 隐藏暂停覆盖层
            hide() {
                this.overlay.classList.remove('show');
                document.body.style.overflow = 'auto';
            }

            // 渲染暂停菜单
            renderPauseMenu() {
                // 暂停菜单已在HTML中定义，这里可以动态更新内容
                const gameData = this.gameStateManager.getGameData();
                // 可以在这里添加更多暂停时的信息显示
            }

            // 绑定事件
            bindEvents() {
                // 继续游戏
                this.resumeBtn.addEventListener('click', () => {
                    this.gameStateManager.resume();
                });

                // 从暂停菜单重新开始
                this.restartFromPauseBtn.addEventListener('click', () => {
                    this.gameStateManager.restart();
                });

                // 退出游戏
                this.exitBtn.addEventListener('click', () => {
                    this.gameStateManager.setState(GameStates.IDLE);
                });

                // 点击覆盖层外部继续游戏
                this.overlay.addEventListener('click', (e) => {
                    if (e.target === this.overlay) {
                        this.gameStateManager.resume();
                    }
                });

                // ESC键继续游戏
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.gameStateManager.getCurrentState() === GameStates.PAUSED) {
                        this.gameStateManager.resume();
                    }
                });
            }
        }

        // 游戏控制面板
        class GameControlPanel {
            constructor(gameStateManager) {
                this.gameStateManager = gameStateManager;
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.restartBtn = document.getElementById('restartBtn');
                
                this.bindControlEvents();
                this.updateButtonStates();
            }

            // 渲染控制面板
            render() {
                this.updateButtonStates();
            }

            // 更新按钮状态
            updateButtonStates() {
                const currentState = this.gameStateManager.getCurrentState();
                
                switch (currentState) {
                    case GameStates.IDLE:
                        this.startBtn.textContent = '开始游戏';
                        this.startBtn.disabled = false;
                        this.startBtn.className = 'control-btn btn-primary';
                        
                        this.pauseBtn.textContent = '暂停';
                        this.pauseBtn.disabled = true;
                        this.pauseBtn.className = 'control-btn btn-secondary btn-disabled';
                        
                        this.restartBtn.disabled = false;
                        this.restartBtn.className = 'control-btn btn-danger';
                        break;
                        
                    case GameStates.RUNNING:
                        this.startBtn.textContent = '游戏中';
                        this.startBtn.disabled = true;
                        this.startBtn.className = 'control-btn btn-primary btn-disabled';
                        
                        this.pauseBtn.textContent = '暂停';
                        this.pauseBtn.disabled = false;
                        this.pauseBtn.className = 'control-btn btn-secondary';
                        
                        this.restartBtn.disabled = false;
                        this.restartBtn.className = 'control-btn btn-danger';
                        break;
                        
                    case GameStates.PAUSED:
                        this.startBtn.textContent = '游戏中';
                        this.startBtn.disabled = true;
                        this.startBtn.className = 'control-btn btn-primary btn-disabled';
                        
                        this.pauseBtn.textContent = '继续';
                        this.pauseBtn.disabled = false;
                        this.pauseBtn.className = 'control-btn btn-primary';
                        
                        this.restartBtn.disabled = false;
                        this.restartBtn.className = 'control-btn btn-danger';
                        break;
                        
                    case GameStates.GAME_OVER:
                        this.startBtn.textContent = '重新开始';
                        this.startBtn.disabled = false;
                        this.startBtn.className = 'control-btn btn-primary';
                        
                        this.pauseBtn.textContent = '暂停';
                        this.pauseBtn.disabled = true;
                        this.pauseBtn.className = 'control-btn btn-secondary btn-disabled';
                        
                        this.restartBtn.disabled = false;
                        this.restartBtn.className = 'control-btn btn-danger';
                        break;
                }
            }

            // 绑定控制事件
            bindControlEvents() {
                // 开始/重新开始按钮
                this.startBtn.addEventListener('click', () => {
                    const currentState = this.gameStateManager.getCurrentState();
                    if (currentState === GameStates.IDLE || currentState === GameStates.GAME_OVER) {
                        if (currentState === GameStates.GAME_OVER) {
                            this.gameStateManager.restart();
                        } else {
                            this.gameStateManager.start();
                        }
                    }
                });

                // 暂停/继续按钮
                this.pauseBtn.addEventListener('click', () => {
                    const currentState = this.gameStateManager.getCurrentState();
                    if (currentState === GameStates.RUNNING) {
                        this.gameStateManager.pause();
                    } else if (currentState === GameStates.PAUSED) {
                        this.gameStateManager.resume();
                    }
                });

                // 重新开始按钮
                this.restartBtn.addEventListener('click', () => {
                    if (confirm('确定要重新开始游戏吗？当前进度将会丢失。')) {
                        this.gameStateManager.restart();
                    }
                });
            }
        }

        // 状态转换处理器
        class StateTransitionHandler {
            constructor(gameStateManager) {
                this.gameStateManager = gameStateManager;
                this.gameLoop = null;
                this.gameData = {
                    score: 0,
                    level: 1,
                    lines: 0
                };
                
                // 监听状态变化
                this.gameStateManager.onStateChange((newState, oldState) => {
                    this.handleStateTransition(newState, oldState);
                });
            }

            // 处理状态转换
            handleStateTransition(newState, oldState) {
                console.log(`处理状态转换: ${oldState} -> ${newState}`);
                
                switch (newState) {
                    case GameStates.RUNNING:
                        if (oldState === GameStates.PAUSED) {
                            this.handleResume();
                        } else {
                            this.handleStart();
                        }
                        break;
                        
                    case GameStates.PAUSED:
                        this.handlePause();
                        break;
                        
                    case GameStates.GAME_OVER:
                        this.handleGameOver();
                        break;
                        
                    case GameStates.IDLE:
                        this.handleStop();
                        break;
                }
                
                // 更新UI状态
                this.updateGameStatus(newState);
            }

            // 处理游戏开始
            handleStart() {
                console.log('开始游戏');
                this.startGameLoop();
                this.updateScore();
            }

            // 处理暂停
            handlePause() {
                console.log('暂停游戏');
                this.saveGameState();
                this.stopGameLoop();
                // 显示暂停覆盖层将由PauseOverlay处理
            }

            // 处理继续
            handleResume() {
                console.log('继续游戏');
                this.restoreGameState();
                this.startGameLoop();
            }

            // 处理重新开始
            handleRestart() {
                console.log('重新开始游戏');
                this.resetGameData();
                this.startGameLoop();
                this.updateScore();
            }

            // 处理游戏结束
            handleGameOver() {
                console.log('游戏结束');
                this.stopGameLoop();
                alert(`游戏结束！\n最终分数: ${this.gameData.score}\n消除行数: ${this.gameData.lines}\n达到等级: ${this.gameData.level}`);
            }

            // 处理停止
            handleStop() {
                console.log('停止游戏');
                this.stopGameLoop();
                this.resetGameData();
                this.updateScore();
            }

            // 开始游戏循环
            startGameLoop() {
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                }
                
                this.gameLoop = setInterval(() => {
                    if (this.gameStateManager.getCurrentState() === GameStates.RUNNING) {
                        this.gameStep();
                    }
                }, 1000 / this.gameData.level); // 根据等级调整速度
            }

            // 停止游戏循环
            stopGameLoop() {
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
            }

            // 游戏步骤（简化版本）
            gameStep() {
                // 这里应该包含实际的游戏逻辑
                // 为了演示，我们只是简单地增加分数
                this.gameData.score += 10;
                this.gameData.lines += Math.random() < 0.1 ? 1 : 0;
                this.gameData.level = Math.floor(this.gameData.lines / 10) + 1;
                
                this.updateScore();
                
                // 模拟游戏结束条件
                if (this.gameData.score > 5000) {
                    this.gameStateManager.gameOver();
                }
            }

            // 保存游戏状态
            saveGameState() {
                this.gameStateManager.saveGameState(this.gameData);
                localStorage.setItem('tetris_save', JSON.stringify(this.gameData));
            }

            // 恢复游戏状态
            restoreGameState() {
                const savedData = this.gameStateManager.getGameData();
                if (savedData.score !== undefined) {
                    this.gameData = { ...savedData };
                }
            }

            // 重置游戏数据
            resetGameData() {
                this.gameData = {
                    score: 0,
                    level: 1,
                    lines: 0
                };
                localStorage.removeItem('tetris_save');
            }

            // 更新分数显示
            updateScore() {
                document.getElementById('score').textContent = this.gameData.score;
                document.getElementById('level').textContent = this.gameData.level;
                document.getElementById('lines').textContent = this.gameData.lines;
            }

            // 更新游戏状态显示
            updateGameStatus(state) {
                const statusElement = document.getElementById('gameStatus');
                statusElement.className = 'game-status';
                
                switch (state) {
                    case GameStates.IDLE:
                        statusElement.textContent = '待机';
                        statusElement.classList.add('status-running');
                        break;
                    case GameStates.RUNNING:
                        statusElement.textContent = '运行中';
                        statusElement.classList.add('status-running');
                        break;
                    case GameStates.PAUSED:
                        statusElement.textContent = '已暂停';
                        statusElement.classList.add('status-paused');
                        break;
                    case GameStates.GAME_OVER:
                        statusElement.textContent = '游戏结束';
                        statusElement.classList.add('status-game-over');
                        break;
                }
            }
        }

        // 主游戏类
        class TetrisGame {
            constructor() {
                this.gameStateManager = new GameStateManager();
                this.pauseOverlay = new PauseOverlay(this.gameStateManager);
                this.controlPanel = new GameControlPanel(this.gameStateManager);
                this.stateHandler = new StateTransitionHandler(this.gameStateManager);
                
                this.initializeGame();
                this.bindGlobalEvents();
            }

            // 初始化游戏
            initializeGame() {
                // 监听状态变化来控制暂停覆盖层
                this.gameStateManager.onStateChange((newState, oldState) => {
                    if (newState === GameStates.PAUSED) {
                        this.pauseOverlay.show();
                    } else if (oldState === GameStates.PAUSED) {
                        this.pauseOverlay.hide();
                    }
                    
                    // 更新控制面板
                    this.controlPanel.updateButtonStates();
                });
            }

            // 绑定全局事件
            bindGlobalEvents() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    this.handleKeyPress(e);
                });

                // 防止页面刷新时丢失游戏状态
                window.addEventListener('beforeunload', (e) => {
                    if (this.gameStateManager.getCurrentState() === GameStates.RUNNING) {
                        e.preventDefault();
                        e.returnValue = '游戏正在进行中，确定要离开吗？';
                    }
                });

                // 页面失去焦点时自动暂停
                window.addEventListener('blur', () => {
                    if (this.gameStateManager.getCurrentState() === GameStates.RUNNING) {
                        this.gameStateManager.pause();
                    }
                });
            }

            // 处理键盘按键
            handleKeyPress(e) {
                const currentState = this.gameStateManager.getCurrentState();
                
                switch (e.key) {
                    case ' ': // 空格键暂停/继续
                        e.preventDefault();
                        if (currentState === GameStates.RUNNING) {
                            this.gameStateManager.pause();
                        } else if (currentState === GameStates.PAUSED) {
                            this.gameStateManager.resume();
                        }
                        break;
                        
                    case 'r':
                    case 'R': // R键重新开始
                        if (confirm('确定要重新开始游戏吗？')) {
                            this.gameStateManager.restart();
                        }
                        break;
                        
                    case 'ArrowLeft':
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case 'ArrowUp':
                        // 游戏控制键（只在运行状态下有效）
                        if (currentState === GameStates.RUNNING) {
                            e.preventDefault();
                            this.handleGameControl(e.key);
                        }
                        break;
                }
            }

            // 处理游戏控制
            handleGameControl(key) {
                // 这里应该包含实际的游戏控制逻辑
                console.log(`游戏控制: ${key}`);
                // 例如：移动方块、旋转方块等
            }
        }

        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            const game = new TetrisGame();
            console.log('俄罗斯方块游戏初始化完成');
        });
    </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello World - 一个简单的问候页面">
    <meta name="keywords" content="Hello World, 问候, 欢迎">
    <meta name="author" content="AI开发系统">
    <title>Hello World</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 内容容器 */
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        /* 主标题 */
        .main-title {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        /* 描述文本 */
        .description {
            font-size: 1rem;
            color: #777;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        /* 按钮样式 */
        .welcome-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .welcome-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .welcome-btn:active {
            transform: translateY(0);
        }

        /* 页脚 */
        footer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        footer p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }

            .container {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }

            .main-title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            header h1 {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 12px;
            }

            .main-title {
                font-size: 2rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .welcome-btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInUp 0.8s ease-out;
        }

        /* 可访问性增强 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 高对比度模式支持 */
        @media (prefers-contrast: high) {
            .container {
                background: white;
                border: 2px solid #000;
            }

            .main-title {
                color: #000;
            }

            .subtitle, .description {
                color: #333;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网站</h1>
    </header>

    <main>
        <div class="container">
            <h2 class="main-title">Hello World!</h2>
            <p class="subtitle">欢迎来到这个美好的世界</p>
            <div class="description">
                <p>这是一个使用现代Web技术构建的Hello World页面。</p>
                <p>采用了语义化HTML5标签、响应式CSS设计和现代化的用户界面。</p>
                <p>页面支持多种设备访问，并遵循Web可访问性标准。</p>
            </div>
            <button class="welcome-btn" onclick="showWelcomeMessage()">点击问候</button>
            <div id="message-area" style="margin-top: 1rem; min-height: 2rem;"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Hello World Project. 由AI开发系统自动生成。</p>
    </footer>

    <script>
        // 问候消息功能
        function showWelcomeMessage() {
            const messageArea = document.getElementById('message-area');
            const messages = [
                '🎉 欢迎！很高兴见到你！',
                '✨ Hello! 希望你今天过得愉快！',
                '🌟 你好！欢迎探索这个页面！',
                '🎈 嗨！感谢你的访问！',
                '🌈 Hello World! 让我们开始这段旅程吧！'
            ];
            
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            // 创建消息元素
            const messageElement = document.createElement('p');
            messageElement.textContent = randomMessage;
            messageElement.style.cssText = `
                color: #667eea;
                font-weight: 600;
                font-size: 1.1rem;
                margin: 0;
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s ease;
            `;
            
            // 清空之前的消息
            messageArea.innerHTML = '';
            messageArea.appendChild(messageElement);
            
            // 触发动画
            setTimeout(() => {
                messageElement.style.opacity = '1';
                messageElement.style.transform = 'translateY(0)';
            }, 10);
            
            // 3秒后淡出消息
            setTimeout(() => {
                messageElement.style.opacity = '0';
                messageElement.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    if (messageArea.contains(messageElement)) {
                        messageArea.removeChild(messageElement);
                    }
                }, 300);
            }, 3000);
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Hello World 页面加载完成！');
            
            // 添加键盘支持
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && event.target.classList.contains('welcome-btn')) {
                    showWelcomeMessage();
                }
            });
            
            // 添加页面可见性检测
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    console.log('欢迎回来！');
                }
            });
        });

        // 响应式字体大小调整
        function adjustFontSize() {
            const container = document.querySelector('.container');
            const windowWidth = window.innerWidth;
            
            if (windowWidth < 480) {
                document.documentElement.style.fontSize = '12px';
            } else if (windowWidth < 768) {
                document.documentElement.style.fontSize = '14px';
            } else {
                document.documentElement.style.fontSize = '16px';
            }
        }

        // 监听窗口大小变化
        window.addEventListener('resize', adjustFontSize);
        
        // 初始调整
        adjustFontSize();
    </script>
</body>
</html>

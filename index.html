<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
            max-width: 800px;
            width: 100%;
        }

        /* 游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: var(--shadow-light);
        }

        /* 侧边栏 */
        .sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
        }

        .info-panel h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: var(--accent-color);
        }

        .info-panel p {
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #f57c00;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #d32f2f;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        /* 设置面板 */
        .settings-panel {
            background: var(--bg-glass);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .setting-item label {
            font-size: 0.9rem;
        }

        .setting-item input[type="range"] {
            width: 80px;
        }

        .setting-item input[type="checkbox"] {
            transform: scale(1.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
                gap: 1rem;
            }

            .sidebar {
                width: 100%;
            }

            #gameCanvas {
                width: 100%;
                max-width: 300px;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 通知样式 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius);
            color: var(--text-light);
            font-weight: 600;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--accent-color);
        }

        .notification.error {
            background: var(--danger-color);
        }

        .notification.warning {
            background: var(--warning-color);
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-area">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>

            <div class="sidebar">
                <div class="info-panel">
                    <h3>游戏信息</h3>
                    <p>分数: <span id="score">0</span></p>
                    <p>等级: <span id="level">1</span></p>
                    <p>行数: <span id="lines">0</span></p>
                    <p>最高分: <span id="highScore">0</span></p>
                </div>

                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">开始游戏</button>
                    <button id="pauseBtn" class="btn btn-secondary">暂停</button>
                    <button id="resetBtn" class="btn btn-danger">重置</button>
                    <button id="saveBtn" class="btn btn-primary">保存游戏</button>
                    <button id="loadBtn" class="btn btn-secondary">加载游戏</button>
                </div>

                <div class="settings-panel">
                    <h3>设置</h3>
                    <div class="setting-item">
                        <label>音效</label>
                        <input type="checkbox" id="soundEnabled" checked>
                    </div>
                    <div class="setting-item">
                        <label>音量</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="50">
                    </div>
                    <div class="setting-item">
                        <label>自动保存</label>
                        <input type="checkbox" id="autoSave" checked>
                    </div>
                    <button id="resetSettingsBtn" class="btn btn-danger" style="margin-top: 1rem;">重置设置</button>
                </div>

                <div class="info-panel">
                    <h3>排行榜</h3>
                    <div id="highScoresList">
                        <p>暂无记录</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 数据持久化系统
        class StorageManager {
            constructor() {
                this.prefix = 'tetris_';
            }

            save(key, data) {
                try {
                    const serializedData = JSON.stringify(data);
                    localStorage.setItem(this.prefix + key, serializedData);
                    return true;
                } catch (error) {
                    console.error('存储数据失败:', error);
                    return false;
                }
            }

            load(key) {
                try {
                    const data = localStorage.getItem(this.prefix + key);
                    return data ? JSON.parse(data) : null;
                } catch (error) {
                    console.error('加载数据失败:', error);
                    return null;
                }
            }

            remove(key) {
                try {
                    localStorage.removeItem(this.prefix + key);
                    return true;
                } catch (error) {
                    console.error('删除数据失败:', error);
                    return false;
                }
            }

            clear() {
                try {
                    const keys = Object.keys(localStorage).filter(key => key.startsWith(this.prefix));
                    keys.forEach(key => localStorage.removeItem(key));
                    return true;
                } catch (error) {
                    console.error('清空数据失败:', error);
                    return false;
                }
            }

            exists(key) {
                return localStorage.getItem(this.prefix + key) !== null;
            }
        }

        class DataValidator {
            static validateGameState(data) {
                if (!data || typeof data !== 'object') return false;
                
                const requiredFields = ['score', 'level', 'lines', 'board', 'currentPiece'];
                return requiredFields.every(field => data.hasOwnProperty(field));
            }

            static validateSettings(data) {
                if (!data || typeof data !== 'object') return false;
                
                const validFields = {
                    soundEnabled: 'boolean',
                    volume: 'number',
                    autoSave: 'boolean'
                };

                return Object.keys(validFields).every(field => {
                    if (!data.hasOwnProperty(field)) return false;
                    return typeof data[field] === validFields[field];
                });
            }

            static validateScore(data) {
                if (!data || typeof data !== 'object') return false;
                
                return data.hasOwnProperty('score') && 
                       data.hasOwnProperty('date') && 
                       typeof data.score === 'number' && 
                       data.score >= 0;
            }

            static sanitizeData(data) {
                if (!data || typeof data !== 'object') return null;
                
                // 深拷贝并清理数据
                const sanitized = JSON.parse(JSON.stringify(data));
                
                // 移除可能的恶意属性
                const dangerousKeys = ['__proto__', 'constructor', 'prototype'];
                dangerousKeys.forEach(key => {
                    if (sanitized.hasOwnProperty(key)) {
                        delete sanitized[key];
                    }
                });
                
                return sanitized;
            }
        }

        class StorageEventHandler {
            constructor() {
                this.callbacks = [];
            }

            subscribe(callback) {
                this.callbacks.push(callback);
            }

            unsubscribe(callback) {
                this.callbacks = this.callbacks.filter(cb => cb !== callback);
            }

            onDataSaved(key, data) {
                this.notifyCallbacks('dataSaved', { key, data });
            }

            onDataLoaded(key, data) {
                this.notifyCallbacks('dataLoaded', { key, data });
            }

            onStorageError(error) {
                this.notifyCallbacks('storageError', { error });
            }

            notifyCallbacks(event, data) {
                this.callbacks.forEach(callback => {
                    try {
                        callback(event, data);
                    } catch (error) {
                        console.error('事件回调执行失败:', error);
                    }
                });
            }
        }

        class GameDataService {
            constructor(storageManager, eventHandler) {
                this.storage = storageManager;
                this.eventHandler = eventHandler;
            }

            saveGameState(gameState) {
                if (!DataValidator.validateGameState(gameState)) {
                    this.eventHandler.onStorageError(new Error('游戏状态数据无效'));
                    return false;
                }

                const sanitizedData = DataValidator.sanitizeData(gameState);
                const success = this.storage.save('gameState', sanitizedData);
                
                if (success) {
                    this.eventHandler.onDataSaved('gameState', sanitizedData);
                } else {
                    this.eventHandler.onStorageError(new Error('保存游戏状态失败'));
                }
                
                return success;
            }

            loadGameState() {
                const data = this.storage.load('gameState');
                
                if (data && DataValidator.validateGameState(data)) {
                    this.eventHandler.onDataLoaded('gameState', data);
                    return data;
                }
                
                return null;
            }

            saveProgress(progress) {
                const success = this.storage.save('progress', progress);
                
                if (success) {
                    this.eventHandler.onDataSaved('progress', progress);
                }
                
                return success;
            }

            loadProgress() {
                const data = this.storage.load('progress');
                
                if (data) {
                    this.eventHandler.onDataLoaded('progress', data);
                }
                
                return data;
            }

            clearGameData() {
                const keys = ['gameState', 'progress'];
                let success = true;
                
                keys.forEach(key => {
                    if (!this.storage.remove(key)) {
                        success = false;
                    }
                });
                
                return success;
            }
        }

        class SettingsService {
            constructor(storageManager, eventHandler) {
                this.storage = storageManager;
                this.eventHandler = eventHandler;
                this.defaultSettings = {
                    soundEnabled: true,
                    volume: 50,
                    autoSave: true
                };
            }

            saveSettings(settings) {
                if (!DataValidator.validateSettings(settings)) {
                    this.eventHandler.onStorageError(new Error('设置数据无效'));
                    return false;
                }

                const sanitizedData = DataValidator.sanitizeData(settings);
                const success = this.storage.save('settings', sanitizedData);
                
                if (success) {
                    this.eventHandler.onDataSaved('settings', sanitizedData);
                } else {
                    this.eventHandler.onStorageError(new Error('保存设置失败'));
                }
                
                return success;
            }

            loadSettings() {
                const data = this.storage.load('settings');
                
                if (data && DataValidator.validateSettings(data)) {
                    this.eventHandler.onDataLoaded('settings', data);
                    return { ...this.defaultSettings, ...data };
                }
                
                return this.defaultSettings;
            }

            updateSetting(key, value) {
                const currentSettings = this.loadSettings();
                currentSettings[key] = value;
                return this.saveSettings(currentSettings);
            }

            resetSettings() {
                return this.saveSettings(this.defaultSettings);
            }
        }

        class ScoreService {
            constructor(storageManager, eventHandler) {
                this.storage = storageManager;
                this.eventHandler = eventHandler;
                this.maxHighScores = 10;
            }

            saveScore(score) {
                const scoreData = {
                    score: score,
                    date: new Date().toISOString()
                };

                if (!DataValidator.validateScore(scoreData)) {
                    this.eventHandler.onStorageError(new Error('分数数据无效'));
                    return false;
                }

                const success = this.storage.save('lastScore', scoreData);
                
                if (success) {
                    this.eventHandler.onDataSaved('lastScore', scoreData);
                    // 同时更新排行榜
                    this.addHighScore(scoreData);
                }
                
                return success;
            }

            getHighScores() {
                const data = this.storage.load('highScores');
                return data || [];
            }

            addHighScore(scoreData) {
                if (!DataValidator.validateScore(scoreData)) {
                    return false;
                }

                let highScores = this.getHighScores();
                highScores.push(scoreData);
                
                // 按分数降序排序
                highScores.sort((a, b) => b.score - a.score);
                
                // 只保留前N名
                highScores = highScores.slice(0, this.maxHighScores);
                
                const success = this.storage.save('highScores', highScores);
                
                if (success) {
                    this.eventHandler.onDataSaved('highScores', highScores);
                }
                
                return success;
            }

            clearScores() {
                const keys = ['lastScore', 'highScores'];
                let success = true;
                
                keys.forEach(key => {
                    if (!this.storage.remove(key)) {
                        success = false;
                    }
                });
                
                return success;
            }

            getHighestScore() {
                const highScores = this.getHighScores();
                return highScores.length > 0 ? highScores[0].score : 0;
            }
        }

        // 通知系统
        class NotificationManager {
            static show(message, type = 'success', duration = 3000) {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                // 显示动画
                setTimeout(() => {
                    notification.classList.add('show');
                }, 100);
                
                // 自动隐藏
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        document.body.removeChild(notification);
                    }, 300);
                }, duration);
            }
        }

        // 简单的俄罗斯方块游戏逻辑
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.blockSize = 30;
                this.cols = 10;
                this.rows = 20;
                
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.board = this.createBoard();
                this.currentPiece = null;
                this.gameRunning = false;
                this.gamePaused = false;
                
                this.initializeServices();
                this.loadSettings();
                this.updateDisplay();
            }

            initializeServices() {
                this.storageManager = new StorageManager();
                this.eventHandler = new StorageEventHandler();
                this.gameDataService = new GameDataService(this.storageManager, this.eventHandler);
                this.settingsService = new SettingsService(this.storageManager, this.eventHandler);
                this.scoreService = new ScoreService(this.storageManager, this.eventHandler);
                
                // 订阅存储事件
                this.eventHandler.subscribe((event, data) => {
                    switch (event) {
                        case 'dataSaved':
                            NotificationManager.show(`数据已保存: ${data.key}`, 'success');
                            break;
                        case 'dataLoaded':
                            NotificationManager.show(`数据已加载: ${data.key}`, 'success');
                            break;
                        case 'storageError':
                            NotificationManager.show(`存储错误: ${data.error.message}`, 'error');
                            break;
                    }
                });
            }

            createBoard() {
                return Array(this.rows).fill().map(() => Array(this.cols).fill(0));
            }

            loadSettings() {
                const settings = this.settingsService.loadSettings();
                
                document.getElementById('soundEnabled').checked = settings.soundEnabled;
                document.getElementById('volumeSlider').value = settings.volume;
                document.getElementById('autoSave').checked = settings.autoSave;
                
                this.settings = settings;
            }

            saveSettings() {
                const settings = {
                    soundEnabled: document.getElementById('soundEnabled').checked,
                    volume: parseInt(document.getElementById('volumeSlider').value),
                    autoSave: document.getElementById('autoSave').checked
                };
                
                this.settingsService.saveSettings(settings);
                this.settings = settings;
            }

            saveGame() {
                const gameState = {
                    score: this.score,
                    level: this.level,
                    lines: this.lines,
                    board: this.board,
                    currentPiece: this.currentPiece,
                    gameRunning: this.gameRunning,
                    gamePaused: this.gamePaused
                };
                
                return this.gameDataService.saveGameState(gameState);
            }

            loadGame() {
                const gameState = this.gameDataService.loadGameState();
                
                if (gameState) {
                    this.score = gameState.score || 0;
                    this.level = gameState.level || 1;
                    this.lines = gameState.lines || 0;
                    this.board = gameState.board || this.createBoard();
                    this.currentPiece = gameState.currentPiece;
                    this.gameRunning = gameState.gameRunning || false;
                    this.gamePaused = gameState.gamePaused || false;
                    
                    this.updateDisplay();
                    this.draw();
                    
                    return true;
                }
                
                return false;
            }

            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
                document.getElementById('highScore').textContent = this.scoreService.getHighestScore();
                
                this.updateHighScoresList();
            }

            updateHighScoresList() {
                const highScores = this.scoreService.getHighScores();
                const listElement = document.getElementById('highScoresList');
                
                if (highScores.length === 0) {
                    listElement.innerHTML = '<p>暂无记录</p>';
                } else {
                    listElement.innerHTML = highScores.slice(0, 5).map((score, index) => 
                        `<p>${index + 1}. ${score.score}分</p>`
                    ).join('');
                }
            }

            start() {
                this.gameRunning = true;
                this.gamePaused = false;
                this.draw();
                
                if (this.settings.autoSave) {
                    this.autoSaveInterval = setInterval(() => {
                        this.saveGame();
                    }, 30000); // 每30秒自动保存
                }
            }

            pause() {
                this.gamePaused = !this.gamePaused;
                
                if (this.gamePaused) {
                    document.getElementById('pauseBtn').textContent = '继续';
                } else {
                    document.getElementById('pauseBtn').textContent = '暂停';
                }
            }

            reset() {
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.board = this.createBoard();
                this.currentPiece = null;
                this.gameRunning = false;
                this.gamePaused = false;
                
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                }
                
                document.getElementById('pauseBtn').textContent = '暂停';
                this.updateDisplay();
                this.draw();
            }

            gameOver() {
                this.gameRunning = false;
                
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                }
                
                // 保存分数
                this.scoreService.saveScore(this.score);
                this.updateDisplay();
                
                NotificationManager.show(`游戏结束！得分: ${this.score}`, 'warning', 5000);
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.cols; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.blockSize, 0);
                    this.ctx.lineTo(i * this.blockSize, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let i = 0; i <= this.rows; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.blockSize);
                    this.ctx.lineTo(this.canvas.width, i * this.blockSize);
                    this.ctx.stroke();
                }
                
                // 绘制已放置的方块
                for (let row = 0; row < this.rows; row++) {
                    for (let col = 0; col < this.cols; col++) {
                        if (this.board[row][col]) {
                            this.ctx.fillStyle = '#4CAF50';
                            this.ctx.fillRect(
                                col * this.blockSize + 1,
                                row * this.blockSize + 1,
                                this.blockSize - 2,
                                this.blockSize - 2
                            );
                        }
                    }
                }
            }
        }

        // 初始化游戏和事件监听
        document.addEventListener('DOMContentLoaded', function() {
            const game = new TetrisGame();
            
            // 按钮事件监听
            document.getElementById('startBtn').addEventListener('click', () => {
                game.start();
            });
            
            document.getElementById('pauseBtn').addEventListener('click', () => {
                game.pause();
            });
            
            document.getElementById('resetBtn').addEventListener('click', () => {
                if (confirm('确定要重置游戏吗？')) {
                    game.reset();
                }
            });
            
            document.getElementById('saveBtn').addEventListener('click', () => {
                game.saveGame();
            });
            
            document.getElementById('loadBtn').addEventListener('click', () => {
                if (game.loadGame()) {
                    NotificationManager.show('游戏加载成功！', 'success');
                } else {
                    NotificationManager.show('没有找到保存的游戏', 'warning');
                }
            });
            
            document.getElementById('resetSettingsBtn').addEventListener('click', () => {
                if (confirm('确定要重置所有设置吗？')) {
                    game.settingsService.resetSettings();
                    game.loadSettings();
                    NotificationManager.show('设置已重置', 'success');
                }
            });
            
            // 设置变更监听
            document.getElementById('soundEnabled').addEventListener('change', () => {
                game.saveSettings();
            });
            
            document.getElementById('volumeSlider').addEventListener('input', () => {
                game.saveSettings();
            });
            
            document.getElementById('autoSave').addEventListener('change', () => {
                game.saveSettings();
            });
            
            // 键盘事件监听
            document.addEventListener('keydown', (e) => {
                if (!game.gameRunning || game.gamePaused) return;
                
                switch(e.key) {
                    case 'ArrowLeft':
                        // 左移逻辑
                        break;
                    case 'ArrowRight':
                        // 右移逻辑
                        break;
                    case 'ArrowDown':
                        // 下移逻辑
                        break;
                    case 'ArrowUp':
                        // 旋转逻辑
                        break;
                    case ' ':
                        // 快速下落
                        e.preventDefault();
                        break;
                    case 'p':
                    case 'P':
                        game.pause();
                        break;
                }
            });
            
            // 页面卸载时自动保存
            window.addEventListener('beforeunload', () => {
                if (game.gameRunning && game.settings.autoSave) {
                    game.saveGame();
                }
            });
        });
    </script>
</body>
</html>

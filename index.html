<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="投影方块视觉方案设计器">
    <meta name="keywords" content="投影方块, 视觉效果, 透明度, 轮廓线">
    <meta name="author" content="AI开发系统">
    <title>投影方块视觉方案设计器</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 350px;
            height: fit-content;
        }

        /* 右侧预览区域 */
        .preview-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 控制组 */
        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
        }

        .control-group select,
        .control-group input[type="range"],
        .control-group input[type="color"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .control-group input[type="range"] {
            padding: 0;
        }

        /* 样式预设按钮 */
        .style-presets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .preset-btn {
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }

        .preset-btn:hover {
            transform: translateY(-2px);
        }

        .preset-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
            margin-bottom: 1rem;
        }

        /* 背景选择器 */
        .background-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .bg-option {
            width: 60px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .bg-option.active {
            border-color: #667eea;
        }

        .bg-dark { background: #222; }
        .bg-light { background: #f0f0f0; }
        .bg-colorful { background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4); }
        .bg-pattern { background: repeating-linear-gradient(45deg, #ccc, #ccc 10px, #fff 10px, #fff 20px); }

        /* 数值显示 */
        .value-display {
            display: inline-block;
            background: #f8f9fa;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-left: 0.5rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 1rem;
            }
            
            .control-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>投影方块视觉方案设计器</h1>
    </header>
    
    <main>
        <div class="control-panel">
            <h2>视觉样式控制</h2>
            
            <!-- 预设样式 -->
            <div class="control-group">
                <label>预设样式</label>
                <div class="style-presets">
                    <button class="preset-btn active" data-preset="classic">经典</button>
                    <button class="preset-btn" data-preset="modern">现代</button>
                    <button class="preset-btn" data-preset="neon">霓虹</button>
                    <button class="preset-btn" data-preset="minimal">简约</button>
                </div>
            </div>
            
            <!-- 透明度控制 -->
            <div class="control-group">
                <label>透明度 <span class="value-display" id="opacityValue">0.3</span></label>
                <input type="range" id="opacitySlider" min="0.1" max="1" step="0.1" value="0.3">
            </div>
            
            <!-- 轮廓线宽度 -->
            <div class="control-group">
                <label>轮廓线宽度 <span class="value-display" id="outlineWidthValue">2px</span></label>
                <input type="range" id="outlineWidthSlider" min="1" max="5" step="1" value="2">
            </div>
            
            <!-- 轮廓线样式 -->
            <div class="control-group">
                <label>轮廓线样式</label>
                <select id="outlineStyle">
                    <option value="solid">实线</option>
                    <option value="dashed">虚线</option>
                    <option value="dotted">点线</option>
                    <option value="double">双线</option>
                </select>
            </div>
            
            <!-- 颜色模式 -->
            <div class="control-group">
                <label>颜色模式</label>
                <select id="colorMode">
                    <option value="desaturated">去饱和</option>
                    <option value="inverted">反色</option>
                    <option value="monochrome">单色</option>
                    <option value="original">原色</option>
                </select>
            </div>
            
            <!-- 自定义颜色 -->
            <div class="control-group">
                <label>自定义颜色</label>
                <input type="color" id="customColor" value="#ffffff">
            </div>
            
            <!-- 动画效果 -->
            <div class="control-group">
                <label>动画效果</label>
                <select id="animationEffect">
                    <option value="none">无</option>
                    <option value="pulse">脉冲</option>
                    <option value="fade">渐变</option>
                    <option value="glow">发光</option>
                </select>
            </div>
            
            <!-- 自适应对比度 -->
            <div class="control-group">
                <label>
                    <input type="checkbox" id="autoContrast" checked>
                    自适应对比度
                </label>
            </div>
        </div>
        
        <div class="preview-area">
            <h2>预览效果</h2>
            
            <!-- 背景选择 -->
            <div class="control-group">
                <label>背景类型</label>
                <div class="background-selector">
                    <div class="bg-option bg-dark active" data-bg="dark"></div>
                    <div class="bg-option bg-light" data-bg="light"></div>
                    <div class="bg-option bg-colorful" data-bg="colorful"></div>
                    <div class="bg-option bg-pattern" data-bg="pattern"></div>
                </div>
            </div>
            
            <!-- 游戏画布 -->
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            
            <!-- 对比度信息 -->
            <div id="contrastInfo" style="margin-top: 1rem; font-size: 0.9rem; color: #666;">
                对比度比例: <span id="contrastRatio">4.5:1</span>
            </div>
        </div>
    </main>

    <script>
        // 投影方块渲染器
        class GhostPieceRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.opacity = 0.3;
                this.renderMode = 'classic';
                this.outlineWidth = 2;
                this.outlineStyle = 'solid';
                this.colorMode = 'desaturated';
                this.customColor = '#ffffff';
                this.animationEffect = 'none';
                this.animationFrame = 0;
            }

            drawGhost(piece, position, style = {}) {
                const { opacity = this.opacity, colorMode = this.colorMode } = style;
                
                this.ctx.save();
                
                // 设置透明度
                this.ctx.globalAlpha = opacity;
                
                // 应用动画效果
                this.applyAnimation();
                
                // 绘制方块
                const blockSize = 30;
                const ghostColor = this.calculateGhostColor(piece.color, colorMode);
                
                piece.shape.forEach((row, y) => {
                    row.forEach((cell, x) => {
                        if (cell) {
                            const drawX = (position.x + x) * blockSize;
                            const drawY = (position.y + y) * blockSize;
                            
                            // 填充
                            this.ctx.fillStyle = ghostColor;
                            this.ctx.fillRect(drawX, drawY, blockSize, blockSize);
                            
                            // 轮廓线
                            this.drawOutline(drawX, drawY, blockSize);
                        }
                    });
                });
                
                this.ctx.restore();
            }

            drawOutline(x, y, size) {
                this.ctx.strokeStyle = this.getOutlineColor();
                this.ctx.lineWidth = this.outlineWidth;
                
                // 设置线条样式
                switch (this.outlineStyle) {
                    case 'dashed':
                        this.ctx.setLineDash([5, 5]);
                        break;
                    case 'dotted':
                        this.ctx.setLineDash([2, 3]);
                        break;
                    case 'double':
                        this.ctx.setLineDash([]);
                        this.ctx.strokeRect(x, y, size, size);
                        this.ctx.strokeRect(x + 2, y + 2, size - 4, size - 4);
                        return;
                    default:
                        this.ctx.setLineDash([]);
                }
                
                this.ctx.strokeRect(x, y, size, size);
            }

            getOutlineColor() {
                switch (this.colorMode) {
                    case 'inverted':
                        return '#000000';
                    case 'monochrome':
                        return '#666666';
                    case 'original':
                        return this.customColor;
                    default:
                        return '#ffffff';
                }
            }

            calculateGhostColor(originalColor, mode = this.colorMode) {
                const color = this.hexToRgb(originalColor);
                
                switch (mode) {
                    case 'desaturated':
                        const gray = (color.r + color.g + color.b) / 3;
                        return `rgba(${gray}, ${gray}, ${gray}, 0.5)`;
                    
                    case 'inverted':
                        return `rgba(${255 - color.r}, ${255 - color.g}, ${255 - color.b}, 0.7)`;
                    
                    case 'monochrome':
                        return 'rgba(255, 255, 255, 0.6)';
                    
                    case 'original':
                        return this.customColor;
                    
                    default:
                        return `rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`;
                }
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 255, g: 255, b: 255 };
            }

            applyAnimation() {
                switch (this.animationEffect) {
                    case 'pulse':
                        const pulseOpacity = 0.3 + 0.3 * Math.sin(this.animationFrame * 0.1);
                        this.ctx.globalAlpha *= pulseOpacity;
                        break;
                    
                    case 'fade':
                        const fadeOpacity = 0.2 + 0.4 * (Math.sin(this.animationFrame * 0.05) + 1) / 2;
                        this.ctx.globalAlpha *= fadeOpacity;
                        break;
                    
                    case 'glow':
                        this.ctx.shadowColor = '#ffffff';
                        this.ctx.shadowBlur = 10 + 5 * Math.sin(this.animationFrame * 0.1);
                        break;
                }
                this.animationFrame++;
            }

            setOpacity(value) {
                this.opacity = value;
            }

            setRenderMode(mode) {
                this.renderMode = mode;
            }
        }

        // 视觉样式管理器
        class VisualStyleManager {
            constructor() {
                this.styles = {
                    classic: {
                        opacity: 0.3,
                        outlineWidth: 2,
                        outlineStyle: 'solid',
                        colorMode: 'desaturated',
                        animationEffect: 'none'
                    },
                    modern: {
                        opacity: 0.4,
                        outlineWidth: 1,
                        outlineStyle: 'solid',
                        colorMode: 'monochrome',
                        animationEffect: 'fade'
                    },
                    neon: {
                        opacity: 0.6,
                        outlineWidth: 3,
                        outlineStyle: 'solid',
                        colorMode: 'inverted',
                        animationEffect: 'glow'
                    },
                    minimal: {
                        opacity: 0.2,
                        outlineWidth: 1,
                        outlineStyle: 'dashed',
                        colorMode: 'monochrome',
                        animationEffect: 'none'
                    }
                };
            }

            getStyleConfig(styleName) {
                return this.styles[styleName] || this.styles.classic;
            }

            switchStyle(styleName) {
                return this.getStyleConfig(styleName);
            }

            registerStyle(name, config) {
                this.styles[name] = config;
            }

            validateStyle(config) {
                const required = ['opacity', 'outlineWidth', 'outlineStyle', 'colorMode'];
                return required.every(prop => config.hasOwnProperty(prop));
            }
        }

        // 对比度检测器
        class ContrastDetector {
            analyzeBackground(canvas) {
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                let totalR = 0, totalG = 0, totalB = 0;
                const pixelCount = data.length / 4;
                
                for (let i = 0; i < data.length; i += 4) {
                    totalR += data[i];
                    totalG += data[i + 1];
                    totalB += data[i + 2];
                }
                
                return {
                    r: totalR / pixelCount,
                    g: totalG / pixelCount,
                    b: totalB / pixelCount
                };
            }

            calculateOptimalOpacity(backgroundColor) {
                const brightness = (backgroundColor.r * 299 + backgroundColor.g * 587 + backgroundColor.b * 114) / 1000;
                
                // 根据背景亮度调整透明度
                if (brightness < 128) {
                    return Math.max(0.4, 0.8 - brightness / 320); // 深色背景
                } else {
                    return Math.max(0.2, brightness / 640); // 浅色背景
                }
            }

            getContrastRatio(color1, color2) {
                const l1 = this.getLuminance(color1);
                const l2 = this.getLuminance(color2);
                const lighter = Math.max(l1, l2);
                const darker = Math.min(l1, l2);
                return (lighter + 0.05) / (darker + 0.05);
            }

            getLuminance(color) {
                const { r, g, b } = color;
                const [rs, gs, bs] = [r, g, b].map(c => {
                    c = c / 255;
                    return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
                });
                return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
            }
        }

        // 配置面板
        class ConfigurationPanel {
            constructor(renderer, styleManager, contrastDetector) {
                this.renderer = renderer;
                this.styleManager = styleManager;
                this.contrastDetector = contrastDetector;
                this.currentBackground = 'dark';
                this.initializeControls();
            }

            initializeControls() {
                // 预设样式按钮
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const preset = e.target.dataset.preset;
                        this.applyPreset(preset);
                        this.updateActivePreset(e.target);
                    });
                });

                // 透明度滑块
                const opacitySlider = document.getElementById('opacitySlider');
                const opacityValue = document.getElementById('opacityValue');
                opacitySlider.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    this.renderer.setOpacity(value);
                    opacityValue.textContent = value;
                    this.updatePreview();
                });

                // 轮廓线宽度
                const outlineWidthSlider = document.getElementById('outlineWidthSlider');
                const outlineWidthValue = document.getElementById('outlineWidthValue');
                outlineWidthSlider.addEventListener('input', (e) => {
                    const value = parseInt(e.target.value);
                    this.renderer.outlineWidth = value;
                    outlineWidthValue.textContent = value + 'px';
                    this.updatePreview();
                });

                // 轮廓线样式
                document.getElementById('outlineStyle').addEventListener('change', (e) => {
                    this.renderer.outlineStyle = e.target.value;
                    this.updatePreview();
                });

                // 颜色模式
                document.getElementById('colorMode').addEventListener('change', (e) => {
                    this.renderer.colorMode = e.target.value;
                    this.updatePreview();
                });

                // 自定义颜色
                document.getElementById('customColor').addEventListener('input', (e) => {
                    this.renderer.customColor = e.target.value;
                    this.updatePreview();
                });

                // 动画效果
                document.getElementById('animationEffect').addEventListener('change', (e) => {
                    this.renderer.animationEffect = e.target.value;
                    this.updatePreview();
                });

                // 背景选择
                document.querySelectorAll('.bg-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        this.currentBackground = e.target.dataset.bg;
                        this.updateActiveBackground(e.target);
                        this.updateBackground();
                        this.updatePreview();
                    });
                });

                // 自适应对比度
                document.getElementById('autoContrast').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        this.adjustForContrast();
                    }
                });
            }

            applyPreset(presetName) {
                const config = this.styleManager.getStyleConfig(presetName);
                
                // 更新渲染器设置
                this.renderer.setOpacity(config.opacity);
                this.renderer.outlineWidth = config.outlineWidth;
                this.renderer.outlineStyle = config.outlineStyle;
                this.renderer.colorMode = config.colorMode;
                this.renderer.animationEffect = config.animationEffect;
                
                // 更新UI控件
                document.getElementById('opacitySlider').value = config.opacity;
                document.getElementById('opacityValue').textContent = config.opacity;
                document.getElementById('outlineWidthSlider').value = config.outlineWidth;
                document.getElementById('outlineWidthValue').textContent = config.outlineWidth + 'px';
                document.getElementById('outlineStyle').value = config.outlineStyle;
                document.getElementById('colorMode').value = config.colorMode;
                document.getElementById('animationEffect').value = config.animationEffect;
                
                this.updatePreview();
            }

            updateActivePreset(activeBtn) {
                document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
                activeBtn.classList.add('active');
            }

            updateActiveBackground(activeOption) {
                document.querySelectorAll('.bg-option').forEach(option => option.classList.remove('active'));
                activeOption.classList.add('active');
            }

            updateBackground() {
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                switch (this.currentBackground) {
                    case 'dark':
                        ctx.fillStyle = '#222';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        break;
                    case 'light':
                        ctx.fillStyle = '#f0f0f0';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        break;
                    case 'colorful':
                        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                        gradient.addColorStop(0, '#ff6b6b');
                        gradient.addColorStop(0.33, '#4ecdc4');
                        gradient.addColorStop(0.66, '#45b7d1');
                        gradient.addColorStop(1, '#96ceb4');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        break;
                    case 'pattern':
                        ctx.fillStyle = '#ccc';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#fff';
                        for (let x = 0; x < canvas.width; x += 20) {
                            for (let y = 0; y < canvas.height; y += 20) {
                                if ((x / 20 + y / 20) % 2 === 0) {
                                    ctx.fillRect(x, y, 20, 20);
                                }
                            }
                        }
                        break;
                }
            }

            adjustForContrast() {
                const canvas = document.getElementById('gameCanvas');
                const bgColor = this.contrastDetector.analyzeBackground(canvas);
                const optimalOpacity = this.contrastDetector.calculateOptimalOpacity(bgColor);
                
                this.renderer.setOpacity(optimalOpacity);
                document.getElementById('opacitySlider').value = optimalOpacity;
                document.getElementById('opacityValue').textContent = optimalOpacity.toFixed(1);
                
                // 更新对比度显示
                const ghostColor = { r: 255, g: 255, b: 255 }; // 假设为白色投影
                const contrastRatio = this.contrastDetector.getContrastRatio(bgColor, ghostColor);
                document.getElementById('contrastRatio').textContent = contrastRatio.toFixed(1) + ':1';
                
                this.updatePreview();
            }

            updatePreview() {
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');
                
                // 重绘背景
                this.updateBackground();
                
                // 绘制一些示例方块
                const samplePieces = [
                    { color: '#ff6b6b', shape: [[1, 1], [1, 1]] },
                    { color: '#4ecdc4', shape: [[1, 1, 1, 1]] },
                    { color: '#45b7d1', shape: [[1, 1, 0], [0, 1, 1]] }
                ];
                
                samplePieces.forEach((piece, index) => {
                    this.renderer.drawGhost(piece, { x: index * 3, y: 5 + index * 4 });
                });
                
                // 如果启用了自适应对比度，重新计算
                if (document.getElementById('autoContrast').checked) {
                    this.adjustForContrast();
                }
            }

            saveUserPreference(config) {
                localStorage.setItem('ghostPieceConfig', JSON.stringify(config));
            }

            resetToDefault() {
                this.applyPreset('classic');
                localStorage.removeItem('ghostPieceConfig');
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const renderer = new GhostPieceRenderer(canvas);
            const styleManager = new VisualStyleManager();
            const contrastDetector = new ContrastDetector();
            const configPanel = new ConfigurationPanel(renderer, styleManager, contrastDetector);
            
            // 初始化预览
            configPanel.updatePreview();
            
            // 动画循环（用于动画效果）
            function animate() {
                if (renderer.animationEffect !== 'none') {
                    configPanel.updatePreview();
                }
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>
</body>
</html>

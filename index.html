<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="投影方块轮廓线样式渲染器">
    <meta name="keywords" content="投影方块, 轮廓线, Canvas渲染">
    <meta name="author" content="AI开发系统">
    <title>投影方块轮廓线渲染器</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 2rem;
        }

        /* Canvas容器 */
        .canvas-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Canvas样式 */
        #gameCanvas {
            border: 2px solid #34495e;
            border-radius: 10px;
            background: #ecf0f1;
            display: block;
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 300px;
        }

        .control-panel h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #34495e;
            font-weight: 500;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .control-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            background: white;
        }

        .value-display {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-align: right;
        }

        .demo-button {
            width: 100%;
            padding: 0.8rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: background 0.3s ease;
        }

        .demo-button:hover {
            background: #2980b9;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 1rem;
            }
            
            .control-panel {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>投影方块轮廓线渲染器</h1>
    </header>
    
    <main>
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
        
        <div class="control-panel">
            <h2>渲染控制</h2>
            
            <div class="control-group">
                <label for="renderMode">渲染模式</label>
                <select id="renderMode">
                    <option value="outline">轮廓线</option>
                    <option value="fill">填充</option>
                    <option value="mixed">混合</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="lineWidth">线宽</label>
                <input type="range" id="lineWidth" min="1" max="10" value="2" step="1">
                <div class="value-display" id="lineWidthValue">2px</div>
            </div>
            
            <div class="control-group">
                <label for="transparency">透明度</label>
                <input type="range" id="transparency" min="0.1" max="1" value="0.6" step="0.1">
                <div class="value-display" id="transparencyValue">0.6</div>
            </div>
            
            <div class="control-group">
                <label for="ghostColor">投影颜色</label>
                <input type="color" id="ghostColor" value="#e74c3c">
            </div>
            
            <div class="control-group">
                <label for="backgroundColor">背景颜色</label>
                <input type="color" id="backgroundColor" value="#ecf0f1">
            </div>
            
            <button class="demo-button" id="demoButton">切换演示方块</button>
        </div>
    </main>

    <script>
        // StyleManager - 管理投影方块的视觉样式配置
        class StyleManager {
            constructor() {
                this.styles = {
                    renderMode: 'outline',
                    lineWidth: 2,
                    transparency: 0.6,
                    ghostColor: '#e74c3c',
                    backgroundColor: '#ecf0f1'
                };
            }

            getGhostStyle() {
                return { ...this.styles };
            }

            updateStyle(property, value) {
                if (this.validateStyle(property, value)) {
                    this.styles[property] = value;
                    return true;
                }
                return false;
            }

            validateStyle(property, value) {
                switch (property) {
                    case 'renderMode':
                        return ['outline', 'fill', 'mixed'].includes(value);
                    case 'lineWidth':
                        return value >= 1 && value <= 10;
                    case 'transparency':
                        return value >= 0.1 && value <= 1;
                    case 'ghostColor':
                    case 'backgroundColor':
                        return /^#[0-9A-F]{6}$/i.test(value);
                    default:
                        return false;
                }
            }
        }

        // VisibilityTester - 测试投影方块在不同背景下的可见性
        class VisibilityTester {
            constructor() {
                this.contrastThreshold = 0.3;
            }

            testVisibility(ghostColor, backgroundColor) {
                const contrast = this.calculateContrast(ghostColor, backgroundColor);
                return contrast >= this.contrastThreshold;
            }

            calculateContrast(color1, color2) {
                const rgb1 = this.hexToRgb(color1);
                const rgb2 = this.hexToRgb(color2);
                
                const luminance1 = this.getLuminance(rgb1);
                const luminance2 = this.getLuminance(rgb2);
                
                const lighter = Math.max(luminance1, luminance2);
                const darker = Math.min(luminance1, luminance2);
                
                return (lighter + 0.05) / (darker + 0.05);
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            getLuminance(rgb) {
                const { r, g, b } = rgb;
                const [rs, gs, bs] = [r, g, b].map(c => {
                    c = c / 255;
                    return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
                });
                return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
            }

            adjustContrast(ghostColor, backgroundColor) {
                if (this.testVisibility(ghostColor, backgroundColor)) {
                    return ghostColor;
                }
                
                // 如果对比度不够，自动调整颜色
                const rgb = this.hexToRgb(ghostColor);
                const bgRgb = this.hexToRgb(backgroundColor);
                
                // 简单的对比度调整策略
                const avgBg = (bgRgb.r + bgRgb.g + bgRgb.b) / 3;
                if (avgBg > 128) {
                    // 背景较亮，使投影颜色更暗
                    return this.rgbToHex({
                        r: Math.max(0, rgb.r - 50),
                        g: Math.max(0, rgb.g - 50),
                        b: Math.max(0, rgb.b - 50)
                    });
                } else {
                    // 背景较暗，使投影颜色更亮
                    return this.rgbToHex({
                        r: Math.min(255, rgb.r + 50),
                        g: Math.min(255, rgb.g + 50),
                        b: Math.min(255, rgb.b + 50)
                    });
                }
            }

            rgbToHex(rgb) {
                return "#" + ((1 << 24) + (rgb.r << 16) + (rgb.g << 8) + rgb.b).toString(16).slice(1);
            }

            getOptimalStyle(ghostColor, backgroundColor) {
                const adjustedColor = this.adjustContrast(ghostColor, backgroundColor);
                return {
                    color: adjustedColor,
                    isAdjusted: adjustedColor !== ghostColor
                };
            }
        }

        // GhostRenderer - 负责投影方块的渲染逻辑
        class GhostRenderer {
            constructor(canvas, styleManager, visibilityTester) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.styleManager = styleManager;
                this.visibilityTester = visibilityTester;
                this.blockSize = 30;
            }

            drawGhost(x, y, shape) {
                const style = this.styleManager.getGhostStyle();
                const optimalStyle = this.visibilityTester.getOptimalStyle(
                    style.ghostColor, 
                    style.backgroundColor
                );

                this.ctx.save();
                
                // 设置透明度
                this.ctx.globalAlpha = style.transparency;
                
                // 根据渲染模式绘制
                switch (style.renderMode) {
                    case 'outline':
                        this.drawOutline(x, y, shape, optimalStyle.color, style.lineWidth);
                        break;
                    case 'fill':
                        this.drawFill(x, y, shape, optimalStyle.color);
                        break;
                    case 'mixed':
                        this.drawFill(x, y, shape, optimalStyle.color);
                        this.ctx.globalAlpha = 1; // 轮廓线不透明
                        this.drawOutline(x, y, shape, optimalStyle.color, style.lineWidth);
                        break;
                }
                
                this.ctx.restore();
            }

            drawOutline(x, y, shape, color, lineWidth) {
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = lineWidth;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';

                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const blockX = x + col * this.blockSize;
                            const blockY = y + row * this.blockSize;
                            
                            this.ctx.strokeRect(
                                blockX + lineWidth/2, 
                                blockY + lineWidth/2, 
                                this.blockSize - lineWidth, 
                                this.blockSize - lineWidth
                            );
                        }
                    }
                }
            }

            drawFill(x, y, shape, color) {
                this.ctx.fillStyle = color;

                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const blockX = x + col * this.blockSize;
                            const blockY = y + row * this.blockSize;
                            
                            this.ctx.fillRect(blockX, blockY, this.blockSize, this.blockSize);
                        }
                    }
                }
            }

            setRenderMode(mode) {
                this.styleManager.updateStyle('renderMode', mode);
            }

            updateTransparency(transparency) {
                this.styleManager.updateStyle('transparency', transparency);
            }
        }

        // GameRenderer - 游戏主渲染器
        class GameRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.styleManager = new StyleManager();
                this.visibilityTester = new VisibilityTester();
                this.ghostRenderer = new GhostRenderer(canvas, this.styleManager, this.visibilityTester);
                
                // 演示用的方块形状
                this.demoShapes = [
                    // T形
                    [
                        [0, 1, 0],
                        [1, 1, 1]
                    ],
                    // L形
                    [
                        [1, 0],
                        [1, 0],
                        [1, 1]
                    ],
                    // 方形
                    [
                        [1, 1],
                        [1, 1]
                    ],
                    // 直线
                    [
                        [1],
                        [1],
                        [1],
                        [1]
                    ]
                ];
                
                this.currentShapeIndex = 0;
                this.ghostPosition = { x: 100, y: 200 };
            }

            render() {
                this.clearCanvas();
                this.drawBackground();
                this.drawGrid();
                this.updateGhostPiece();
            }

            clearCanvas() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            drawBackground() {
                const style = this.styleManager.getGhostStyle();
                this.ctx.fillStyle = style.backgroundColor;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            drawGrid() {
                this.ctx.strokeStyle = '#bdc3c7';
                this.ctx.lineWidth = 1;
                this.ctx.globalAlpha = 0.3;
                
                // 绘制网格
                for (let x = 0; x <= this.canvas.width; x += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.canvas.height; y += 30) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                this.ctx.globalAlpha = 1;
            }

            updateGhostPiece() {
                const currentShape = this.demoShapes[this.currentShapeIndex];
                this.ghostRenderer.drawGhost(
                    this.ghostPosition.x,
                    this.ghostPosition.y,
                    currentShape
                );
            }

            refreshDisplay() {
                this.render();
            }

            nextShape() {
                this.currentShapeIndex = (this.currentShapeIndex + 1) % this.demoShapes.length;
                this.render();
            }

            updateStyle(property, value) {
                if (this.styleManager.updateStyle(property, value)) {
                    if (property === 'backgroundColor') {
                        this.canvas.style.background = value;
                    }
                    this.render();
                    return true;
                }
                return false;
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('gameCanvas');
            const gameRenderer = new GameRenderer(canvas);
            
            // 控制元素
            const renderModeSelect = document.getElementById('renderMode');
            const lineWidthSlider = document.getElementById('lineWidth');
            const transparencySlider = document.getElementById('transparency');
            const ghostColorPicker = document.getElementById('ghostColor');
            const backgroundColorPicker = document.getElementById('backgroundColor');
            const demoButton = document.getElementById('demoButton');
            
            // 值显示元素
            const lineWidthValue = document.getElementById('lineWidthValue');
            const transparencyValue = document.getElementById('transparencyValue');
            
            // 事件监听器
            renderModeSelect.addEventListener('change', function() {
                gameRenderer.updateStyle('renderMode', this.value);
            });
            
            lineWidthSlider.addEventListener('input', function() {
                const value = parseInt(this.value);
                lineWidthValue.textContent = value + 'px';
                gameRenderer.updateStyle('lineWidth', value);
            });
            
            transparencySlider.addEventListener('input', function() {
                const value = parseFloat(this.value);
                transparencyValue.textContent = value;
                gameRenderer.updateStyle('transparency', value);
            });
            
            ghostColorPicker.addEventListener('change', function() {
                gameRenderer.updateStyle('ghostColor', this.value);
            });
            
            backgroundColorPicker.addEventListener('change', function() {
                gameRenderer.updateStyle('backgroundColor', this.value);
            });
            
            demoButton.addEventListener('click', function() {
                gameRenderer.nextShape();
            });
            
            // 初始渲染
            gameRenderer.render();
            
            // 鼠标交互 - 移动投影方块
            canvas.addEventListener('mousemove', function(e) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / 30) * 30;
                const y = Math.floor((e.clientY - rect.top) / 30) * 30;
                
                gameRenderer.ghostPosition = { x, y };
                gameRenderer.render();
            });
        });
    </script>
</body>
</html>

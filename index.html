<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: var(--border-radius-large);
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-heavy);
            max-width: 1000px;
            width: 100%;
        }

        /* 游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: var(--shadow-light);
        }

        /* 侧边栏 */
        .sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
        }

        .info-panel h3 {
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .info-panel p {
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        /* 操作提示 */
        .controls-hint {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .controls-hint h4 {
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .key-combo {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }

        .key {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                padding: 1rem;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .info-panel {
                flex: 1;
                min-width: 150px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 1rem;
            }
        }

        /* 输入状态指示器 */
        .input-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
            color: var(--text-light);
            font-size: 0.8rem;
            z-index: 1000;
            transition: var(--transition);
        }

        .input-indicator.active {
            background: var(--accent-color);
            transform: scale(1.05);
        }

        .input-indicator.disabled {
            background: var(--danger-color);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-area">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>
            
            <div class="sidebar">
                <div class="info-panel">
                    <h3>游戏信息</h3>
                    <p>分数: <span id="score">0</span></p>
                    <p>等级: <span id="level">1</span></p>
                    <p>行数: <span id="lines">0</span></p>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" id="startBtn">开始游戏</button>
                    <button class="btn btn-secondary" id="pauseBtn">暂停</button>
                    <button class="btn btn-danger" id="resetBtn">重置</button>
                </div>

                <div class="controls-hint">
                    <h4>操作说明</h4>
                    <div class="key-combo">
                        <span>移动:</span>
                        <span><span class="key">A/D</span> 或 <span class="key">←/→</span></span>
                    </div>
                    <div class="key-combo">
                        <span>下降:</span>
                        <span><span class="key">S</span> 或 <span class="key">↓</span></span>
                    </div>
                    <div class="key-combo">
                        <span>旋转:</span>
                        <span><span class="key">W</span> 或 <span class="key">↑</span></span>
                    </div>
                    <div class="key-combo">
                        <span>暂停:</span>
                        <span><span class="key">Space</span></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 输入状态指示器 -->
    <div class="input-indicator" id="inputIndicator">输入已启用</div>

    <script>
        // 键盘映射器类
        class KeyMapper {
            constructor() {
                this.keyMappings = new Map();
                this.setDefaultMapping();
            }

            // 设置默认键盘映射
            setDefaultMapping() {
                // WASD 控制
                this.keyMappings.set('KeyW', 'rotate');
                this.keyMappings.set('KeyA', 'moveLeft');
                this.keyMappings.set('KeyS', 'moveDown');
                this.keyMappings.set('KeyD', 'moveRight');
                
                // 方向键控制
                this.keyMappings.set('ArrowUp', 'rotate');
                this.keyMappings.set('ArrowLeft', 'moveLeft');
                this.keyMappings.set('ArrowDown', 'moveDown');
                this.keyMappings.set('ArrowRight', 'moveRight');
                
                // 其他控制键
                this.keyMappings.set('Space', 'pause');
                this.keyMappings.set('Enter', 'start');
                this.keyMappings.set('Escape', 'reset');
            }

            // 映射按键到动作
            mapKey(keyCode, action) {
                this.keyMappings.set(keyCode, action);
            }

            // 获取按键对应的动作
            getAction(keyCode) {
                return this.keyMappings.get(keyCode) || null;
            }

            // 自定义映射
            customizeMapping(mappings) {
                Object.entries(mappings).forEach(([key, action]) => {
                    this.mapKey(key, action);
                });
            }
        }

        // 输入防抖器类
        class InputDebouncer {
            constructor() {
                this.debounceTimers = new Map();
                this.continuousKeys = new Set();
                this.continuousInterval = null;
                this.continuousDelay = 150; // 连续按键间隔
            }

            // 防抖处理
            debounce(key, callback, delay = 50) {
                if (this.debounceTimers.has(key)) {
                    clearTimeout(this.debounceTimers.get(key));
                }

                const timer = setTimeout(() => {
                    callback();
                    this.debounceTimers.delete(key);
                }, delay);

                this.debounceTimers.set(key, timer);
            }

            // 处理连续按键
            handleContinuousPress(key, callback) {
                if (!this.continuousKeys.has(key)) {
                    this.continuousKeys.add(key);
                    callback(); // 立即执行一次
                    
                    // 如果还没有连续按键定时器，启动一个
                    if (!this.continuousInterval) {
                        this.continuousInterval = setInterval(() => {
                            if (this.continuousKeys.size > 0) {
                                this.continuousKeys.forEach(activeKey => {
                                    if (activeKey === key) {
                                        callback();
                                    }
                                });
                            } else {
                                this.stopContinuous();
                            }
                        }, this.continuousDelay);
                    }
                }
            }

            // 停止连续按键
            stopContinuous(key = null) {
                if (key) {
                    this.continuousKeys.delete(key);
                } else {
                    this.continuousKeys.clear();
                }

                if (this.continuousKeys.size === 0 && this.continuousInterval) {
                    clearInterval(this.continuousInterval);
                    this.continuousInterval = null;
                }
            }

            // 重置防抖
            resetDebounce() {
                this.debounceTimers.forEach(timer => clearTimeout(timer));
                this.debounceTimers.clear();
                this.stopContinuous();
            }
        }

        // 动作分发器类
        class ActionDispatcher {
            constructor() {
                this.handlers = new Map();
            }

            // 分发动作
            dispatch(action, params = {}) {
                const handler = this.handlers.get(action);
                if (handler && typeof handler === 'function') {
                    try {
                        handler(params);
                    } catch (error) {
                        console.error(`Error dispatching action '${action}':`, error);
                    }
                } else {
                    console.warn(`No handler registered for action: ${action}`);
                }
            }

            // 注册处理器
            registerHandler(action, handler) {
                if (typeof handler !== 'function') {
                    throw new Error('Handler must be a function');
                }
                this.handlers.set(action, handler);
            }

            // 注销处理器
            unregisterHandler(action) {
                return this.handlers.delete(action);
            }

            // 获取所有已注册的动作
            getRegisteredActions() {
                return Array.from(this.handlers.keys());
            }
        }

        // 输入验证器类
        class InputValidator {
            constructor() {
                this.gameState = 'menu'; // menu, playing, paused, gameOver
                this.validActions = {
                    menu: ['start'],
                    playing: ['moveLeft', 'moveRight', 'moveDown', 'rotate', 'pause'],
                    paused: ['pause', 'reset'],
                    gameOver: ['start', 'reset']
                };
            }

            // 设置游戏状态
            setGameState(state) {
                if (this.validActions.hasOwnProperty(state)) {
                    this.gameState = state;
                } else {
                    console.warn(`Invalid game state: ${state}`);
                }
            }

            // 验证输入
            validateInput(action, gameState = null) {
                const currentState = gameState || this.gameState;
                const allowedActions = this.validActions[currentState] || [];
                return allowedActions.includes(action);
            }

            // 检查动作是否被允许
            isActionAllowed(action) {
                return this.validateInput(action);
            }

            // 获取当前状态下的有效动作
            getValidActions(gameState = null) {
                const currentState = gameState || this.gameState;
                return this.validActions[currentState] || [];
            }
        }

        // 输入控制器主类
        class InputController {
            constructor() {
                this.keyMapper = new KeyMapper();
                this.debouncer = new InputDebouncer();
                this.dispatcher = new ActionDispatcher();
                this.validator = new InputValidator();
                
                this.isEnabled = true;
                this.pressedKeys = new Set();
                this.inputIndicator = document.getElementById('inputIndicator');
                
                this.bindEvents();
                this.updateIndicator();
            }

            // 绑定事件
            bindEvents() {
                document.addEventListener('keydown', this.handleKeyDown.bind(this));
                document.addEventListener('keyup', this.handleKeyUp.bind(this));
                
                // 防止页面滚动
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });

                // 窗口失焦时清除所有按键状态
                window.addEventListener('blur', () => {
                    this.pressedKeys.clear();
                    this.debouncer.stopContinuous();
                });
            }

            // 解绑事件
            unbindEvents() {
                document.removeEventListener('keydown', this.handleKeyDown.bind(this));
                document.removeEventListener('keyup', this.handleKeyUp.bind(this));
            }

            // 处理按键按下
            handleKeyDown(event) {
                if (!this.isEnabled) return;

                const keyCode = event.code;
                const action = this.keyMapper.getAction(keyCode);
                
                if (!action) return;

                // 防止重复触发
                if (this.pressedKeys.has(keyCode)) return;
                this.pressedKeys.add(keyCode);

                // 验证输入
                if (!this.validator.isActionAllowed(action)) {
                    console.log(`Action '${action}' not allowed in current state: ${this.validator.gameState}`);
                    return;
                }

                // 区分单次动作和连续动作
                if (['moveLeft', 'moveRight', 'moveDown'].includes(action)) {
                    // 连续动作
                    this.debouncer.handleContinuousPress(keyCode, () => {
                        this.dispatcher.dispatch(action, { keyCode, continuous: true });
                    });
                } else {
                    // 单次动作（带防抖）
                    this.debouncer.debounce(keyCode, () => {
                        this.dispatcher.dispatch(action, { keyCode, continuous: false });
                    }, 100);
                }

                this.updateIndicator(action);
            }

            // 处理按键释放
            handleKeyUp(event) {
                const keyCode = event.code;
                this.pressedKeys.delete(keyCode);
                this.debouncer.stopContinuous(keyCode);
                this.updateIndicator();
            }

            // 设置键盘映射
            setKeyMapping(mappings) {
                this.keyMapper.customizeMapping(mappings);
            }

            // 启用输入
            enableInput() {
                this.isEnabled = true;
                this.updateIndicator();
            }

            // 禁用输入
            disableInput() {
                this.isEnabled = false;
                this.pressedKeys.clear();
                this.debouncer.resetDebounce();
                this.updateIndicator();
            }

            // 设置游戏状态
            setGameState(state) {
                this.validator.setGameState(state);
                this.updateIndicator();
            }

            // 注册动作处理器
            registerHandler(action, handler) {
                this.dispatcher.registerHandler(action, handler);
            }

            // 更新输入指示器
            updateIndicator(lastAction = null) {
                if (!this.inputIndicator) return;

                this.inputIndicator.className = 'input-indicator';
                
                if (!this.isEnabled) {
                    this.inputIndicator.textContent = '输入已禁用';
                    this.inputIndicator.classList.add('disabled');
                } else if (lastAction) {
                    this.inputIndicator.textContent = `动作: ${lastAction}`;
                    this.inputIndicator.classList.add('active');
                    
                    // 短暂显示后恢复
                    setTimeout(() => {
                        this.inputIndicator.textContent = '输入已启用';
                        this.inputIndicator.classList.remove('active');
                    }, 500);
                } else {
                    this.inputIndicator.textContent = '输入已启用';
                }
            }
        }

        // 游戏主类（简化版，用于演示输入系统）
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameState = 'menu';
                
                this.inputController = new InputController();
                this.setupInputHandlers();
                this.setupUI();
                
                this.render();
            }

            // 设置输入处理器
            setupInputHandlers() {
                this.inputController.registerHandler('start', () => this.startGame());
                this.inputController.registerHandler('pause', () => this.togglePause());
                this.inputController.registerHandler('reset', () => this.resetGame());
                this.inputController.registerHandler('moveLeft', () => this.moveLeft());
                this.inputController.registerHandler('moveRight', () => this.moveRight());
                this.inputController.registerHandler('moveDown', () => this.moveDown());
                this.inputController.registerHandler('rotate', () => this.rotate());
            }

            // 设置UI事件
            setupUI() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
            }

            // 开始游戏
            startGame() {
                this.gameState = 'playing';
                this.inputController.setGameState('playing');
                console.log('游戏开始');
                this.updateUI();
            }

            // 切换暂停
            togglePause() {
                if (this.gameState === 'playing') {
                    this.gameState = 'paused';
                    this.inputController.setGameState('paused');
                    console.log('游戏暂停');
                } else if (this.gameState === 'paused') {
                    this.gameState = 'playing';
                    this.inputController.setGameState('playing');
                    console.log('游戏继续');
                }
                this.updateUI();
            }

            // 重置游戏
            resetGame() {
                this.gameState = 'menu';
                this.inputController.setGameState('menu');
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                console.log('游戏重置');
                this.updateUI();
            }

            // 移动操作
            moveLeft() {
                console.log('向左移动');
            }

            moveRight() {
                console.log('向右移动');
            }

            moveDown() {
                console.log('向下移动');
            }

            rotate() {
                console.log('旋转');
            }

            // 更新UI
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            // 渲染游戏
            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                
                const cellSize = 30;
                for (let x = 0; x <= this.canvas.width; x += cellSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.canvas.height; y += cellSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }

                // 显示游戏状态
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                this.ctx.font = '24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(`状态: ${this.gameState}`, this.canvas.width / 2, this.canvas.height / 2);
                
                requestAnimationFrame(() => this.render());
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            const game = new TetrisGame();
            
            // 添加一些调试信息
            console.log('俄罗斯方块游戏已初始化');
            console.log('支持的控制键:');
            console.log('- WASD 或 方向键: 移动和旋转');
            console.log('- 空格键: 暂停/继续');
            console.log('- 回车键: 开始游戏');
            console.log('- ESC键: 重置游戏');
        });
    </script>
</body>
</html>

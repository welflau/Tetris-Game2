<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 3px solid #fff;
            border-radius: 10px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 游戏信息面板 */
        .game-info {
            color: white;
            min-width: 200px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-panel h3 {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            color: #fff;
        }

        .score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .level, .lines {
            font-size: 1.2rem;
            color: #87ceeb;
        }

        /* 下一个方块预览 */
        #nextCanvas {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: #000;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 游戏状态显示 */
        .game-state {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.5rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .state-menu { background: rgba(0, 255, 0, 0.2); color: #00ff00; }
        .state-playing { background: rgba(255, 255, 0, 0.2); color: #ffff00; }
        .state-paused { background: rgba(255, 165, 0, 0.2); color: #ffa500; }
        .state-gameover { background: rgba(255, 0, 0, 0.2); color: #ff0000; }

        /* 操作说明 */
        .instructions {
            font-size: 0.9rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 1rem;
            }

            .game-info {
                min-width: auto;
                width: 100%;
                max-width: 300px;
            }

            #gameCanvas {
                width: 300px;
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>
    
    <main>
        <div class="game-container">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            
            <div class="game-info">
                <div class="game-state" id="gameState">菜单</div>
                
                <div class="info-panel">
                    <h3>分数</h3>
                    <div class="score" id="score">0</div>
                </div>
                
                <div class="info-panel">
                    <h3>等级</h3>
                    <div class="level" id="level">1</div>
                </div>
                
                <div class="info-panel">
                    <h3>消除行数</h3>
                    <div class="lines" id="lines">0</div>
                </div>
                
                <div class="info-panel">
                    <h3>下一个</h3>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
                
                <div class="info-panel">
                    <div class="controls">
                        <button class="btn" id="startBtn">开始游戏</button>
                        <button class="btn" id="pauseBtn" disabled>暂停</button>
                        <button class="btn" id="resetBtn">重新开始</button>
                    </div>
                </div>
                
                <div class="info-panel">
                    <h3>操作说明</h3>
                    <div class="instructions">
                        <kbd>←</kbd> <kbd>→</kbd> 移动<br>
                        <kbd>↓</kbd> 加速下降<br>
                        <kbd>↑</kbd> 旋转<br>
                        <kbd>Space</kbd> 暂停<br>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 游戏引擎核心架构实现
        
        // 事件系统 - 观察者模式实现
        class EventSystem {
            constructor() {
                this.listeners = new Map();
            }
            
            on(event, callback) {
                if (!this.listeners.has(event)) {
                    this.listeners.set(event, []);
                }
                this.listeners.get(event).push(callback);
            }
            
            off(event, callback) {
                if (!this.listeners.has(event)) return;
                const callbacks = this.listeners.get(event);
                const index = callbacks.indexOf(callback);
                if (index > -1) {
                    callbacks.splice(index, 1);
                }
            }
            
            once(event, callback) {
                const onceCallback = (...args) => {
                    callback(...args);
                    this.off(event, onceCallback);
                };
                this.on(event, onceCallback);
            }
            
            emit(event, ...args) {
                if (!this.listeners.has(event)) return;
                this.listeners.get(event).forEach(callback => {
                    try {
                        callback(...args);
                    } catch (error) {
                        console.error(`Error in event listener for ${event}:`, error);
                    }
                });
            }
        }
        
        // 游戏状态管理器
        class StateManager {
            constructor(eventSystem) {
                this.eventSystem = eventSystem;
                this.currentState = 'MENU';
                this.stateHandlers = new Map();
                this.previousState = null;
            }
            
            registerStateHandler(state, handler) {
                this.stateHandlers.set(state, handler);
            }
            
            changeState(newState) {
                if (this.currentState === newState) return;
                
                const oldState = this.currentState;
                this.previousState = oldState;
                
                // 退出当前状态
                const currentHandler = this.stateHandlers.get(this.currentState);
                if (currentHandler && currentHandler.exit) {
                    currentHandler.exit();
                }
                
                // 切换状态
                this.currentState = newState;
                
                // 进入新状态
                const newHandler = this.stateHandlers.get(newState);
                if (newHandler && newHandler.enter) {
                    newHandler.enter();
                }
                
                // 发送状态变化事件
                this.eventSystem.emit('stateChanged', {
                    from: oldState,
                    to: newState
                });
            }
            
            getCurrentState() {
                return this.currentState;
            }
            
            getPreviousState() {
                return this.previousState;
            }
        }
        
        // 输入管理器
        class InputManager {
            constructor(eventSystem) {
                this.eventSystem = eventSystem;
                this.keyBindings = new Map();
                this.pressedKeys = new Set();
                this.debounceMap = new Map();
                this.debounceDelay = 100;
                
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.pressedKeys.add(e.code);
                    this.handleKeyEvent(e.code, 'keydown', e);
                });
                
                document.addEventListener('keyup', (e) => {
                    this.pressedKeys.delete(e.code);
                    this.handleKeyEvent(e.code, 'keyup', e);
                });
            }
            
            bindKey(keyCode, action, callback, debounce = false) {
                if (!this.keyBindings.has(keyCode)) {
                    this.keyBindings.set(keyCode, new Map());
                }
                
                this.keyBindings.get(keyCode).set(action, {
                    callback,
                    debounce
                });
            }
            
            unbindKey(keyCode, action) {
                if (this.keyBindings.has(keyCode)) {
                    this.keyBindings.get(keyCode).delete(action);
                }
            }
            
            handleKeyEvent(keyCode, action, event) {
                if (!this.keyBindings.has(keyCode)) return;
                
                const bindings = this.keyBindings.get(keyCode);
                if (!bindings.has(action)) return;
                
                const binding = bindings.get(action);
                
                if (binding.debounce) {
                    const debounceKey = `${keyCode}_${action}`;
                    const now = Date.now();
                    
                    if (this.debounceMap.has(debounceKey)) {
                        const lastTime = this.debounceMap.get(debounceKey);
                        if (now - lastTime < this.debounceDelay) {
                            return;
                        }
                    }
                    
                    this.debounceMap.set(debounceKey, now);
                }
                
                event.preventDefault();
                binding.callback(event);
            }
            
            isPressed(keyCode) {
                return this.pressedKeys.has(keyCode);
            }
            
            enableDebounce(delay = 100) {
                this.debounceDelay = delay;
            }
        }
        
        // 游戏循环控制器
        class GameLoop {
            constructor(eventSystem) {
                this.eventSystem = eventSystem;
                this.isRunning = false;
                this.isPaused = false;
                this.targetFPS = 60;
                this.lastTime = 0;
                this.deltaTime = 0;
                this.updateCallbacks = [];
                this.animationId = null;
            }
            
            run() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.lastTime = performance.now();
                this.loop();
                
                this.eventSystem.emit('gameLoopStarted');
            }
            
            pause() {
                this.isPaused = true;
                this.eventSystem.emit('gameLoopPaused');
            }
            
            resume() {
                if (!this.isRunning) return;
                
                this.isPaused = false;
                this.lastTime = performance.now();
                this.eventSystem.emit('gameLoopResumed');
            }
            
            stop() {
                this.isRunning = false;
                this.isPaused = false;
                
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
                
                this.eventSystem.emit('gameLoopStopped');
            }
            
            loop(currentTime = performance.now()) {
                if (!this.isRunning) return;
                
                this.animationId = requestAnimationFrame((time) => this.loop(time));
                
                if (this.isPaused) return;
                
                this.deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                // 执行更新回调
                this.updateCallbacks.forEach(callback => {
                    try {
                        callback(this.deltaTime, currentTime);
                    } catch (error) {
                        console.error('Error in update callback:', error);
                    }
                });
                
                this.eventSystem.emit('gameLoopUpdate', this.deltaTime, currentTime);
            }
            
            addUpdateCallback(callback) {
                this.updateCallbacks.push(callback);
            }
            
            removeUpdateCallback(callback) {
                const index = this.updateCallbacks.indexOf(callback);
                if (index > -1) {
                    this.updateCallbacks.splice(index, 1);
                }
            }
            
            setFPS(fps) {
                this.targetFPS = fps;
            }
        }
        
        // 渲染引擎
        class Renderer {
            constructor(canvas, nextCanvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.nextCanvas = nextCanvas;
                this.nextCtx = nextCanvas.getContext('2d');
                
                this.cellSize = 30;
                this.boardWidth = 10;
                this.boardHeight = 20;
                
                // 方块颜色配置
                this.colors = {
                    I: '#00f0f0',
                    O: '#f0f000',
                    T: '#a000f0',
                    S: '#00f000',
                    Z: '#f00000',
                    J: '#0000f0',
                    L: '#f0a000',
                    empty: '#000000',
                    ghost: 'rgba(255, 255, 255, 0.3)'
                };
            }
            
            clear() {
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }
            
            clearNext() {
                this.nextCtx.fillStyle = '#000000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
            }
            
            drawGrid() {
                this.ctx.strokeStyle = '#333333';
                this.ctx.lineWidth = 1;
                
                // 绘制垂直线
                for (let x = 0; x <= this.boardWidth; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * this.cellSize, 0);
                    this.ctx.lineTo(x * this.cellSize, this.boardHeight * this.cellSize);
                    this.ctx.stroke();
                }
                
                // 绘制水平线
                for (let y = 0; y <= this.boardHeight; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * this.cellSize);
                    this.ctx.lineTo(this.boardWidth * this.cellSize, y * this.cellSize);
                    this.ctx.stroke();
                }
            }
            
            drawCell(x, y, color, alpha = 1) {
                this.ctx.globalAlpha = alpha;
                this.ctx.fillStyle = color;
                this.ctx.fillRect(
                    x * this.cellSize + 1,
                    y * this.cellSize + 1,
                    this.cellSize - 2,
                    this.cellSize - 2
                );
                
                // 添加高光效果
                if (alpha === 1 && color !== this.colors.empty) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.fillRect(
                        x * this.cellSize + 1,
                        y * this.cellSize + 1,
                        this.cellSize - 2,
                        3
                    );
                }
                
                this.ctx.globalAlpha = 1;
            }
            
            drawBoard(board) {
                for (let y = 0; y < this.boardHeight; y++) {
                    for (let x = 0; x < this.boardWidth; x++) {
                        const cell = board.getCell(x, y);
                        if (cell) {
                            this.drawCell(x, y, this.colors[cell] || this.colors.empty);
                        }
                    }
                }
            }
            
            drawTetromino(tetromino, offsetX = 0, offsetY = 0, alpha = 1) {
                if (!tetromino) return;
                
                const shape = tetromino.shape;
                const color = this.colors[tetromino.type] || this.colors.empty;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            this.drawCell(
                                tetromino.x + x + offsetX,
                                tetromino.y + y + offsetY,
                                color,
                                alpha
                            );
                        }
                    }
                }
            }
            
            drawNextTetromino(tetromino) {
                this.clearNext();
                
                if (!tetromino) return;
                
                const shape = tetromino.shape;
                const color = this.colors[tetromino.type] || this.colors.empty;
                const cellSize = 16;
                
                // 计算居中偏移
                const offsetX = (this.nextCanvas.width - shape[0].length * cellSize) / 2;
                const offsetY = (this.nextCanvas.height - shape.length * cellSize) / 2;
                
                this.nextCtx.fillStyle = color;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            this.nextCtx.fillRect(
                                offsetX + x * cellSize,
                                offsetY + y * cellSize,
                                cellSize - 1,
                                cellSize - 1
                            );
                        }
                    }
                }
            }
            
            render(gameState) {
                this.clear();
                this.drawGrid();
                
                if (gameState.board) {
                    this.drawBoard(gameState.board);
                }
                
                if (gameState.currentTetromino) {
                    // 绘制幽灵方块
                    if (gameState.ghostTetromino) {
                        this.drawTetromino(gameState.ghostTetromino, 0, 0, 0.3);
                    }
                    
                    // 绘制当前方块
                    this.drawTetromino(gameState.currentTetromino);
                }
                
                if (gameState.nextTetromino) {
                    this.drawNextTetromino(gameState.nextTetromino);
                }
            }
        }
        
        // 游戏区域模型
        class GameBoard {
            constructor(width = 10, height = 20) {
                this.width = width;
                this.height = height;
                this.grid = this.createEmptyGrid();
            }
            
            createEmptyGrid() {
                return Array(this.height).fill(null).map(() => Array(this.width).fill(null));
            }
            
            getCell(x, y) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) {
                    return null;
                }
                return this.grid[y][x];
            }
            
            setCell(x, y, value) {
                if (x < 0 || x >= this.width || y < 0 || y >= this.height) {
                    return false;
                }
                this.grid[y][x] = value;
                return true;
            }
            
            isValidPosition(tetromino, offsetX = 0, offsetY = 0) {
                const shape = tetromino.shape;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const newX = tetromino.x + x + offsetX;
                            const newY = tetromino.y + y + offsetY;
                            
                            // 检查边界
                            if (newX < 0 || newX >= this.width || newY >= this.height) {
                                return false;
                            }
                            
                            // 检查碰撞（忽略顶部边界外的方块）
                            if (newY >= 0 && this.getCell(newX, newY)) {
                                return false;
                            }
                        }
                    }
                }
                
                return true;
            }
            
            placeTetromino(tetromino) {
                const shape = tetromino.shape;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            const boardX = tetromino.x + x;
                            const boardY = tetromino.y + y;
                            
                            if (boardY >= 0) {
                                this.setCell(boardX, boardY, tetromino.type);
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                const clearedLines = [];
                
                for (let y = this.height - 1; y >= 0; y--) {
                    if (this.isLineFull(y)) {
                        clearedLines.push(y);
                        this.removeLine(y);
                        y++; // 重新检查当前行
                    }
                }
                
                return clearedLines;
            }
            
            isLineFull(y) {
                for (let x = 0; x < this.width; x++) {
                    if (!this.getCell(x, y)) {
                        return false;
                    }
                }
                return true;
            }
            
            removeLine(y) {
                // 移除指定行
                this.grid.splice(y, 1);
                // 在顶部添加新的空行
                this.grid.unshift(Array(this.width).fill(null));
            }
            
            reset() {
                this.grid = this.createEmptyGrid();
            }
        }
        
        // 方块工厂
        class TetrominoFactory {
            constructor() {
                this.shapes = {
                    I: [
                        [1, 1, 1, 1]
                    ],
                    O: [
                        [1, 1],
                        [1, 1]
                    ],
                    T: [
                        [0, 1, 0],
                        [1, 1, 1]
                    ],
                    S: [
                        [0, 1, 1],
                        [1, 1, 0]
                    ],
                    Z: [
                        [1, 1, 0],
                        [0, 1, 1]
                    ],
                    J: [
                        [1, 0, 0],
                        [1, 1, 1]
                    ],
                    L: [
                        [0, 0, 1],
                        [1, 1, 1]
                    ]
                };
                
                this.types = Object.keys(this.shapes);
                this.bag = [];
                this.nextQueue = [];
                
                this.fillBag();
                this.generateNext();
            }
            
            fillBag() {
                this.bag = [...this.types];
                // 洗牌算法
                for (let i = this.bag.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.bag[i], this.bag[j]] = [this.bag[j], this.bag[i]];
                }
            }
            
            generateNext() {
                while (this.nextQueue.length < 3) {
                    if (this.bag.length === 0) {
                        this.fillBag();
                    }
                    
                    const type = this.bag.pop();
                    this.nextQueue.push(this.createTetromino(type));
                }
            }
            
            createTetromino(type, x = 3, y = -1) {
                return {
                    type: type,
                    shape: this.shapes[type].map(row => [...row]),
                    x: x,
                    y: y,
                    rotation: 0
                };
            }
            
            getNext() {
                this.generateNext();
                return this.nextQueue.shift();
            }
            
            getPreview() {
                this.generateNext();
                return this.nextQueue[0];
            }
            
            rotateTetromino(tetromino, clockwise = true) {
                const shape = tetromino.shape;
                const size = shape.length;
                const rotated = Array(size).fill(null).map(() => Array(size).fill(0));
                
                for (let y = 0; y < size; y++) {
                    for (let x = 0; x < size; x++) {
                        if (clockwise) {
                            rotated[x][size - 1 - y] = shape[y][x];
                        } else {
                            rotated[size - 1 - x][y] = shape[y][x];
                        }
                    }
                }
                
                return {
                    ...tetromino,
                    shape: rotated,
                    rotation: (tetromino.rotation + (clockwise ? 1 : -1) + 4) % 4
                };
            }
        }
        
        // 游戏引擎核心
        class GameEngine {
            constructor() {
                this.eventSystem = new EventSystem();
                this.stateManager = new StateManager(this.eventSystem);
                this.inputManager = new InputManager(this.eventSystem);
                this.gameLoop = new GameLoop(this.eventSystem);
                
                // 游戏组件
                this.board = new GameBoard();
                this.tetrominoFactory = new TetrominoFactory();
                this.renderer = new Renderer(
                    document.getElementById('gameCanvas'),
                    document.getElementById('nextCanvas')
                );
                
                // 游戏状态
                this.gameState = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    currentTetromino: null,
                    nextTetromino: null,
                    ghostTetromino: null,
                    board: this.board,
                    dropTimer: 0,
                    dropInterval: 1000,
                    isGameOver: false
                };
                
                this.setupStateHandlers();
                this.setupInputBindings();
                this.setupEventListeners();
                this.setupUI();
            }
            
            setupStateHandlers() {
                // 菜单状态
                this.stateManager.registerStateHandler('MENU', {
                    enter: () => {
                        this.updateGameStateDisplay('菜单', 'state-menu');
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('pauseBtn').disabled = true;
                    },
                    exit: () => {}
                });
                
                // 游戏进行状态
                this.stateManager.registerStateHandler('PLAYING', {
                    enter: () => {
                        this.updateGameStateDisplay('游戏中', 'state-playing');
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('pauseBtn').disabled = false;
                        
                        if (!this.gameState.currentTetromino) {
                            this.spawnTetromino();
                        }
                        
                        this.gameLoop.run();
                    },
                    exit: () => {
                        this.gameLoop.pause();
                    }
                });
                
                // 暂停状态
                this.stateManager.registerStateHandler('PAUSED', {
                    enter: () => {
                        this.updateGameStateDisplay('暂停', 'state-paused');
                        document.getElementById('pauseBtn').textContent = '继续';
                    },
                    exit: () => {
                        document.getElementById('pauseBtn').textContent = '暂停';
                    }
                });
                
                // 游戏结束状态
                this.stateManager.registerStateHandler('GAMEOVER', {
                    enter: () => {
                        this.updateGameStateDisplay('游戏结束', 'state-gameover');
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('pauseBtn').disabled = true;
                        this.gameLoop.stop();
                    },
                    exit: () => {}
                });
            }
            
            setupInputBindings() {
                // 移动控制
                this.inputManager.bindKey('ArrowLeft', 'keydown', () => {
                    if (this.stateManager.getCurrentState() === 'PLAYING') {
                        this.moveTetromino(-1, 0);
                    }
                }, true);
                
                this.inputManager.bindKey('ArrowRight', 'keydown', () => {
                    if (this.stateManager.getCurrentState() === 'PLAYING') {
                        this.moveTetromino(1, 0);
                    }
                }, true);
                
                this.inputManager.bindKey('ArrowDown', 'keydown', () => {
                    if (this.stateManager.getCurrentState() === 'PLAYING') {
                        this.moveTetromino(0, 1);
                    }
                });
                
                // 旋转控制
                this.inputManager.bindKey('ArrowUp', 'keydown', () => {
                    if (this.stateManager.getCurrentState() === 'PLAYING') {
                        this.rotateTetromino();
                    }
                }, true);
                
                // 暂停控制
                this.inputManager.bindKey('Space', 'keydown', () => {
                    this.togglePause();
                }, true);
            }
            
            setupEventListeners() {
                // 游戏循环更新
                this.gameLoop.addUpdateCallback((deltaTime) => {
                    this.update(deltaTime);
                    this.render();
                });
                
                // 状态变化监听
                this.eventSystem.on('stateChanged', (data) => {
                    console.log(`State changed from ${data.from} to ${data.to}`);
                });
            }
            
            setupUI() {
                const startBtn = document.getElementById('startBtn');
                const pauseBtn = document.getElementById('pauseBtn');
                const resetBtn = document.getElementById('resetBtn');
                
                startBtn.addEventListener('click', () => this.start());
                pauseBtn.addEventListener('click', () => this.togglePause());
                resetBtn.addEventListener('click', () => this.reset());
            }
            
            start() {
                if (this.stateManager.getCurrentState() === 'GAMEOVER') {
                    this.reset();
                }
                this.stateManager.changeState('PLAYING');
            }
            
            pause() {
                if (this.stateManager.getCurrentState() === 'PLAYING') {
                    this.stateManager.changeState('PAUSED');
                }
            }
            
            resume() {
                if (this.stateManager.getCurrentState() === 'PAUSED') {
                    this.stateManager.changeState('PLAYING');
                }
            }
            
            togglePause() {
                const currentState = this.stateManager.getCurrentState();
                if (currentState === 'PLAYING') {
                    this.pause();
                } else if (currentState === 'PAUSED') {
                    this.resume();
                }
            }
            
            stop() {
                this.gameLoop.stop();
                this.stateManager.changeState('MENU');
            }
            
            reset() {
                this.gameLoop.stop();
                this.board.reset();
                
                this.gameState = {
                    score: 0,
                    level: 1,
                    lines: 0,
                    currentTetromino: null,
                    nextTetromino: null,
                    ghostTetromino: null,
                    board: this.board,
                    dropTimer: 0,
                    dropInterval: 1000,
                    isGameOver: false
                };
                
                this.updateUI();
                this.stateManager.changeState('MENU');
            }
            
            update(deltaTime) {
                if (this.stateManager.getCurrentState() !== 'PLAYING') return;
                
                // 自动下降逻辑
                this.gameState.dropTimer += deltaTime;
                if (this.gameState.dropTimer >= this.gameState.dropInterval) {
                    this.dropTetromino();
                    this.gameState.dropTimer = 0;
                }
                
                // 更新幽灵方块
                this.updateGhostTetromino();
            }
            
            render() {
                this.renderer.render(this.gameState);
            }
            
            spawnTetromino() {
                this.gameState.currentTetromino = this.gameState.nextTetromino || this.tetrominoFactory.getNext();
                this.gameState.nextTetromino = this.tetrominoFactory.getNext();
                
                // 检查游戏结束
                if (!this.board.isValidPosition(this.gameState.currentTetromino)) {
                    this.gameState.isGameOver = true;
                    this.stateManager.changeState('GAMEOVER');
                    return;
                }
            }
            
            moveTetromino(dx, dy) {
                if (!this.gameState.currentTetromino) return false;
                
                if (this.board.isValidPosition(this.gameState.currentTetromino, dx, dy)) {
                    this.gameState.currentTetromino.x += dx;
                    this.gameState.currentTetromino.y += dy;
                    return true;
                }
                
                return false;
            }
            
            rotateTetromino() {
                if (!this.gameState.currentTetromino) return false;
                
                const rotated = this.tetrominoFactory.rotateTetromino(this.gameState.currentTetromino);
                
                if (this.board.isValidPosition(rotated)) {
                    this.gameState.currentTetromino = rotated;
                    return true;
                }
                
                return false;
            }
            
            dropTetromino() {
                if (!this.moveTetromino(0, 1)) {
                    this.lockTetromino();
                }
            }
            
            lockTetromino() {
                if (!this.gameState.currentTetromino) return;
                
                // 放置方块到游戏板
                this.board.placeTetromino(this.gameState.currentTetromino);
                
                // 清除完整行
                const clearedLines = this.board.clearLines();
                if (clearedLines.length > 0) {
                    this.updateScore(clearedLines.length);
                }
                
                // 生成新方块
                this.spawnTetromino();
                
                this.updateUI();
            }
            
            updateGhostTetromino() {
                if (!this.gameState.currentTetromino) {
                    this.gameState.ghostTetromino = null;
                    return;
                }
                
                const ghost = {
                    ...this.gameState.currentTetromino,
                    shape: this.gameState.currentTetromino.shape.map(row => [...row])
                };
                
                // 找到最低可能位置
                while (this.board.isValidPosition(ghost, 0, 1)) {
                    ghost.y++;
                }
                
                this.gameState.ghostTetromino = ghost;
            }
            
            updateScore(linesCleared) {
                const baseScore = [0, 40, 100, 300, 1200];
                this.gameState.score += baseScore[linesCleared] * this.gameState.level;
                this.gameState.lines += linesCleared;
                
                // 升级逻辑
                const newLevel = Math.floor(this.gameState.lines / 10) + 1;
                if (newLevel > this.gameState.level) {
                    this.gameState.level = newLevel;
                    this.gameState.dropInterval = Math.max(50, 1000 - (this.gameState.level - 1) * 50);
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('level').textContent = this.gameState.level;
                document.getElementById('lines').textContent = this.gameState.lines;
            }
            
            updateGameStateDisplay(text, className) {
                const stateElement = document.getElementById('gameState');
                stateElement.textContent = text;
                stateElement.className = `game-state ${className}`;
            }
            
            getState() {
                return this.stateManager.getCurrentState();
            }
            
            setState(state) {
                this.stateManager.changeState(state);
            }
        }
        
        // 初始化游戏
        let gameEngine;
        
        document.addEventListener('DOMContentLoaded', () => {
            gameEngine = new GameEngine();
            console.log('Game Engine initialized');
        });
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello World - 一个简单的问候页面">
    <meta name="keywords" content="Hello World, 问候, 欢迎">
    <meta name="author" content="AI开发系统">
    <title>Hello World</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 内容容器 - 使用Flexbox布局管理 */
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        /* 文字显示组件 - 统一样式类 */
        .text-display {
            padding: 1rem;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
        }

        .text-display:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        /* 主标题样式 */
        .main-title {
            font-size: 3rem;
            color: #667eea;
            margin: 0;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        /* AAA文字样式 - 复用主标题样式 */
        .aaa-text {
            font-size: 2.5rem;
            color: #764ba2;
            margin: 0;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 3px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin: 0;
            font-weight: 300;
        }

        /* 描述文本 */
        .description {
            font-size: 1rem;
            color: #777;
            line-height: 1.8;
            margin: 0;
        }

        /* 按钮样式 */
        .welcome-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .welcome-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .welcome-btn:active {
            transform: translateY(0);
        }

        /* 页脚 */
        footer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        footer p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        /* 响应式设计 - 移动优先策略 */
        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }

            .container {
                margin: 1rem;
                padding: 2rem 1.5rem;
                gap: 1rem;
            }

            .main-title {
                font-size: 2.5rem;
            }

            .aaa-text {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .description {
                font-size: 0.95rem;
            }

            .welcome-btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 13px;
            }

            main {
                padding: 1rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .main-title {
                font-size: 2rem;
            }

            .aaa-text {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            header h1 {
                font-size: 1.3rem;
            }
        }

        @media (min-width: 1024px) {
            html {
                font-size: 18px;
            }

            .container {
                padding: 4rem 3rem;
                gap: 2rem;
            }

            .main-title {
                font-size: 3.5rem;
            }

            .aaa-text {
                font-size: 3rem;
            }
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 700px;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .text-display {
            animation: fadeInUp 0.6s ease-out;
        }

        .text-display:nth-child(2) {
            animation-delay: 0.2s;
        }

        .text-display:nth-child(3) {
            animation-delay: 0.4s;
        }

        .welcome-btn {
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }

        /* 可访问性增强 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 高对比度模式支持 */
        @media (prefers-contrast: high) {
            .container {
                background: white;
                border: 2px solid #333;
            }

            .text-display {
                background: #f5f5f5;
                border: 1px solid #333;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的网站</h1>
    </header>

    <main>
        <div class="container">
            <!-- HelloWorld文字显示组件 -->
            <div class="text-display">
                <h2 class="main-title">Hello World</h2>
                <p class="subtitle">欢迎来到这个美好的世界！</p>
            </div>

            <!-- AAA文字显示组件 -->
            <div class="text-display">
                <h2 class="aaa-text">AAA</h2>
                <p class="subtitle">新增的内容元素</p>
            </div>

            <!-- 描述信息 -->
            <div class="text-display">
                <p class="description">
                    这是一个简单而优雅的Hello World页面，现在包含了新的AAA文字元素。
                    页面采用响应式设计，在各种设备上都能完美显示。
                </p>
            </div>

            <button class="welcome-btn" onclick="showWelcomeMessage()">点击欢迎</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Hello World Project. 由 AI 开发系统创建。</p>
    </footer>

    <script>
        // 页面交互功能
        function showWelcomeMessage() {
            const messages = [
                '欢迎来到Hello World！',
                'AAA元素已成功添加！',
                '感谢您的访问！',
                '页面布局调整完成！'
            ];
            
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            // 创建提示框
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 1rem 2rem;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                z-index: 1000;
                animation: slideInRight 0.3s ease-out;
                font-weight: 500;
            `;
            toast.textContent = randomMessage;
            
            document.body.appendChild(toast);
            
            // 3秒后移除提示框
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOutRight {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 响应式断点检测
        class ResponsiveManager {
            constructor() {
                this.breakpoints = {
                    mobile: 480,
                    tablet: 768,
                    desktop: 1024,
                    large: 1200
                };
                this.currentBreakpoint = null;
                this.init();
            }

            init() {
                this.detectBreakpoint();
                this.setupEventListeners();
            }

            detectBreakpoint() {
                const width = window.innerWidth;
                let breakpoint = 'mobile';
                
                if (width >= this.breakpoints.large) {
                    breakpoint = 'large';
                } else if (width >= this.breakpoints.desktop) {
                    breakpoint = 'desktop';
                } else if (width >= this.breakpoints.tablet) {
                    breakpoint = 'tablet';
                }
                
                if (this.currentBreakpoint !== breakpoint) {
                    this.currentBreakpoint = breakpoint;
                    this.onBreakpointChange(breakpoint);
                }
                
                return breakpoint;
            }

            setupEventListeners() {
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        this.detectBreakpoint();
                    }, 100);
                });
            }

            onBreakpointChange(breakpoint) {
                document.body.setAttribute('data-breakpoint', breakpoint);
                console.log(`断点变化: ${breakpoint} (${window.innerWidth}px)`);
            }
        }

        // 初始化响应式管理器
        const responsiveManager = new ResponsiveManager();

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 为文字元素添加交互效果
            const textDisplays = document.querySelectorAll('.text-display');
            
            textDisplays.forEach((element, index) => {
                element.addEventListener('click', function() {
                    this.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 200);
                });
                
                // 添加键盘可访问性
                element.setAttribute('tabindex', '0');
                element.setAttribute('role', 'button');
                element.setAttribute('aria-label', `文字显示区域 ${index + 1}`);
            });

            // 添加键盘事件支持
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.classList.contains('text-display')) {
                    e.target.click();
                }
            });

            console.log('页面初始化完成 - HelloWorld和AAA元素已就绪');
        });

        // 性能优化：图片懒加载（如果有图片的话）
        if ('IntersectionObserver' in window) {
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove('lazy');
                        imageObserver.unobserve(img);
                    }
                });
            });

            document.querySelectorAll('img[data-src]').forEach(img => {
                imageObserver.observe(img);
            });
        }
    </script>
</body>
</html>

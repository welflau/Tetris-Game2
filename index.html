<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="游戏状态管理系统 - 一个完整的游戏状态管理演示">
    <meta name="keywords" content="游戏, 状态管理, JavaScript, Canvas">
    <meta name="author" content="AI开发系统">
    <title>游戏状态管理系统</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
            display: block;
            margin: 0 auto 1rem;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn.danger {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
        }

        .btn.success {
            background: linear-gradient(45deg, #51cf66, #40c057);
        }

        /* 状态显示 */
        .status-display {
            background: rgba(0, 0, 0, 0.1);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .status-item {
            display: inline-block;
            margin: 0 1rem;
            font-weight: bold;
        }

        /* 遮罩层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 100;
        }

        .overlay.show {
            display: flex;
        }

        .overlay-content {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .overlay h2 {
            margin-bottom: 1rem;
            color: #333;
        }

        .overlay p {
            margin-bottom: 1.5rem;
            color: #666;
        }

        /* 游戏对象样式 */
        .game-object {
            position: absolute;
            border-radius: 50%;
            transition: all 0.1s ease;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                padding: 1rem;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            .controls {
                gap: 0.5rem;
            }

            .btn {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>游戏状态管理系统</h1>
    </header>

    <main>
        <div class="game-container">
            <!-- 状态显示 -->
            <div class="status-display">
                <div class="status-item">状态: <span id="currentState">MENU</span></div>
                <div class="status-item">分数: <span id="score">0</span></div>
                <div class="status-item">时间: <span id="gameTime">00:00</span></div>
            </div>

            <!-- 游戏画布 -->
            <canvas id="gameCanvas" width="600" height="400"></canvas>

            <!-- 控制按钮 -->
            <div class="controls">
                <button id="startBtn" class="btn success">开始游戏</button>
                <button id="pauseBtn" class="btn" disabled>暂停</button>
                <button id="resumeBtn" class="btn" disabled>继续</button>
                <button id="endBtn" class="btn danger" disabled>结束游戏</button>
                <button id="restartBtn" class="btn">重新开始</button>
            </div>

            <!-- 暂停遮罩 -->
            <div id="pauseOverlay" class="overlay">
                <div class="overlay-content">
                    <h2>游戏已暂停</h2>
                    <p>点击继续按钮恢复游戏</p>
                    <button id="resumeFromOverlay" class="btn success">继续游戏</button>
                </div>
            </div>

            <!-- 游戏结束遮罩 -->
            <div id="gameOverOverlay" class="overlay">
                <div class="overlay-content">
                    <h2>游戏结束</h2>
                    <p id="finalScore">最终分数: 0</p>
                    <p id="gameTimeResult">游戏时间: 00:00</p>
                    <div style="margin-top: 1rem;">
                        <button id="restartFromOverlay" class="btn success">重新开始</button>
                        <button id="backToMenu" class="btn">返回菜单</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 游戏状态枚举
        const GameStates = {
            MENU: 'MENU',
            PLAYING: 'PLAYING',
            PAUSED: 'PAUSED',
            GAME_OVER: 'GAME_OVER'
        };

        // 游戏状态管理器
        class GameStateManager {
            constructor() {
                this.currentState = GameStates.MENU;
                this.observers = [];
                this.stateTransitions = {
                    [GameStates.MENU]: [GameStates.PLAYING],
                    [GameStates.PLAYING]: [GameStates.PAUSED, GameStates.GAME_OVER, GameStates.MENU],
                    [GameStates.PAUSED]: [GameStates.PLAYING, GameStates.GAME_OVER, GameStates.MENU],
                    [GameStates.GAME_OVER]: [GameStates.MENU, GameStates.PLAYING]
                };
            }

            setState(newState) {
                if (this.canTransition(this.currentState, newState)) {
                    const oldState = this.currentState;
                    this.currentState = newState;
                    this.notifyObservers(oldState, newState);
                    return true;
                }
                return false;
            }

            getState() {
                return this.currentState;
            }

            canTransition(fromState, toState) {
                return this.stateTransitions[fromState]?.includes(toState) || false;
            }

            onStateChange(callback) {
                this.observers.push(callback);
            }

            notifyObservers(oldState, newState) {
                this.observers.forEach(callback => callback(oldState, newState));
            }
        }

        // 持久化管理器
        class PersistenceManager {
            constructor() {
                this.storageKey = 'gameState';
                this.settingsKey = 'gameSettings';
            }

            saveGameState(state) {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(state));
                    return true;
                } catch (error) {
                    console.error('保存游戏状态失败:', error);
                    return false;
                }
            }

            loadGameState() {
                try {
                    const saved = localStorage.getItem(this.storageKey);
                    return saved ? JSON.parse(saved) : null;
                } catch (error) {
                    console.error('加载游戏状态失败:', error);
                    return null;
                }
            }

            clearSavedState() {
                try {
                    localStorage.removeItem(this.storageKey);
                    return true;
                } catch (error) {
                    console.error('清除保存状态失败:', error);
                    return false;
                }
            }

            saveSettings(settings) {
                try {
                    localStorage.setItem(this.settingsKey, JSON.stringify(settings));
                    return true;
                } catch (error) {
                    console.error('保存设置失败:', error);
                    return false;
                }
            }
        }

        // 游戏循环管理器
        class GameLoop {
            constructor() {
                this.isRunning = false;
                this.animationId = null;
                this.updateCallback = null;
                this.lastTime = 0;
            }

            start() {
                if (!this.isRunning) {
                    this.isRunning = true;
                    this.lastTime = performance.now();
                    this.loop();
                }
            }

            pause() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            resume() {
                if (!this.isRunning) {
                    this.isRunning = true;
                    this.lastTime = performance.now();
                    this.loop();
                }
            }

            stop() {
                this.pause();
            }

            setUpdateCallback(callback) {
                this.updateCallback = callback;
            }

            loop() {
                if (!this.isRunning) return;

                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;

                if (this.updateCallback) {
                    this.updateCallback(deltaTime);
                }

                this.animationId = requestAnimationFrame(() => this.loop());
            }
        }

        // UI状态渲染器
        class UIStateRenderer {
            constructor() {
                this.elements = {
                    currentState: document.getElementById('currentState'),
                    score: document.getElementById('score'),
                    gameTime: document.getElementById('gameTime'),
                    startBtn: document.getElementById('startBtn'),
                    pauseBtn: document.getElementById('pauseBtn'),
                    resumeBtn: document.getElementById('resumeBtn'),
                    endBtn: document.getElementById('endBtn'),
                    restartBtn: document.getElementById('restartBtn'),
                    pauseOverlay: document.getElementById('pauseOverlay'),
                    gameOverOverlay: document.getElementById('gameOverOverlay'),
                    finalScore: document.getElementById('finalScore'),
                    gameTimeResult: document.getElementById('gameTimeResult')
                };
            }

            renderState(state) {
                this.elements.currentState.textContent = state;
                this.updateButtonStates(state);
                this.hideAllOverlays();

                switch (state) {
                    case GameStates.PAUSED:
                        this.showPauseOverlay();
                        break;
                    case GameStates.GAME_OVER:
                        this.showGameOverScreen();
                        break;
                }
            }

            updateButtonStates(state) {
                const buttons = this.elements;
                
                // 重置所有按钮状态
                Object.values(buttons).forEach(btn => {
                    if (btn && btn.disabled !== undefined) {
                        btn.disabled = false;
                    }
                });

                switch (state) {
                    case GameStates.MENU:
                        buttons.pauseBtn.disabled = true;
                        buttons.resumeBtn.disabled = true;
                        buttons.endBtn.disabled = true;
                        break;
                    case GameStates.PLAYING:
                        buttons.startBtn.disabled = true;
                        buttons.resumeBtn.disabled = true;
                        break;
                    case GameStates.PAUSED:
                        buttons.startBtn.disabled = true;
                        buttons.pauseBtn.disabled = true;
                        break;
                    case GameStates.GAME_OVER:
                        buttons.startBtn.disabled = true;
                        buttons.pauseBtn.disabled = true;
                        buttons.resumeBtn.disabled = true;
                        buttons.endBtn.disabled = true;
                        break;
                }
            }

            showPauseOverlay() {
                this.elements.pauseOverlay.classList.add('show');
            }

            showGameOverScreen() {
                this.elements.gameOverOverlay.classList.add('show');
            }

            hideAllOverlays() {
                this.elements.pauseOverlay.classList.remove('show');
                this.elements.gameOverOverlay.classList.remove('show');
            }

            updateScore(score) {
                this.elements.score.textContent = score;
            }

            updateGameTime(time) {
                const minutes = Math.floor(time / 60000);
                const seconds = Math.floor((time % 60000) / 1000);
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                this.elements.gameTime.textContent = timeString;
            }

            updateFinalResults(score, time) {
                this.elements.finalScore.textContent = `最终分数: ${score}`;
                const minutes = Math.floor(time / 60000);
                const seconds = Math.floor((time % 60000) / 1000);
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                this.elements.gameTimeResult.textContent = `游戏时间: ${timeString}`;
            }
        }

        // 输入处理器
        class InputHandler {
            constructor(gameController) {
                this.gameController = gameController;
                this.enabled = true;
                this.keyBindings = {
                    [GameStates.MENU]: {
                        'Enter': () => this.gameController.startGame(),
                        ' ': () => this.gameController.startGame()
                    },
                    [GameStates.PLAYING]: {
                        'Escape': () => this.gameController.pauseGame(),
                        ' ': () => this.gameController.pauseGame()
                    },
                    [GameStates.PAUSED]: {
                        'Escape': () => this.gameController.resumeGame(),
                        ' ': () => this.gameController.resumeGame(),
                        'Enter': () => this.gameController.resumeGame()
                    },
                    [GameStates.GAME_OVER]: {
                        'Enter': () => this.gameController.restartGame(),
                        ' ': () => this.gameController.restartGame(),
                        'Escape': () => this.gameController.backToMenu()
                    }
                };

                this.bindEvents();
            }

            bindEvents() {
                document.addEventListener('keydown', (event) => {
                    this.handleKeyPress(event.key, this.gameController.stateManager.getState());
                });
            }

            handleKeyPress(key, currentState) {
                if (!this.enabled) return;

                const stateBindings = this.keyBindings[currentState];
                if (stateBindings && stateBindings[key]) {
                    event.preventDefault();
                    stateBindings[key]();
                }
            }

            enableInput() {
                this.enabled = true;
            }

            disableInput() {
                this.enabled = false;
            }

            bindStateSpecificControls(state) {
                // 可以根据状态绑定特定的控制逻辑
                console.log(`绑定状态 ${state} 的特定控制`);
            }
        }

        // 简单的游戏对象
        class GameObject {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
            }

            update(deltaTime, canvasWidth, canvasHeight) {
                this.x += this.vx;
                this.y += this.vy;

                // 边界碰撞检测
                if (this.x <= this.size || this.x >= canvasWidth - this.size) {
                    this.vx = -this.vx;
                    this.x = Math.max(this.size, Math.min(canvasWidth - this.size, this.x));
                }
                if (this.y <= this.size || this.y >= canvasHeight - this.size) {
                    this.vy = -this.vy;
                    this.y = Math.max(this.size, Math.min(canvasHeight - this.size, this.y));
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 游戏控制器
        class GameController {
            constructor() {
                this.stateManager = new GameStateManager();
                this.persistenceManager = new PersistenceManager();
                this.gameLoop = new GameLoop();
                this.uiRenderer = new UIStateRenderer();
                this.inputHandler = new InputHandler(this);

                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.gameData = {
                    score: 0,
                    startTime: 0,
                    gameTime: 0,
                    objects: []
                };

                this.init();
            }

            init() {
                // 注册状态变化监听器
                this.stateManager.onStateChange((oldState, newState) => {
                    this.handleStateTransition(oldState, newState);
                });

                // 设置游戏循环回调
                this.gameLoop.setUpdateCallback((deltaTime) => {
                    this.update(deltaTime);
                    this.render();
                });

                // 绑定UI事件
                this.bindUIEvents();

                // 初始化UI
                this.uiRenderer.renderState(this.stateManager.getState());
            }

            bindUIEvents() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pauseGame());
                document.getElementById('resumeBtn').addEventListener('click', () => this.resumeGame());
                document.getElementById('endBtn').addEventListener('click', () => this.endGame());
                document.getElementById('restartBtn').addEventListener('click', () => this.restartGame());
                document.getElementById('resumeFromOverlay').addEventListener('click', () => this.resumeGame());
                document.getElementById('restartFromOverlay').addEventListener('click', () => this.restartGame());
                document.getElementById('backToMenu').addEventListener('click', () => this.backToMenu());
            }

            startGame() {
                if (this.stateManager.setState(GameStates.PLAYING)) {
                    this.initializeGame();
                    this.gameLoop.start();
                }
            }

            pauseGame() {
                if (this.stateManager.setState(GameStates.PAUSED)) {
                    this.gameLoop.pause();
                }
            }

            resumeGame() {
                if (this.stateManager.setState(GameStates.PLAYING)) {
                    this.gameLoop.resume();
                }
            }

            endGame() {
                if (this.stateManager.setState(GameStates.GAME_OVER)) {
                    this.gameLoop.stop();
                    this.uiRenderer.updateFinalResults(this.gameData.score, this.gameData.gameTime);
                }
            }

            restartGame() {
                this.stateManager.setState(GameStates.PLAYING);
                this.initializeGame();
                this.gameLoop.start();
            }

            backToMenu() {
                this.stateManager.setState(GameStates.MENU);
                this.gameLoop.stop();
                this.clearCanvas();
            }

            handleStateTransition(oldState, newState) {
                console.log(`状态转换: ${oldState} -> ${newState}`);
                
                // 更新UI
                this.uiRenderer.renderState(newState);
                
                // 保存状态
                this.persistenceManager.saveGameState({
                    state: newState,
                    gameData: this.gameData,
                    timestamp: Date.now()
                });

                // 状态特定逻辑
                switch (newState) {
                    case GameStates.PLAYING:
                        this.inputHandler.enableInput();
                        break;
                    case GameStates.PAUSED:
                        // 暂停时可以保持输入启用以便恢复
                        break;
                    case GameStates.GAME_OVER:
                        this.inputHandler.enableInput();
                        break;
                    case GameStates.MENU:
                        this.inputHandler.enableInput();
                        this.resetGameData();
                        break;
                }
            }

            initializeGame() {
                this.gameData.score = 0;
                this.gameData.startTime = Date.now();
                this.gameData.gameTime = 0;
                this.gameData.objects = [];

                // 创建一些游戏对象
                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57'];
                for (let i = 0; i < 5; i++) {
                    this.gameData.objects.push(new GameObject(
                        Math.random() * (this.canvas.width - 40) + 20,
                        Math.random() * (this.canvas.height - 40) + 20,
                        10 + Math.random() * 15,
                        colors[i % colors.length]
                    ));
                }

                this.uiRenderer.updateScore(this.gameData.score);
                this.uiRenderer.updateGameTime(this.gameData.gameTime);
            }

            resetGameData() {
                this.gameData = {
                    score: 0,
                    startTime: 0,
                    gameTime: 0,
                    objects: []
                };
                this.uiRenderer.updateScore(0);
                this.uiRenderer.updateGameTime(0);
            }

            update(deltaTime) {
                if (this.stateManager.getState() !== GameStates.PLAYING) return;

                // 更新游戏时间
                this.gameData.gameTime = Date.now() - this.gameData.startTime;
                this.uiRenderer.updateGameTime(this.gameData.gameTime);

                // 更新游戏对象
                this.gameData.objects.forEach(obj => {
                    obj.update(deltaTime, this.canvas.width, this.canvas.height);
                });

                // 简单的分数逻辑
                this.gameData.score += Math.floor(deltaTime / 100);
                this.uiRenderer.updateScore(this.gameData.score);

                // 游戏结束条件（示例：30秒后自动结束）
                if (this.gameData.gameTime > 30000) {
                    this.endGame();
                }
            }

            render() {
                this.clearCanvas();

                if (this.stateManager.getState() === GameStates.MENU) {
                    this.renderMenu();
                } else if (this.gameData.objects.length > 0) {
                    this.gameData.objects.forEach(obj => obj.draw(this.ctx));
                }
            }

            clearCanvas() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            renderMenu() {
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('欢迎来到游戏状态管理演示', this.canvas.width / 2, this.canvas.height / 2 - 50);
                this.ctx.font = '16px Arial';
                this.ctx.fillText('点击开始游戏或按空格键/回车键开始', this.canvas.width / 2, this.canvas.height / 2);
                this.ctx.fillText('游戏中按ESC或空格键暂停', this.canvas.width / 2, this.canvas.height / 2 + 30);
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            const game = new GameController();
            window.game = game; // 用于调试
        });
    </script>
</body>
</html>

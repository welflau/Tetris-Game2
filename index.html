<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="游戏状态管理系统 - 一个完整的游戏状态管理演示">
    <meta name="keywords" content="游戏, 状态管理, JavaScript, Canvas">
    <meta name="author" content="AI开发系统">
    <title>游戏状态管理系统</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* 游戏容器 */
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 800px;
            width: 100%;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
            display: block;
            margin: 0 auto 1rem;
        }

        /* 控制面板 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 音频控制面板 */
        .audio-controls {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .audio-controls h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .volume-slider {
            flex: 1;
            height: 5px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        /* 游戏信息 */
        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.2rem;
        }

        .info-value {
            font-size: 1.2rem;
            color: #333;
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 0.5rem;
        }

        .status-loading {
            background: orange;
            animation: pulse 1s infinite;
        }

        .status-ready {
            background: green;
        }

        .status-error {
            background: red;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                padding: 1rem;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>游戏音效系统演示</h1>
    </header>

    <main>
        <div class="game-container">
            <!-- 音频控制面板 -->
            <div class="audio-controls">
                <h3>音效控制 <span id="audioStatus" class="status-indicator status-loading"></span></h3>
                <div class="volume-control">
                    <label for="volumeSlider">音量:</label>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
                    <span id="volumeValue">70%</span>
                </div>
                <div class="controls">
                    <button id="muteBtn" class="btn">静音</button>
                    <button id="testMoveBtn" class="btn">测试移动音效</button>
                    <button id="testClearBtn" class="btn">测试消行音效</button>
                    <button id="testGameOverBtn" class="btn">测试游戏结束音效</button>
                </div>
            </div>

            <!-- 游戏画布 -->
            <canvas id="gameCanvas" width="400" height="600"></canvas>

            <!-- 游戏信息 -->
            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">得分</span>
                    <span id="score" class="info-value">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">等级</span>
                    <span id="level" class="info-value">1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">消行</span>
                    <span id="lines" class="info-value">0</span>
                </div>
            </div>

            <!-- 游戏控制 -->
            <div class="controls">
                <button id="startBtn" class="btn">开始游戏</button>
                <button id="pauseBtn" class="btn">暂停</button>
                <button id="resetBtn" class="btn">重置</button>
            </div>
        </div>
    </main>

    <script>
        // 音效类型定义
        class SoundEffects {
            static SOUND_TYPES = {
                MOVE: 'move',
                ROTATE: 'rotate',
                DROP: 'drop',
                CLEAR_LINE: 'clearLine',
                CLEAR_TETRIS: 'clearTetris',
                GAME_OVER: 'gameOver',
                LEVEL_UP: 'levelUp',
                PAUSE: 'pause'
            };

            static getSoundConfig(soundName) {
                const configs = {
                    [this.SOUND_TYPES.MOVE]: {
                        frequency: 220,
                        duration: 0.1,
                        type: 'square',
                        volume: 0.3
                    },
                    [this.SOUND_TYPES.ROTATE]: {
                        frequency: 330,
                        duration: 0.15,
                        type: 'sine',
                        volume: 0.4
                    },
                    [this.SOUND_TYPES.DROP]: {
                        frequency: 110,
                        duration: 0.2,
                        type: 'triangle',
                        volume: 0.5
                    },
                    [this.SOUND_TYPES.CLEAR_LINE]: {
                        frequencies: [440, 554, 659, 880],
                        duration: 0.5,
                        type: 'sine',
                        volume: 0.6
                    },
                    [this.SOUND_TYPES.CLEAR_TETRIS]: {
                        frequencies: [440, 554, 659, 880, 1108],
                        duration: 0.8,
                        type: 'sine',
                        volume: 0.7
                    },
                    [this.SOUND_TYPES.GAME_OVER]: {
                        frequencies: [220, 196, 174, 146],
                        duration: 1.0,
                        type: 'sawtooth',
                        volume: 0.8
                    },
                    [this.SOUND_TYPES.LEVEL_UP]: {
                        frequencies: [523, 659, 784, 1047],
                        duration: 0.6,
                        type: 'sine',
                        volume: 0.6
                    },
                    [this.SOUND_TYPES.PAUSE]: {
                        frequency: 440,
                        duration: 0.3,
                        type: 'sine',
                        volume: 0.4
                    }
                };
                return configs[soundName] || null;
            }

            static getAllSounds() {
                return Object.values(this.SOUND_TYPES);
            }
        }

        // 音频设置管理
        class AudioSettings {
            constructor() {
                this.defaultSettings = {
                    volume: 0.7,
                    muted: false,
                    soundEnabled: true
                };
            }

            saveSettings(settings) {
                try {
                    localStorage.setItem('gameAudioSettings', JSON.stringify(settings));
                } catch (error) {
                    console.warn('无法保存音频设置:', error);
                }
            }

            loadSettings() {
                try {
                    const saved = localStorage.getItem('gameAudioSettings');
                    return saved ? { ...this.defaultSettings, ...JSON.parse(saved) } : this.defaultSettings;
                } catch (error) {
                    console.warn('无法加载音频设置:', error);
                    return this.defaultSettings;
                }
            }

            resetToDefault() {
                this.saveSettings(this.defaultSettings);
                return this.defaultSettings;
            }

            updateSetting(key, value) {
                const settings = this.loadSettings();
                settings[key] = value;
                this.saveSettings(settings);
                return settings;
            }
        }

        // 音频加载器
        class AudioLoader {
            constructor() {
                this.loadProgress = 0;
                this.totalSounds = 0;
                this.loadedSounds = 0;
            }

            async loadSingle(config) {
                return new Promise((resolve) => {
                    // 由于使用Web Audio API生成音效，这里直接返回配置
                    setTimeout(() => {
                        this.loadedSounds++;
                        this.updateProgress();
                        resolve(config);
                    }, 100); // 模拟加载时间
                });
            }

            async loadBatch(configMap) {
                this.totalSounds = Object.keys(configMap).length;
                this.loadedSounds = 0;
                this.loadProgress = 0;

                const loadPromises = Object.entries(configMap).map(async ([name, config]) => {
                    const loadedConfig = await this.loadSingle(config);
                    return [name, loadedConfig];
                });

                const results = await Promise.all(loadPromises);
                return new Map(results);
            }

            updateProgress() {
                this.loadProgress = this.totalSounds > 0 ? (this.loadedSounds / this.totalSounds) * 100 : 0;
            }

            getLoadProgress() {
                return this.loadProgress;
            }
        }

        // 音效管理器（单例模式）
        class AudioManager {
            constructor() {
                if (AudioManager.instance) {
                    return AudioManager.instance;
                }

                this.audioContext = null;
                this.sounds = new Map();
                this.settings = new AudioSettings();
                this.loader = new AudioLoader();
                this.masterVolume = 0.7;
                this.muted = false;
                this.initialized = false;

                AudioManager.instance = this;
            }

            async init() {
                if (this.initialized) return;

                try {
                    // 创建音频上下文
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // 加载设置
                    const savedSettings = this.settings.loadSettings();
                    this.masterVolume = savedSettings.volume;
                    this.muted = savedSettings.muted;

                    // 预加载所有音效
                    await this.preloadAll();
                    
                    this.initialized = true;
                    console.log('音效系统初始化完成');
                } catch (error) {
                    console.error('音效系统初始化失败:', error);
                    throw error;
                }
            }

            async preloadAll() {
                const soundConfigs = {};
                SoundEffects.getAllSounds().forEach(soundName => {
                    soundConfigs[soundName] = SoundEffects.getSoundConfig(soundName);
                });

                this.sounds = await this.loader.loadBatch(soundConfigs);
            }

            createOscillator(frequency, type, duration, volume) {
                if (!this.audioContext) return null;

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                oscillator.type = type;

                const finalVolume = this.muted ? 0 : volume * this.masterVolume;
                gainNode.gain.setValueAtTime(finalVolume, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);

                return { oscillator, gainNode, duration };
            }

            playSound(soundName, options = {}) {
                if (!this.initialized || this.muted) return;

                const config = this.sounds.get(soundName);
                if (!config) {
                    console.warn(`音效 ${soundName} 未找到`);
                    return;
                }

                try {
                    // 恢复音频上下文（处理浏览器自动播放策略）
                    if (this.audioContext.state === 'suspended') {
                        this.audioContext.resume();
                    }

                    if (config.frequencies) {
                        // 播放多音符音效
                        this.playMultiToneSound(config, options);
                    } else {
                        // 播放单音符音效
                        this.playSingleToneSound(config, options);
                    }
                } catch (error) {
                    console.error(`播放音效 ${soundName} 失败:`, error);
                }
            }

            playSingleToneSound(config, options) {
                const sound = this.createOscillator(
                    config.frequency,
                    config.type,
                    config.duration,
                    options.volume || config.volume
                );

                if (sound) {
                    sound.oscillator.start(this.audioContext.currentTime);
                    sound.oscillator.stop(this.audioContext.currentTime + sound.duration);
                }
            }

            playMultiToneSound(config, options) {
                const baseTime = this.audioContext.currentTime;
                const noteDuration = config.duration / config.frequencies.length;

                config.frequencies.forEach((frequency, index) => {
                    const startTime = baseTime + (index * noteDuration * 0.8); // 轻微重叠
                    const sound = this.createOscillator(
                        frequency,
                        config.type,
                        noteDuration,
                        options.volume || config.volume
                    );

                    if (sound) {
                        sound.oscillator.start(startTime);
                        sound.oscillator.stop(startTime + noteDuration);
                    }
                });
            }

            setVolume(volume) {
                this.masterVolume = Math.max(0, Math.min(1, volume));
                this.settings.updateSetting('volume', this.masterVolume);
            }

            mute() {
                this.muted = true;
                this.settings.updateSetting('muted', true);
            }

            unmute() {
                this.muted = false;
                this.settings.updateSetting('muted', false);
            }

            toggleMute() {
                if (this.muted) {
                    this.unmute();
                } else {
                    this.mute();
                }
                return this.muted;
            }

            getVolume() {
                return this.masterVolume;
            }

            isMuted() {
                return this.muted;
            }
        }

        // 游戏音效控制器
        class GameAudioController {
            constructor() {
                this.audioManager = new AudioManager();
                this.eventListeners = new Map();
                this.initialized = false;
            }

            async init() {
                if (this.initialized) return;

                try {
                    await this.audioManager.init();
                    this.bindGameEvents();
                    this.initialized = true;
                    console.log('游戏音效控制器初始化完成');
                } catch (error) {
                    console.error('游戏音效控制器初始化失败:', error);
                    throw error;
                }
            }

            bindGameEvents() {
                // 绑定自定义游戏事件
                const events = {
                    'piece-move': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.MOVE),
                    'piece-rotate': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.ROTATE),
                    'piece-drop': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.DROP),
                    'line-clear': (data) => {
                        if (data && data.lines === 4) {
                            this.audioManager.playSound(SoundEffects.SOUND_TYPES.CLEAR_TETRIS);
                        } else {
                            this.audioManager.playSound(SoundEffects.SOUND_TYPES.CLEAR_LINE);
                        }
                    },
                    'game-over': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.GAME_OVER),
                    'level-up': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.LEVEL_UP),
                    'game-pause': () => this.audioManager.playSound(SoundEffects.SOUND_TYPES.PAUSE)
                };

                Object.entries(events).forEach(([eventType, handler]) => {
                    const listener = (event) => handler(event.detail);
                    document.addEventListener(eventType, listener);
                    this.eventListeners.set(eventType, listener);
                });
            }

            handleGameEvent(eventType, data) {
                // 手动触发游戏事件
                const event = new CustomEvent(eventType, { detail: data });
                document.dispatchEvent(event);
            }

            destroy() {
                // 清理事件监听器
                this.eventListeners.forEach((listener, eventType) => {
                    document.removeEventListener(eventType, listener);
                });
                this.eventListeners.clear();
                this.initialized = false;
            }
        }

        // 简单的俄罗斯方块游戏演示
        class TetrisGame {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.audioController = new GameAudioController();
                
                this.blockSize = 20;
                this.cols = 20;
                this.rows = 30;
                this.board = [];
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                this.gamePaused = false;
                
                this.currentPiece = null;
                this.gameLoop = null;
                
                this.initBoard();
            }

            async init() {
                await this.audioController.init();
                this.bindControls();
                console.log('游戏初始化完成');
            }

            initBoard() {
                this.board = Array(this.rows).fill().map(() => Array(this.cols).fill(0));
            }

            bindControls() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                            this.audioController.handleGameEvent('piece-move');
                            break;
                        case 'ArrowRight':
                            this.audioController.handleGameEvent('piece-move');
                            break;
                        case 'ArrowDown':
                            this.audioController.handleGameEvent('piece-move');
                            break;
                        case 'ArrowUp':
                            this.audioController.handleGameEvent('piece-rotate');
                            break;
                        case ' ':
                            this.audioController.handleGameEvent('piece-drop');
                            break;
                    }
                });
            }

            start() {
                if (this.gameRunning) return;
                
                this.gameRunning = true;
                this.gamePaused = false;
                this.initBoard();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.updateUI();
                
                this.gameLoop = setInterval(() => {
                    if (!this.gamePaused) {
                        this.update();
                        this.draw();
                    }
                }, 500);
            }

            pause() {
                if (!this.gameRunning) return;
                
                this.gamePaused = !this.gamePaused;
                this.audioController.handleGameEvent('game-pause');
            }

            reset() {
                this.gameRunning = false;
                this.gamePaused = false;
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
                this.initBoard();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.updateUI();
                this.draw();
            }

            update() {
                // 简化的游戏逻辑，主要用于演示音效
                if (Math.random() < 0.1) {
                    // 模拟消行
                    const clearedLines = Math.floor(Math.random() * 4) + 1;
                    this.lines += clearedLines;
                    this.score += clearedLines * 100 * this.level;
                    
                    this.audioController.handleGameEvent('line-clear', { lines: clearedLines });
                    
                    // 检查升级
                    const newLevel = Math.floor(this.lines / 10) + 1;
                    if (newLevel > this.level) {
                        this.level = newLevel;
                        this.audioController.handleGameEvent('level-up');
                    }
                    
                    this.updateUI();
                }
                
                // 模拟游戏结束
                if (this.score > 5000) {
                    this.gameOver();
                }
            }

            gameOver() {
                this.gameRunning = false;
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
                this.audioController.handleGameEvent('game-over');
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#333';
                this.ctx.lineWidth = 1;
                
                for (let x = 0; x <= this.canvas.width; x += this.blockSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = 0; y <= this.canvas.height; y += this.blockSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
                
                // 绘制一些随机方块作为演示
                this.ctx.fillStyle = '#667eea';
                for (let i = 0; i < 10; i++) {
                    const x = Math.floor(Math.random() * this.cols) * this.blockSize;
                    const y = Math.floor(Math.random() * this.rows) * this.blockSize;
                    this.ctx.fillRect(x, y, this.blockSize - 1, this.blockSize - 1);
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }

        // 应用程序初始化
        class App {
            constructor() {
                this.game = null;
                this.audioManager = null;
            }

            async init() {
                try {
                    // 初始化游戏
                    const canvas = document.getElementById('gameCanvas');
                    this.game = new TetrisGame(canvas);
                    await this.game.init();
                    
                    // 获取音频管理器实例
                    this.audioManager = new AudioManager();
                    
                    // 绑定UI事件
                    this.bindUIEvents();
                    
                    // 初始化UI状态
                    this.updateAudioStatus('ready');
                    this.updateVolumeDisplay();
                    
                    // 绘制初始画面
                    this.game.draw();
                    
                    console.log('应用程序初始化完成');
                } catch (error) {
                    console.error('应用程序初始化失败:', error);
                    this.updateAudioStatus('error');
                }
            }

            bindUIEvents() {
                // 游戏控制按钮
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.game.start();
                });
                
                document.getElementById('pauseBtn').addEventListener('click', () => {
                    this.game.pause();
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.game.reset();
                });
                
                // 音频控制
                const volumeSlider = document.getElementById('volumeSlider');
                const volumeValue = document.getElementById('volumeValue');
                
                volumeSlider.addEventListener('input', (e) => {
                    const volume = e.target.value / 100;
                    this.audioManager.setVolume(volume);
                    volumeValue.textContent = e.target.value + '%';
                });
                
                document.getElementById('muteBtn').addEventListener('click', () => {
                    const muted = this.audioManager.toggleMute();
                    document.getElementById('muteBtn').textContent = muted ? '取消静音' : '静音';
                });
                
                // 测试音效按钮
                document.getElementById('testMoveBtn').addEventListener('click', () => {
                    this.audioManager.playSound(SoundEffects.SOUND_TYPES.MOVE);
                });
                
                document.getElementById('testClearBtn').addEventListener('click', () => {
                    this.audioManager.playSound(SoundEffects.SOUND_TYPES.CLEAR_LINE);
                });
                
                document.getElementById('testGameOverBtn').addEventListener('click', () => {
                    this.audioManager.playSound(SoundEffects.SOUND_TYPES.GAME_OVER);
                });
            }

            updateAudioStatus(status) {
                const statusElement = document.getElementById('audioStatus');
                statusElement.className = `status-indicator status-${status}`;
            }

            updateVolumeDisplay() {
                const volume = Math.round(this.audioManager.getVolume() * 100);
                document.getElementById('volumeSlider').value = volume;
                document.getElementById('volumeValue').textContent = volume + '%';
                
                const muted = this.audioManager.isMuted();
                document.getElementById('muteBtn').textContent = muted ? '取消静音' : '静音';
            }
        }

        // 启动应用程序
        document.addEventListener('DOMContentLoaded', async () => {
            const app = new App();
            await app.init();
        });

        // 处理用户交互以启用音频上下文
        document.addEventListener('click', () => {
            const audioManager = new AudioManager();
            if (audioManager.audioContext && audioManager.audioContext.state === 'suspended') {
                audioManager.audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
</html>

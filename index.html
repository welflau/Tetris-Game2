<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 2rem;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        /* 游戏面板 */
        .game-board {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            box-shadow: var(--shadow-heavy);
        }

        /* 游戏画布 */
        #gameCanvas {
            display: block;
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.8);
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 200px;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            box-shadow: var(--shadow-light);
        }

        .info-panel h3 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            text-align: center;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-value {
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--text-light);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary {
            background: var(--warning-color);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .btn-danger {
            background: var(--danger-color);
            color: var(--text-light);
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        /* 下一个方块预览 */
        .next-piece {
            text-align: center;
        }

        #nextCanvas {
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.6);
            margin: 0 auto;
            display: block;
        }

        /* 游戏结束遮罩 */
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius-large);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-heavy);
            max-width: 400px;
            width: 90%;
        }

        .game-over h2 {
            color: var(--danger-color);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .game-over p {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* 排行榜样式 */
        .leaderboard-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .leaderboard-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius-large);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-heavy);
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .leaderboard-header h2 {
            color: var(--text-light);
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-glass);
        }

        .leaderboard-rank {
            font-weight: bold;
            color: var(--accent-color);
            min-width: 30px;
        }

        .leaderboard-name {
            flex: 1;
            color: var(--text-light);
            margin: 0 1rem;
        }

        .leaderboard-score {
            color: var(--warning-color);
            font-weight: bold;
        }

        .leaderboard-details {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 1rem;
        }

        .empty-leaderboard {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            padding: 2rem;
            font-style: italic;
        }

        /* 新纪录输入对话框 */
        .score-entry-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .score-entry-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius-large);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-heavy);
            max-width: 400px;
            width: 90%;
        }

        .score-entry-content h2 {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .score-entry-content p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .name-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .name-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .entry-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 1rem;
            }

            .game-container {
                flex-direction: column;
                align-items: center;
            }

            .sidebar {
                min-width: auto;
                width: 100%;
                max-width: 300px;
            }

            #gameCanvas {
                width: 300px;
                height: 600px;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            #gameCanvas {
                width: 250px;
                height: 500px;
            }

            .game-over-content,
            .leaderboard-content,
            .score-entry-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-board">
                <canvas id="gameCanvas" width="300" height="600"></canvas>
            </div>

            <div class="sidebar">
                <div class="info-panel">
                    <h3>📊 游戏信息</h3>
                    <div class="info-item">
                        <span>分数:</span>
                        <span class="info-value" id="score">0</span>
                    </div>
                    <div class="info-item">
                        <span>等级:</span>
                        <span class="info-value" id="level">1</span>
                    </div>
                    <div class="info-item">
                        <span>行数:</span>
                        <span class="info-value" id="lines">0</span>
                    </div>
                </div>

                <div class="info-panel next-piece">
                    <h3>🔮 下一个</h3>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>

                <div class="info-panel controls">
                    <h3>🎮 控制</h3>
                    <button class="btn btn-primary" id="startBtn">开始游戏</button>
                    <button class="btn btn-secondary" id="pauseBtn">暂停</button>
                    <button class="btn btn-danger" id="resetBtn">重新开始</button>
                    <button class="btn btn-primary" id="leaderboardBtn">排行榜</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 游戏结束遮罩 -->
    <div class="game-over" id="gameOverModal">
        <div class="game-over-content">
            <h2>🎯 游戏结束</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <p>等级: <span id="finalLevel">1</span></p>
            <p>消除行数: <span id="finalLines">0</span></p>
            <div class="controls">
                <button class="btn btn-primary" onclick="restartGame()">再来一局</button>
                <button class="btn btn-secondary" onclick="showLeaderboard()">查看排行榜</button>
            </div>
        </div>
    </div>

    <!-- 排行榜模态框 -->
    <div class="leaderboard-modal" id="leaderboardModal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <h2>🏆 排行榜</h2>
                <button class="close-btn" onclick="hideLeaderboard()">&times;</button>
            </div>
            <ul class="leaderboard-list" id="leaderboardList">
                <!-- 排行榜项目将在这里动态生成 -->
            </ul>
            <div class="controls">
                <button class="btn btn-danger" onclick="clearLeaderboard()">清空记录</button>
            </div>
        </div>
    </div>

    <!-- 新纪录输入对话框 -->
    <div class="score-entry-modal" id="scoreEntryModal">
        <div class="score-entry-content">
            <h2>🎉 新纪录！</h2>
            <p>恭喜你创造了新纪录！<br>分数: <span id="newRecordScore">0</span></p>
            <input type="text" class="name-input" id="playerNameInput" placeholder="请输入你的名字" maxlength="20">
            <div class="entry-buttons">
                <button class="btn btn-primary" onclick="submitScore()">保存</button>
                <button class="btn btn-secondary" onclick="skipScore()">跳过</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = 30;
        
        // 方块形状定义
        const PIECES = {
            I: {
                shape: [[1, 1, 1, 1]],
                color: '#00f0f0'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#f0f000'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ],
                color: '#a000f0'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ],
                color: '#00f000'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ],
                color: '#f00000'
            },
            J: {
                shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ],
                color: '#0000f0'
            },
            L: {
                shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ],
                color: '#f0a000'
            }
        };

        // 游戏状态
        let gameState = {
            board: [],
            currentPiece: null,
            nextPiece: null,
            score: 0,
            level: 1,
            lines: 0,
            isPlaying: false,
            isPaused: false,
            gameLoop: null,
            dropTime: 0,
            lastTime: 0
        };

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 排行榜管理器
        class LeaderboardManager {
            constructor() {
                this.storageKey = 'tetris_leaderboard';
            }

            saveScore(playerName, score, level, lines) {
                const scores = this.getTopScores();
                const newScore = {
                    name: playerName,
                    score: score,
                    level: level,
                    lines: lines,
                    date: new Date().toISOString()
                };

                scores.push(newScore);
                scores.sort((a, b) => b.score - a.score);
                scores.splice(10); // 只保留前10名

                localStorage.setItem(this.storageKey, JSON.stringify(scores));
                return scores;
            }

            getTopScores(limit = 10) {
                try {
                    const scores = JSON.parse(localStorage.getItem(this.storageKey) || '[]');
                    return scores.slice(0, limit);
                } catch (e) {
                    console.error('Error loading leaderboard:', e);
                    return [];
                }
            }

            clearLeaderboard() {
                localStorage.removeItem(this.storageKey);
            }

            isNewRecord(score) {
                const scores = this.getTopScores();
                return scores.length < 10 || score > (scores[scores.length - 1]?.score || 0);
            }

            exportScores() {
                return JSON.stringify(this.getTopScores(), null, 2);
            }

            importScores(data) {
                try {
                    const scores = JSON.parse(data);
                    if (Array.isArray(scores)) {
                        localStorage.setItem(this.storageKey, JSON.stringify(scores));
                        return true;
                    }
                } catch (e) {
                    console.error('Error importing scores:', e);
                }
                return false;
            }
        }

        // 排行榜UI管理器
        class LeaderboardUI {
            constructor(leaderboardManager) {
                this.manager = leaderboardManager;
                this.modal = document.getElementById('leaderboardModal');
                this.list = document.getElementById('leaderboardList');
            }

            render(container) {
                // 渲染方法，如果需要动态创建UI元素
            }

            showLeaderboard() {
                this.updateDisplay(this.manager.getTopScores());
                this.modal.style.display = 'flex';
            }

            hideLeaderboard() {
                this.modal.style.display = 'none';
            }

            updateDisplay(scores) {
                this.list.innerHTML = '';
                
                if (scores.length === 0) {
                    this.list.innerHTML = '<div class="empty-leaderboard">暂无记录</div>';
                    return;
                }

                scores.forEach((score, index) => {
                    const item = document.createElement('li');
                    item.className = 'leaderboard-item';
                    
                    const date = new Date(score.date).toLocaleDateString('zh-CN');
                    
                    item.innerHTML = `
                        <span class="leaderboard-rank">#${index + 1}</span>
                        <span class="leaderboard-name">${this.escapeHtml(score.name)}</span>
                        <div>
                            <div class="leaderboard-score">${score.score.toLocaleString()}</div>
                            <div class="leaderboard-details">L${score.level} · ${score.lines}行 · ${date}</div>
                        </div>
                    `;
                    
                    this.list.appendChild(item);
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            showNewRecordDialog(score) {
                // 这个方法由ScoreEntry类处理
            }
        }

        // 新纪录输入管理器
        class ScoreEntry {
            constructor(leaderboardManager) {
                this.manager = leaderboardManager;
                this.modal = document.getElementById('scoreEntryModal');
                this.scoreDisplay = document.getElementById('newRecordScore');
                this.nameInput = document.getElementById('playerNameInput');
                this.currentScore = null;
                this.callback = null;
            }

            showEntryDialog(score, callback) {
                this.currentScore = score;
                this.callback = callback;
                this.scoreDisplay.textContent = score.score.toLocaleString();
                this.nameInput.value = '';
                this.modal.style.display = 'flex';
                this.nameInput.focus();

                // 添加回车键提交
                this.nameInput.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        this.submitScore();
                    }
                };
            }

            validatePlayerName(name) {
                return name.trim().length > 0 && name.trim().length <= 20;
            }

            submitScore() {
                const name = this.nameInput.value.trim();
                if (!this.validatePlayerName(name)) {
                    alert('请输入有效的名字（1-20个字符）');
                    return;
                }

                const scores = this.manager.saveScore(
                    name,
                    this.currentScore.score,
                    this.currentScore.level,
                    this.currentScore.lines
                );

                this.modal.style.display = 'none';
                if (this.callback) {
                    this.callback(scores);
                }
            }

            skipScore() {
                this.modal.style.display = 'none';
                if (this.callback) {
                    this.callback(null);
                }
            }
        }

        // 初始化排行榜系统
        const leaderboardManager = new LeaderboardManager();
        const leaderboardUI = new LeaderboardUI(leaderboardManager);
        const scoreEntry = new ScoreEntry(leaderboardManager);

        // 初始化游戏板
        function initBoard() {
            gameState.board = [];
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                gameState.board[y] = new Array(BOARD_WIDTH).fill(0);
            }
        }

        // 创建新方块
        function createPiece() {
            const pieces = Object.keys(PIECES);
            const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
            const piece = PIECES[randomPiece];
            
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(BOARD_WIDTH / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        // 旋转方块
        function rotatePiece(piece) {
            const rotated = [];
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            for (let i = 0; i < cols; i++) {
                rotated[i] = [];
                for (let j = 0; j < rows; j++) {
                    rotated[i][j] = piece.shape[rows - 1 - j][i];
                }
            }
            
            return {
                ...piece,
                shape: rotated
            };
        }

        // 检查碰撞
        function checkCollision(piece, board, dx = 0, dy = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        
                        if (newX < 0 || newX >= BOARD_WIDTH || newY >= BOARD_HEIGHT) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 放置方块到游戏板
        function placePiece(piece, board) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const boardY = piece.y + y;
                        const boardX = piece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = piece.color;
                        }
                    }
                }
            }
        }

        // 清除完整的行
        function clearLines(board) {
            let linesCleared = 0;
            
            for (let y = BOARD_HEIGHT - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(new Array(BOARD_WIDTH).fill(0));
                    linesCleared++;
                    y++; // 重新检查当前行
                }
            }
            
            return linesCleared;
        }

        // 计算分数
        function calculateScore(linesCleared, level) {
            const baseScores = [0, 40, 100, 300, 1200];
            return baseScores[linesCleared] * level;
        }

        // 绘制单个方块
        function drawCell(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            
            // 绘制边框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }

        // 绘制游戏板
        function drawBoard(ctx, board) {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景网格
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= BOARD_WIDTH; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CELL_SIZE, 0);
                ctx.lineTo(x * CELL_SIZE, BOARD_HEIGHT * CELL_SIZE);
                ctx.stroke();
            }
            for (let y = 0; y <= BOARD_HEIGHT; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CELL_SIZE);
                ctx.lineTo(BOARD_WIDTH * CELL_SIZE, y * CELL_SIZE);
                ctx.stroke();
            }
            
            // 绘制已放置的方块
            for (let y = 0; y < BOARD_HEIGHT; y++) {
                for (let x = 0; x < BOARD_WIDTH; x++) {
                    if (board[y][x]) {
                        drawCell(ctx, x, y, board[y][x]);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawPiece(ctx, piece) {
            if (!piece) return;
            
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        drawCell(ctx, piece.x + x, piece.y + y, piece.color);
                    }
                }
            }
        }

        // 绘制下一个方块
        function drawNextPiece(ctx, piece) {
            if (!piece) return;
            
            ctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            const offsetX = (nextCanvas.width / CELL_SIZE - piece.shape[0].length) / 2;
            const offsetY = (nextCanvas.height / CELL_SIZE - piece.shape.length) / 2;
            
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        ctx.fillStyle = piece.color;
                        ctx.fillRect(
                            (offsetX + x) * (CELL_SIZE * 0.6),
                            (offsetY + y) * (CELL_SIZE * 0.6),
                            CELL_SIZE * 0.6,
                            CELL_SIZE * 0.6
                        );
                        
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(
                            (offsetX + x) * (CELL_SIZE * 0.6),
                            (offsetY + y) * (CELL_SIZE * 0.6),
                            CELL_SIZE * 0.6,
                            CELL_SIZE * 0.6
                        );
                    }
                }
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = gameState.score.toLocaleString();
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('lines').textContent = gameState.lines;
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (!gameState.currentPiece || !gameState.isPlaying || gameState.isPaused) return false;
            
            if (!checkCollision(gameState.currentPiece, gameState.board, dx, dy)) {
                gameState.currentPiece.x += dx;
                gameState.currentPiece.y += dy;
                return true;
            }
            return false;
        }

        // 旋转当前方块
        function rotatePieceInGame() {
            if (!gameState.currentPiece || !gameState.isPlaying || gameState.isPaused) return;
            
            const rotated = rotatePiece(gameState.currentPiece);
            if (!checkCollision(rotated, gameState.board)) {
                gameState.currentPiece = rotated;
            }
        }

        // 硬降
        function hardDrop() {
            if (!gameState.currentPiece || !gameState.isPlaying || gameState.isPaused) return;
            
            while (movePiece(0, 1)) {
                gameState.score += 2; // 硬降奖励分数
            }
        }

        // 游戏主循环
        function gameLoop(currentTime) {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            const deltaTime = currentTime - gameState.lastTime;
            gameState.dropTime += deltaTime;
            gameState.lastTime = currentTime;
            
            // 计算下降间隔（随等级增加而减少）
            const dropInterval = Math.max(50, 1000 - (gameState.level - 1) * 50);
            
            if (gameState.dropTime > dropInterval) {
                if (!movePiece(0, 1)) {
                    // 方块无法继续下降，放置到游戏板
                    placePiece(gameState.currentPiece, gameState.board);
                    
                    // 清除完整的行
                    const linesCleared = clearLines(gameState.board);
                    if (linesCleared > 0) {
                        gameState.lines += linesCleared;
                        gameState.score += calculateScore(linesCleared, gameState.level);
                        gameState.level = Math.floor(gameState.lines / 10) + 1;
                    }
                    
                    // 生成新方块
                    gameState.currentPiece = gameState.nextPiece;
                    gameState.nextPiece = createPiece();
                    
                    // 检查游戏结束
                    if (checkCollision(gameState.currentPiece, gameState.board)) {
                        gameOver();
                        return;
                    }
                }
                gameState.dropTime = 0;
            }
            
            // 绘制游戏
            drawBoard(ctx, gameState.board);
            drawPiece(ctx, gameState.currentPiece);
            drawNextPiece(nextCtx, gameState.nextPiece);
            updateDisplay();
            
            gameState.gameLoop = requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            if (gameState.isPlaying && !gameState.isPaused) return;
            
            if (!gameState.isPlaying) {
                // 新游戏
                initBoard();
                gameState.currentPiece = createPiece();
                gameState.nextPiece = createPiece();
                gameState.score = 0;
                gameState.level = 1;
                gameState.lines = 0;
                gameState.dropTime = 0;
            }
            
            gameState.isPlaying = true;
            gameState.isPaused = false;
            gameState.lastTime = performance.now();
            
            document.getElementById('startBtn').textContent = '游戏中';
            document.getElementById('pauseBtn').textContent = '暂停';
            
            gameState.gameLoop = requestAnimationFrame(gameLoop);
        }

        // 暂停游戏
        function pauseGame() {
            if (!gameState.isPlaying) return;
            
            gameState.isPaused = !gameState.isPaused;
            
            if (gameState.isPaused) {
                cancelAnimationFrame(gameState.gameLoop);
                document.getElementById('pauseBtn').textContent = '继续';
            } else {
                gameState.lastTime = performance.now();
                gameState.gameLoop = requestAnimationFrame(gameLoop);
                document.getElementById('pauseBtn').textContent = '暂停';
            }
        }

        // 重置游戏
        function resetGame() {
            gameState.isPlaying = false;
            gameState.isPaused = false;
            
            if (gameState.gameLoop) {
                cancelAnimationFrame(gameState.gameLoop);
            }
            
            document.getElementById('startBtn').textContent = '开始游戏';
            document.getElementById('pauseBtn').textContent = '暂停';
            
            initBoard();
            drawBoard(ctx, gameState.board);
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            gameState.score = 0;
            gameState.level = 1;
            gameState.lines = 0;
            updateDisplay();
        }

        // 游戏结束
        function gameOver() {
            gameState.isPlaying = false;
            gameState.isPaused = false;
            
            if (gameState.gameLoop) {
                cancelAnimationFrame(gameState.gameLoop);
            }
            
            document.getElementById('startBtn').textContent = '开始游戏';
            document.getElementById('pauseBtn').textContent = '暂停';
            
            // 显示最终分数
            document.getElementById('finalScore').textContent = gameState.score.toLocaleString();
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('finalLines').textContent = gameState.lines;
            
            // 检查是否是新纪录
            if (leaderboardManager.isNewRecord(gameState.score)) {
                // 显示新纪录输入对话框
                scoreEntry.showEntryDialog({
                    score: gameState.score,
                    level: gameState.level,
                    lines: gameState.lines
                }, (scores) => {
                    document.getElementById('gameOverModal').style.display = 'flex';
                });
            } else {
                document.getElementById('gameOverModal').style.display = 'flex';
            }
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOverModal').style.display = 'none';
            resetGame();
            startGame();
        }

        // 显示排行榜
        function showLeaderboard() {
            leaderboardUI.showLeaderboard();
        }

        // 隐藏排行榜
        function hideLeaderboard() {
            leaderboardUI.hideLeaderboard();
        }

        // 清空排行榜
        function clearLeaderboard() {
            if (confirm('确定要清空所有排行榜记录吗？此操作不可恢复。')) {
                leaderboardManager.clearLeaderboard();
                leaderboardUI.updateDisplay([]);
            }
        }

        // 提交分数
        function submitScore() {
            scoreEntry.submitScore();
        }

        // 跳过分数保存
        function skipScore() {
            scoreEntry.skipScore();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying || gameState.isPaused) return;
            
            switch (e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (movePiece(0, 1)) {
                        gameState.score += 1; // 软降奖励分数
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    rotatePieceInGame();
                    break;
                case ' ':
                    e.preventDefault();
                    hardDrop();
                    break;
                case 'p':
                case 'P':
                    e.preventDefault();
                    pauseGame();
                    break;
            }
        });

        // 按钮事件监听
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('leaderboardBtn').addEventListener('click', showLeaderboard);

        // 点击遮罩关闭模态框
        document.getElementById('leaderboardModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideLeaderboard();
            }
        });

        document.getElementById('scoreEntryModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                skipScore();
            }
        });

        document.getElementById('gameOverModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('gameOverModal').style.display = 'none';
            }
        });

        // 初始化游戏
        function init() {
            initBoard();
            drawBoard(ctx, gameState.board);
            updateDisplay();
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="俄罗斯方块游戏 - 经典益智游戏">
    <meta name="keywords" content="俄罗斯方块, 游戏, 益智, Tetris">
    <meta name="author" content="AI开发系统">
    <title>俄罗斯方块</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #2a5298;
            --secondary-color: #1e3c72;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --text-color: #333;
            --text-light: #fff;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 10px;
            --border-radius-large: 20px;
            --transition: all 0.3s ease;
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 根元素字体大小设置 */
        html {
            font-size: 16px;
        }

        /* 页面基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 页面头部 */
        header {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            text-align: center;
            border-bottom: 1px solid var(--border-glass);
            position: relative;
            z-index: 100;
        }

        header h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 主要内容区域 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 2rem;
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        /* 游戏面板 */
        .game-board {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            box-shadow: var(--shadow-heavy);
        }

        /* Canvas样式 */
        #gameCanvas {
            border: 2px solid var(--border-glass);
            border-radius: var(--border-radius);
            background: rgba(0, 0, 0, 0.8);
            display: block;
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 信息面板 */
        .info-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            color: var(--text-light);
            min-width: 200px;
        }

        .info-panel h3 {
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .info-panel p {
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.danger {
            background: var(--danger-color);
        }

        .btn.danger:hover {
            background: #d32f2f;
        }

        /* 性能监控面板 */
        .performance-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--border-radius);
            padding: 1rem;
            color: var(--text-light);
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .performance-panel h4 {
            color: var(--warning-color);
            margin-bottom: 0.5rem;
        }

        .perf-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.2rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 1rem;
            }

            .game-container {
                flex-direction: column;
                align-items: center;
            }

            .sidebar {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>俄罗斯方块</h1>
    </header>

    <main>
        <div class="game-container">
            <div class="game-board">
                <canvas id="gameCanvas" width="400" height="600"></canvas>
            </div>

            <div class="sidebar">
                <div class="info-panel">
                    <h3>游戏信息</h3>
                    <p>得分: <span id="score">0</span></p>
                    <p>等级: <span id="level">1</span></p>
                    <p>消行: <span id="lines">0</span></p>
                </div>

                <div class="info-panel">
                    <h3>下一个方块</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>

                <div class="controls">
                    <button class="btn" id="startBtn">开始游戏</button>
                    <button class="btn" id="pauseBtn">暂停</button>
                    <button class="btn danger" id="resetBtn">重新开始</button>
                </div>

                <div class="performance-panel">
                    <h4>性能监控</h4>
                    <div class="perf-item">
                        <span>FPS:</span>
                        <span id="fps">60</span>
                    </div>
                    <div class="perf-item">
                        <span>渲染时间:</span>
                        <span id="renderTime">0ms</span>
                    </div>
                    <div class="perf-item">
                        <span>脏区域:</span>
                        <span id="dirtyRegions">0</span>
                    </div>
                    <div class="perf-item">
                        <span>缓存命中:</span>
                        <span id="cacheHits">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 性能优化器类
        class PerformanceOptimizer {
            constructor() {
                this.dirtyRegions = [];
                this.staticCache = new Map();
                this.performanceMetrics = {
                    fps: 0,
                    renderTime: 0,
                    frameCount: 0,
                    lastTime: performance.now(),
                    dirtyRegionCount: 0,
                    cacheHitRate: 0,
                    totalRequests: 0,
                    cacheHits: 0
                };
                this.enabled = true;
            }

            optimizeRender(ctx, renderFunction) {
                if (!this.enabled) {
                    renderFunction();
                    return;
                }

                const startTime = performance.now();
                
                // 只重绘脏区域
                if (this.dirtyRegions.length > 0) {
                    ctx.save();
                    
                    // 合并相邻的脏区域
                    const mergedRegions = this.mergeDirtyRegions();
                    
                    mergedRegions.forEach(region => {
                        ctx.beginPath();
                        ctx.rect(region.x, region.y, region.width, region.height);
                        ctx.clip();
                        
                        renderFunction(region);
                    });
                    
                    ctx.restore();
                    this.clearDirtyRegions();
                } else {
                    renderFunction();
                }

                const endTime = performance.now();
                this.performanceMetrics.renderTime = endTime - startTime;
            }

            enableDirtyRectangles() {
                this.dirtyRegionsEnabled = true;
            }

            addDirtyRegion(x, y, width, height) {
                if (!this.dirtyRegionsEnabled) return;
                
                this.dirtyRegions.push({ x, y, width, height });
                this.performanceMetrics.dirtyRegionCount = this.dirtyRegions.length;
            }

            mergeDirtyRegions() {
                if (this.dirtyRegions.length <= 1) return this.dirtyRegions;
                
                const merged = [];
                const sorted = this.dirtyRegions.sort((a, b) => a.x - b.x || a.y - b.y);
                
                let current = sorted[0];
                
                for (let i = 1; i < sorted.length; i++) {
                    const next = sorted[i];
                    
                    if (this.regionsOverlap(current, next)) {
                        current = this.mergeRegions(current, next);
                    } else {
                        merged.push(current);
                        current = next;
                    }
                }
                
                merged.push(current);
                return merged;
            }

            regionsOverlap(a, b) {
                return !(a.x + a.width < b.x || 
                        b.x + b.width < a.x || 
                        a.y + a.height < b.y || 
                        b.y + b.height < a.y);
            }

            mergeRegions(a, b) {
                const x = Math.min(a.x, b.x);
                const y = Math.min(a.y, b.y);
                const width = Math.max(a.x + a.width, b.x + b.width) - x;
                const height = Math.max(a.y + a.height, b.y + b.height) - y;
                
                return { x, y, width, height };
            }

            clearDirtyRegions() {
                this.dirtyRegions = [];
                this.performanceMetrics.dirtyRegionCount = 0;
            }

            cacheStaticElements(key, renderFunction, ctx) {
                this.performanceMetrics.totalRequests++;
                
                if (this.staticCache.has(key)) {
                    this.performanceMetrics.cacheHits++;
                    const cached = this.staticCache.get(key);
                    ctx.drawImage(cached, 0, 0);
                    return cached;
                }
                
                // 创建离屏Canvas进行缓存
                const offscreenCanvas = document.createElement('canvas');
                const offscreenCtx = offscreenCanvas.getContext('2d');
                offscreenCanvas.width = ctx.canvas.width;
                offscreenCanvas.height = ctx.canvas.height;
                
                renderFunction(offscreenCtx);
                this.staticCache.set(key, offscreenCanvas);
                
                ctx.drawImage(offscreenCanvas, 0, 0);
                return offscreenCanvas;
            }

            monitorPerformance() {
                const now = performance.now();
                const delta = now - this.performanceMetrics.lastTime;
                
                if (delta >= 1000) {
                    this.performanceMetrics.fps = Math.round(
                        (this.performanceMetrics.frameCount * 1000) / delta
                    );
                    
                    this.performanceMetrics.cacheHitRate = 
                        this.performanceMetrics.totalRequests > 0 
                            ? Math.round((this.performanceMetrics.cacheHits / this.performanceMetrics.totalRequests) * 100)
                            : 0;
                    
                    this.updatePerformanceDisplay();
                    
                    this.performanceMetrics.frameCount = 0;
                    this.performanceMetrics.lastTime = now;
                }
                
                this.performanceMetrics.frameCount++;
            }

            updatePerformanceDisplay() {
                const fpsEl = document.getElementById('fps');
                const renderTimeEl = document.getElementById('renderTime');
                const dirtyRegionsEl = document.getElementById('dirtyRegions');
                const cacheHitsEl = document.getElementById('cacheHits');
                
                if (fpsEl) fpsEl.textContent = this.performanceMetrics.fps;
                if (renderTimeEl) renderTimeEl.textContent = `${this.performanceMetrics.renderTime.toFixed(2)}ms`;
                if (dirtyRegionsEl) dirtyRegionsEl.textContent = this.performanceMetrics.dirtyRegionCount;
                if (cacheHitsEl) cacheHitsEl.textContent = `${this.performanceMetrics.cacheHitRate}%`;
            }
        }

        // 动画引擎类
        class AnimationEngine {
            constructor() {
                this.animations = new Map();
                this.easingFunctions = {
                    linear: t => t,
                    easeInQuad: t => t * t,
                    easeOutQuad: t => t * (2 - t),
                    easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
                    easeInCubic: t => t * t * t,
                    easeOutCubic: t => (--t) * t * t + 1,
                    bounce: t => {
                        if (t < 1/2.75) return 7.5625 * t * t;
                        if (t < 2/2.75) return 7.5625 * (t -= 1.5/2.75) * t + 0.75;
                        if (t < 2.5/2.75) return 7.5625 * (t -= 2.25/2.75) * t + 0.9375;
                        return 7.5625 * (t -= 2.625/2.75) * t + 0.984375;
                    }
                };
            }

            animateBlockFall(block, fromY, toY, duration = 500, easing = 'easeOutQuad') {
                const animationId = `fall_${Date.now()}`;
                const startTime = performance.now();
                
                const animation = {
                    id: animationId,
                    startTime,
                    duration,
                    easing,
                    fromY,
                    toY,
                    block,
                    type: 'fall',
                    update: (progress) => {
                        const easedProgress = this.easingFunctions[easing](progress);
                        block.y = this.interpolate(fromY, toY, easedProgress);
                    },
                    complete: () => {
                        block.y = toY;
                        this.animations.delete(animationId);
                    }
                };
                
                this.animations.set(animationId, animation);
                return animationId;
            }

            animateLineClear(lines, duration = 300) {
                const animationId = `lineClear_${Date.now()}`;
                const startTime = performance.now();
                
                const animation = {
                    id: animationId,
                    startTime,
                    duration,
                    easing: 'easeInOutQuad',
                    lines,
                    type: 'lineClear',
                    update: (progress) => {
                        const scale = 1 - progress;
                        const alpha = 1 - progress;
                        
                        lines.forEach(line => {
                            line.scale = scale;
                            line.alpha = alpha;
                        });
                    },
                    complete: () => {
                        this.animations.delete(animationId);
                    }
                };
                
                this.animations.set(animationId, animation);
                return animationId;
            }

            animateBlockRotation(block, fromRotation, toRotation, duration = 200) {
                const animationId = `rotation_${Date.now()}`;
                const startTime = performance.now();
                
                const animation = {
                    id: animationId,
                    startTime,
                    duration,
                    easing: 'easeOutQuad',
                    fromRotation,
                    toRotation,
                    block,
                    type: 'rotation',
                    update: (progress) => {
                        const easedProgress = this.easingFunctions['easeOutQuad'](progress);
                        block.rotation = this.interpolateAngle(fromRotation, toRotation, easedProgress);
                    },
                    complete: () => {
                        block.rotation = toRotation;
                        this.animations.delete(animationId);
                    }
                };
                
                this.animations.set(animationId, animation);
                return animationId;
            }

            interpolateMovement(from, to, progress) {
                return {
                    x: this.interpolate(from.x, to.x, progress),
                    y: this.interpolate(from.y, to.y, progress)
                };
            }

            interpolate(from, to, progress) {
                return from + (to - from) * progress;
            }

            interpolateAngle(from, to, progress) {
                let diff = to - from;
                if (diff > Math.PI) diff -= 2 * Math.PI;
                if (diff < -Math.PI) diff += 2 * Math.PI;
                return from + diff * progress;
            }

            update(currentTime) {
                for (const [id, animation] of this.animations) {
                    const elapsed = currentTime - animation.startTime;
                    const progress = Math.min(elapsed / animation.duration, 1);
                    
                    if (progress >= 1) {
                        animation.complete();
                    } else {
                        animation.update(progress);
                    }
                }
            }

            stopAnimation(animationId) {
                if (this.animations.has(animationId)) {
                    const animation = this.animations.get(animationId);
                    animation.complete();
                }
            }

            stopAllAnimations() {
                for (const [id, animation] of this.animations) {
                    animation.complete();
                }
                this.animations.clear();
            }
        }

        // 渲染优化器类
        class RenderOptimizer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.offscreenCanvas = null;
                this.offscreenCtx = null;
                this.imageCache = new Map();
                this.drawCallBatch = [];
                this.setupDoubleBuffering();
            }

            setupDoubleBuffering() {
                this.offscreenCanvas = document.createElement('canvas');
                this.offscreenCanvas.width = this.canvas.width;
                this.offscreenCanvas.height = this.canvas.height;
                this.offscreenCtx = this.offscreenCanvas.getContext('2d');
                
                // 优化Canvas设置
                this.offscreenCtx.imageSmoothingEnabled = false;
                this.ctx.imageSmoothingEnabled = false;
            }

            batchDrawOperations(operations) {
                this.drawCallBatch = operations;
            }

            executeBatch() {
                // 清空离屏Canvas
                this.offscreenCtx.clearRect(0, 0, this.offscreenCanvas.width, this.offscreenCanvas.height);
                
                // 批量执行绘制操作
                this.drawCallBatch.forEach(operation => {
                    operation(this.offscreenCtx);
                });
                
                // 一次性绘制到主Canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.offscreenCanvas, 0, 0);
                
                this.drawCallBatch = [];
            }

            cacheImages(key, imageData) {
                if (!this.imageCache.has(key)) {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = imageData.width;
                    canvas.height = imageData.height;
                    
                    ctx.putImageData(imageData, 0, 0);
                    this.imageCache.set(key, canvas);
                }
                
                return this.imageCache.get(key);
            }

            getCachedImage(key) {
                return this.imageCache.get(key);
            }

            optimizeDrawCalls(renderFunction) {
                // 使用离屏Canvas进行优化渲染
                renderFunction(this.offscreenCtx);
                
                // 一次性绘制到主Canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.offscreenCanvas, 0, 0);
            }

            clearCache() {
                this.imageCache.clear();
            }
        }

        // 帧管理器类
        class FrameManager {
            constructor() {
                this.isRunning = false;
                this.isPaused = false;
                this.targetFPS = 60;
                this.frameInterval = 1000 / this.targetFPS;
                this.lastFrameTime = 0;
                this.animationId = null;
                this.updateCallbacks = [];
                this.renderCallbacks = [];
            }

            startAnimationLoop() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.lastFrameTime = performance.now();
                this.loop();
            }

            loop() {
                if (!this.isRunning) return;
                
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastFrameTime;
                
                if (deltaTime >= this.frameInterval) {
                    if (!this.isPaused) {
                        // 执行更新回调
                        this.updateCallbacks.forEach(callback => {
                            callback(deltaTime, currentTime);
                        });
                        
                        // 执行渲染回调
                        this.renderCallbacks.forEach(callback => {
                            callback(deltaTime, currentTime);
                        });
                    }
                    
                    this.lastFrameTime = currentTime - (deltaTime % this.frameInterval);
                }
                
                this.animationId = requestAnimationFrame(() => this.loop());
            }

            controlFrameRate(fps) {
                this.targetFPS = fps;
                this.frameInterval = 1000 / this.targetFPS;
            }

            pauseAnimation() {
                this.isPaused = true;
            }

            resumeAnimation() {
                this.isPaused = false;
            }

            stopAnimation() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            addUpdateCallback(callback) {
                this.updateCallbacks.push(callback);
            }

            addRenderCallback(callback) {
                this.renderCallbacks.push(callback);
            }

            removeUpdateCallback(callback) {
                const index = this.updateCallbacks.indexOf(callback);
                if (index > -1) {
                    this.updateCallbacks.splice(index, 1);
                }
            }

            removeRenderCallback(callback) {
                const index = this.renderCallbacks.indexOf(callback);
                if (index > -1) {
                    this.renderCallbacks.splice(index, 1);
                }
            }
        }

        // 俄罗斯方块游戏类
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                // 初始化性能优化组件
                this.performanceOptimizer = new PerformanceOptimizer();
                this.animationEngine = new AnimationEngine();
                this.renderOptimizer = new RenderOptimizer(this.canvas);
                this.frameManager = new FrameManager();
                
                // 游戏状态
                this.board = this.createBoard(20, 10);
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                
                // 方块定义
                this.pieces = {
                    I: { shape: [[1,1,1,1]], color: '#00f0f0' },
                    O: { shape: [[1,1],[1,1]], color: '#f0f000' },
                    T: { shape: [[0,1,0],[1,1,1]], color: '#a000f0' },
                    S: { shape: [[0,1,1],[1,1,0]], color: '#00f000' },
                    Z: { shape: [[1,1,0],[0,1,1]], color: '#f00000' },
                    J: { shape: [[1,0,0],[1,1,1]], color: '#0000f0' },
                    L: { shape: [[0,0,1],[1,1,1]], color: '#f0a000' }
                };
                
                this.init();
            }

            init() {
                this.performanceOptimizer.enableDirtyRectangles();
                
                // 设置帧管理器回调
                this.frameManager.addUpdateCallback((deltaTime, currentTime) => {
                    this.update(deltaTime, currentTime);
                });
                
                this.frameManager.addRenderCallback((deltaTime, currentTime) => {
                    this.render(deltaTime, currentTime);
                });
                
                this.setupControls();
                this.generateNextPiece();
                this.spawnPiece();
            }

            createBoard(rows, cols) {
                return Array(rows).fill().map(() => Array(cols).fill(0));
            }

            setupControls() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning) return;
                    
                    switch(e.code) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                        case 'Space':
                            this.rotatePiece();
                            break;
                    }
                });
                
                // 按钮控制
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.startGame();
                });
                
                document.getElementById('pauseBtn').addEventListener('click', () => {
                    this.togglePause();
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.resetGame();
                });
            }

            generateNextPiece() {
                const pieceTypes = Object.keys(this.pieces);
                const randomType = pieceTypes[Math.floor(Math.random() * pieceTypes.length)];
                this.nextPiece = {
                    type: randomType,
                    shape: this.pieces[randomType].shape,
                    color: this.pieces[randomType].color,
                    x: 0,
                    y: 0
                };
            }

            spawnPiece() {
                this.currentPiece = {
                    ...this.nextPiece,
                    x: Math.floor(this.board[0].length / 2) - 1,
                    y: 0
                };
                
                this.generateNextPiece();
                this.renderNextPiece();
                
                // 检查游戏结束
                if (this.checkCollision(this.currentPiece, 0, 0)) {
                    this.gameOver();
                }
            }

            movePiece(dx, dy) {
                if (this.checkCollision(this.currentPiece, dx, dy)) {
                    return false;
                }
                
                // 添加脏区域
                this.performanceOptimizer.addDirtyRegion(
                    this.currentPiece.x * 40, 
                    this.currentPiece.y * 30, 
                    this.currentPiece.shape[0].length * 40, 
                    this.currentPiece.shape.length * 30
                );
                
                this.currentPiece.x += dx;
                this.currentPiece.y += dy;
                
                // 添加新位置的脏区域
                this.performanceOptimizer.addDirtyRegion(
                    this.currentPiece.x * 40, 
                    this.currentPiece.y * 30, 
                    this.currentPiece.shape[0].length * 40, 
                    this.currentPiece.shape.length * 30
                );
                
                return true;
            }

            rotatePiece() {
                const rotated = this.rotateMatrix(this.currentPiece.shape);
                const originalShape = this.currentPiece.shape;
                
                this.currentPiece.shape = rotated;
                
                if (this.checkCollision(this.currentPiece, 0, 0)) {
                    this.currentPiece.shape = originalShape;
                    return;
                }
                
                // 播放旋转动画
                this.animationEngine.animateBlockRotation(
                    this.currentPiece, 
                    0, 
                    Math.PI / 2, 
                    200
                );
                
                // 添加脏区域
                this.performanceOptimizer.addDirtyRegion(
                    this.currentPiece.x * 40, 
                    this.currentPiece.y * 30, 
                    Math.max(originalShape[0].length, rotated[0].length) * 40, 
                    Math.max(originalShape.length, rotated.length) * 30
                );
            }

            rotateMatrix(matrix) {
                const rows = matrix.length;
                const cols = matrix[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = matrix[i][j];
                    }
                }
                
                return rotated;
            }

            checkCollision(piece, dx, dy) {
                const newX = piece.x + dx;
                const newY = piece.y + dy;
                
                for (let i = 0; i < piece.shape.length; i++) {
                    for (let j = 0; j < piece.shape[i].length; j++) {
                        if (piece.shape[i][j]) {
                            const boardX = newX + j;
                            const boardY = newY + i;
                            
                            if (boardX < 0 || boardX >= this.board[0].length || 
                                boardY >= this.board.length || 
                                (boardY >= 0 && this.board[boardY][boardX])) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }

            placePiece() {
                for (let i = 0; i < this.currentPiece.shape.length; i++) {
                    for (let j = 0; j < this.currentPiece.shape[i].length; j++) {
                        if (this.currentPiece.shape[i][j]) {
                            const boardX = this.currentPiece.x + j;
                            const boardY = this.currentPiece.y + i;
                            
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnPiece();
            }

            clearLines() {
                const linesToClear = [];
                
                for (let i = this.board.length - 1; i >= 0; i--) {
                    if (this.board[i].every(cell => cell !== 0)) {
                        linesToClear.push(i);
                    }
                }
                
                if (linesToClear.length > 0) {
                    // 播放消行动画
                    this.animationEngine.animateLineClear(
                        linesToClear.map(line => ({ line, scale: 1, alpha: 1 })),
                        300
                    );
                    
                    // 延迟移除行，等待动画完成
                    setTimeout(() => {
                        linesToClear.forEach(line => {
                            this.board.splice(line, 1);
                            this.board.unshift(Array(this.board[0].length).fill(0));
                        });
                        
                        this.lines += linesToClear.length;
                        this.score += linesToClear.length * 100 * this.level;
                        this.level = Math.floor(this.lines / 10) + 1;
                        
                        this.updateUI();
                    }, 300);
                }
            }

            update(deltaTime, currentTime) {
                if (!this.gameRunning) return;
                
                // 更新动画
                this.animationEngine.update(currentTime);
                
                // 自动下落
                if (currentTime - this.lastDropTime > (1000 - (this.level - 1) * 100)) {
                    if (!this.movePiece(0, 1)) {
                        this.placePiece();
                    }
                    this.lastDropTime = currentTime;
                }
                
                // 监控性能
                this.performanceOptimizer.monitorPerformance();
            }

            render(deltaTime, currentTime) {
                this.performanceOptimizer.optimizeRender(this.ctx, () => {
                    this.renderOptimizer.optimizeDrawCalls((ctx) => {
                        this.drawBoard(ctx);
                        this.drawCurrentPiece(ctx);
                        this.drawGhost(ctx);
                    });
                });
            }

            drawBoard(ctx) {
                const blockSize = 30;
                
                // 绘制背景
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.board.length; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * blockSize);
                    ctx.lineTo(this.canvas.width, i * blockSize);
                    ctx.stroke();
                }
                
                for (let j = 0; j <= this.board[0].length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(j * blockSize, 0);
                    ctx.lineTo(j * blockSize, this.canvas.height);
                    ctx.stroke();
                }
                
                // 绘制已放置的方块
                for (let i = 0; i < this.board.length; i++) {
                    for (let j = 0; j < this.board[i].length; j++) {
                        if (this.board[i][j]) {
                            this.drawBlock(ctx, j * blockSize, i * blockSize, blockSize, this.board[i][j]);
                        }
                    }
                }
            }

            drawCurrentPiece(ctx) {
                if (!this.currentPiece) return;
                
                const blockSize = 30;
                
                for (let i = 0; i < this.currentPiece.shape.length; i++) {
                    for (let j = 0; j < this.currentPiece.shape[i].length; j++) {
                        if (this.currentPiece.shape[i][j]) {
                            const x = (this.currentPiece.x + j) * blockSize;
                            const y = (this.currentPiece.y + i) * blockSize;
                            this.drawBlock(ctx, x, y, blockSize, this.currentPiece.color);
                        }
                    }
                }
            }

            drawGhost(ctx) {
                if (!this.currentPiece) return;
                
                // 计算幽灵方块位置
                let ghostY = this.currentPiece.y;
                while (!this.checkCollision(this.currentPiece, 0, ghostY - this.currentPiece.y + 1)) {
                    ghostY++;
                }
                
                const blockSize = 30;
                
                ctx.save();
                ctx.globalAlpha = 0.3;
                
                for (let i = 0; i < this.currentPiece.shape.length; i++) {
                    for (let j = 0; j < this.currentPiece.shape[i].length; j++) {
                        if (this.currentPiece.shape[i][j]) {
                            const x = (this.currentPiece.x + j) * blockSize;
                            const y = (ghostY + i) * blockSize;
                            this.drawBlock(ctx, x, y, blockSize, this.currentPiece.color);
                        }
                    }
                }
                
                ctx.restore();
            }

            drawBlock(ctx, x, y, size, color) {
                // 主要颜色
                ctx.fillStyle = color;
                ctx.fillRect(x, y, size, size);
                
                // 高光效果
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(x, y, size, 2);
                ctx.fillRect(x, y, 2, size);
                
                // 阴影效果
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(x, y + size - 2, size, 2);
                ctx.fillRect(x + size - 2, y, 2, size);
                
                // 边框
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, size, size);
            }

            renderNextPiece() {
                if (!this.nextPiece) return;
                
                this.nextCtx.clearRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                const blockSize = 20;
                const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                
                for (let i = 0; i < this.nextPiece.shape.length; i++) {
                    for (let j = 0; j < this.nextPiece.shape[i].length; j++) {
                        if (this.nextPiece.shape[i][j]) {
                            const x = offsetX + j * blockSize;
                            const y = offsetY + i * blockSize;
                            
                            this.nextCtx.fillStyle = this.nextPiece.color;
                            this.nextCtx.fillRect(x, y, blockSize, blockSize);
                            
                            this.nextCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                            this.nextCtx.lineWidth = 1;
                            this.nextCtx.strokeRect(x, y, blockSize, blockSize);
                        }
                    }
                }
            }

            startGame() {
                this.gameRunning = true;
                this.lastDropTime = performance.now();
                this.frameManager.startAnimationLoop();
                
                document.getElementById('startBtn').textContent = '游戏中';
                document.getElementById('startBtn').disabled = true;
            }

            togglePause() {
                if (this.frameManager.isPaused) {
                    this.frameManager.resumeAnimation();
                    document.getElementById('pauseBtn').textContent = '暂停';
                } else {
                    this.frameManager.pauseAnimation();
                    document.getElementById('pauseBtn').textContent = '继续';
                }
            }

            resetGame() {
                this.frameManager.stopAnimation();
                this.animationEngine.stopAllAnimations();
                
                this.board = this.createBoard(20, 10);
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameRunning = false;
                
                this.generateNextPiece();
                this.spawnPiece();
                this.updateUI();
                
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').textContent = '暂停';
                
                // 清空Canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            gameOver() {
                this.gameRunning = false;
                this.frameManager.stopAnimation();
                
                alert(`游戏结束！\n得分: ${this.score}\n等级: ${this.level}\n消行: ${this.lines}`);
                
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('startBtn').disabled = false;
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            const game = new TetrisGame();
        });
    </script>
</body>
